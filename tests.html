<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LayaSync</title>

<style>
:root {
  --bg: #f4f6f8;
  --text: #111;
  --accent: #2563eb;
  --card: #ffffff;
  --muted: #6b7280;
}

/* Base */
* { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
body { margin:0; background: var(--bg); color: var(--text); }

/* Layout */
.app { display:flex; height:100vh; }

/* Sidebar */
.sidebar {
  width:260px;
  background:#fff;
  border-right:1px solid #eee;
  padding:20px;
  position:fixed;
  left:-260px;
  top:0;
  height:100%;
  transition:.3s;
  z-index:1000;
}
.sidebar.active { left:0; }

.sidebar-header {
  font-size:20px;
  font-weight:800;
  margin-bottom:20px;
}

.group-item {
  padding:10px;
  border-radius:10px;
  margin-bottom:5px;
  display:flex;
  justify-content:space-between;
  cursor:pointer;
}
.group-item.active { background: var(--accent); color:white; }

/* Overlay */
.overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.3);
  display:none;
}
.overlay.active { display:block; }

/* Main */
main { flex:1; margin-left:0; }

/* Header */
header {
  display:flex;
  gap:10px;
  padding:12px;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(10px);
  border-bottom:1px solid #eee;
  position:sticky;
  top:0;
}

.search-box {
  flex:1;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#f1f3f5;
}

.btn-icon {
  width:42px;
  height:42px;
  border:none;
  border-radius:10px;
  background:#f1f3f5;
}

/* Grid */
.grid {
  padding:15px;
  display:grid;
  grid-template-columns: repeat(auto-fill,minmax(150px,1fr));
  gap:15px;
}

/* Cards */
.asset-card {
  background:var(--card);
  border-radius:16px;
  padding:15px;
  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
  transition:.2s;
}
.asset-card:hover { transform: translateY(-5px); }

.img-container {
  height:80px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.img-container img { max-width:70px; }

.name-field {
  border:none;
  text-align:center;
  font-weight:700;
  margin-top:10px;
}

.copy-btn {
  margin-top:10px;
  padding:8px;
  border:none;
  border-radius:10px;
  background:var(--accent);
  color:white;
  font-size:11px;
}

/* Mobile */
@media(max-width:768px){
  .grid { grid-template-columns: repeat(3,1fr); }
}
</style>
</head>

<body>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="app">

<!-- Sidebar -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">LayaSync</div>

  <div id="groupList"></div>

  <input id="newGrp" placeholder="New group" style="width:100%;margin-top:10px;padding:10px;">
  <button onclick="addGroup()">+</button>

  <input id="ghToken" placeholder="GitHub Token" style="margin-top:20px;width:100%;padding:10px;">
  <button onclick="cloudSync()">SYNC</button>
</nav>

<!-- Main -->
<main>

<header>
  <button class="btn-icon" onclick="toggleSidebar()">☰</button>
  <input id="search" class="search-box" onkeyup="renderUI()" placeholder="Search...">
  <button id="multiBtn" class="btn-icon" onclick="toggleMultiSelect()">🔘</button>
</header>

<div class="grid" id="mainGrid"></div>

</main>
</div>

<script>

/* ===== ORIGINAL LOGIC KEPT ===== */

let db = [];
let activeG = 'All';
let selectedSet = new Set();
let isMulti = false;

function toggleSidebar(){
  sidebar.classList.toggle('active');
  overlay.classList.toggle('active');
}

function renderGroups(){
  const list = document.getElementById('groupList');
  const cats = [...new Set(db.map(i=>i.group))];

  list.innerHTML = `<div class="group-item ${activeG==='All'?'active':''}" onclick="setG('All')">All</div>`;

  cats.forEach(g=>{
    list.innerHTML += `<div class="group-item ${activeG===g?'active':''}" onclick="setG('${g}')">${g}</div>`;
  });
}

function setG(g){ activeG=g; renderGroups(); renderUI(); }

function addGroup(){
  const val = newGrp.value;
  if(val){
    db.push({name:"Dummy",url:"",group:val});
    newGrp.value="";
    renderGroups();
  }
}

function renderUI(){
  const q = search.value.toLowerCase();
  const grid = document.getElementById('mainGrid');

  const filtered = db.filter(i =>
    i.url &&
    i.name.toLowerCase().includes(q) &&
    (activeG==='All'||i.group===activeG)
  );

  grid.innerHTML = filtered.map(i=>`
    <div class="asset-card">
      <div class="img-container"><img src="${i.url}"></div>
      <input class="name-field" value="${i.name}">
      <button class="copy-btn" onclick="copyLink('${i.url}')">Copy</button>
    </div>
  `).join('');
}

function toggleMultiSelect(){
  isMulti=!isMulti;
}

function copyLink(url){
  navigator.clipboard.writeText(url);
}

/* Demo Data */
db = [
  {name:"Nike",url:"https://cdn.simpleicons.org/nike",group:"Sports"},
  {name:"Adidas",url:"https://cdn.simpleicons.org/adidas",group:"Sports"},
  {name:"Apple",url:"https://cdn.simpleicons.org/apple",group:"Tech"},
  {name:"Google",url:"https://cdn.simpleicons.org/google",group:"Tech"},
  {name:"BMW",url:"https://cdn.simpleicons.org/bmw",group:"Auto"},
];

renderGroups();
renderUI();

</script>

</body>
</html>
