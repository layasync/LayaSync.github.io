<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LayaSync Open</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#ffffff;
    --text:#111;
    --sub:#6e6e73;
    --card:#ffffff;
    --border:#e5e5ea;
    --accent:#007aff;
}
.dark{
    --bg:#000;
    --text:#fff;
    --sub:#aaa;
    --card:#111;
    --border:#222;
}

/* BASE */
*{box-sizing:border-box;font-family:-apple-system,Inter;}
body{margin:0;background:var(--bg);color:var(--text);}

/* HEADER */
header{
    position:sticky;top:0;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.7);
    padding:12px;
    display:flex;gap:10px;
    border-bottom:1px solid var(--border);
}
.dark header{background:rgba(0,0,0,0.7);}

.search{
    flex:1;
    padding:12px;
    border-radius:10px;
    border:none;
    background:#f2f2f7;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:16px;
    padding:16px;
}

/* CARD */
.card{
    background:var(--card);
    border-radius:16px;
    padding:12px;
    border:1px solid var(--border);
    text-align:center;
    transition:.2s;
}
.card:hover{
    transform:translateY(-3px);
    box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

.img{
    height:90px;
    display:flex;align-items:center;justify-content:center;
}
.img img{max-width:80%;max-height:80%;}

/* BUTTON */
.btn{
    background:var(--accent);
    color:#fff;
    border:none;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
}

/* SUBMIT MODAL */
.modal{
    position:fixed;inset:0;
    background:rgba(0,0,0,0.4);
    display:none;align-items:center;justify-content:center;
}
.modal.active{display:flex;}

.modal-box{
    background:var(--card);
    padding:20px;
    border-radius:16px;
    width:90%;max-width:400px;
}

.input{
    width:100%;
    margin-bottom:10px;
    padding:10px;
    border-radius:10px;
    border:1px solid var(--border);
}

/* ADMIN */
.admin{
    padding:15px;
}

.submission{
    border:1px solid var(--border);
    padding:10px;
    border-radius:12px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<header>
<input class="search" placeholder="Search logos..." id="search">
<button onclick="toggleTheme()">🌗</button>
<button onclick="openModal()">➕</button>
</header>

<div class="grid" id="grid"></div>

<!-- SUBMIT MODAL -->
<div class="modal" id="modal">
<div class="modal-box">
<h3>Submit Logos</h3>

<input class="input" placeholder="Image URL 1">
<input class="input" placeholder="Image URL 2">
<input class="input" placeholder="Image URL 3">
<input class="input" placeholder="Image URL 4">
<input class="input" placeholder="Image URL 5">

<button class="btn" onclick="submit()">Submit</button>
</div>
</div>

<!-- ADMIN PANEL -->
<div class="admin" id="admin" style="display:none;">
<h2>Admin Panel</h2>
<div id="submissions"></div>
</div>

<script>
let db = [];
let submissions = [];

/* LOAD SAMPLE */
for(let i=0;i<50;i++){
    db.push({name:"Logo "+i, url:"https://via.placeholder.com/150"});
}

function render(){
    const grid=document.getElementById("grid");
    const q=document.getElementById("search").value?.toLowerCase()||"";

    const list=db.filter(i=>i.name.toLowerCase().includes(q));

    grid.innerHTML=list.map(i=>`
        <div class="card">
            <div class="img"><img src="${i.url}" loading="lazy"></div>
            <div>${i.name}</div>
        </div>
    `).join("");
}

render();

/* MODAL */
function openModal(){document.getElementById("modal").classList.add("active");}
function submit(){
    const inputs=document.querySelectorAll(".input");
    const urls=[...inputs].map(i=>i.value).filter(Boolean);

    if(urls.length===0) return alert("Add at least 1");

    submissions.push({urls});
    renderAdmin();

    document.getElementById("modal").classList.remove("active");
}

/* ADMIN */
function renderAdmin(){
    const box=document.getElementById("submissions");

    box.innerHTML=submissions.map((s,i)=>`
        <div class="submission">
            ${s.urls.map(u=>`<img src="${u}" width="40">`).join("")}
            <br>
            <button onclick="approve(${i})">✅</button>
            <button onclick="reject(${i})">❌</button>
        </div>
    `).join("");
}

function approve(i){
    submissions[i].urls.forEach(u=>{
        db.push({name:"User Upload", url:u});
    });
    submissions.splice(i,1);
    render(); renderAdmin();
}

function reject(i){
    submissions.splice(i,1);
    renderAdmin();
}

/* THEME */
function toggleTheme(){
    document.body.classList.toggle("dark");
}
</script>

</body>
</html>
