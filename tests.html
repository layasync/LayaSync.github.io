<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LayaSync</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#f5f5f7;
    --card:#ffffff;
    --text:#111;
    --sub:#6e6e73;
    --accent:#007aff;
    --border:#e5e5ea;
}
.dark{
    --bg:#0b0b0c;
    --card:#1c1c1e;
    --text:#fff;
    --sub:#aaa;
    --border:#2c2c2e;
}

*{
    box-sizing:border-box;
    font-family:-apple-system,Inter;
}

body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    display:flex;
}

/* SIDEBAR */
.sidebar{
    width:260px;
    height:100vh;
    padding:20px;
    border-right:1px solid var(--border);
    background:var(--card);
}

.logo{
    font-size:18px;
    font-weight:700;
    margin-bottom:20px;
}

.group{
    padding:10px 12px;
    border-radius:10px;
    margin-bottom:6px;
    font-size:13px;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
}
.group.active{
    background:var(--accent);
    color:#fff;
}

/* MAIN */
main{
    flex:1;
}

/* HEADER */
header{
    display:flex;
    gap:10px;
    padding:15px;
    position:sticky;
    top:0;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.7);
    border-bottom:1px solid var(--border);
}
.dark header{background:rgba(0,0,0,0.7);}

.search{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#e5e5ea;
}

/* GRID */
.grid{
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
    gap:18px;
}

/* CARD */
.card{
    background:var(--card);
    border-radius:18px;
    padding:14px;
    border:1px solid var(--border);
    text-align:center;
    transition:0.2s;
}
.card:hover{
    transform:translateY(-4px);
    box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.img{
    height:90px;
    display:flex;
    align-items:center;
    justify-content:center;
}
.img img{
    max-width:80%;
    max-height:80%;
}

.name{
    font-size:12px;
    font-weight:600;
}

/* MOBILE NAV */
.bottom{
    display:none;
}

@media(max-width:700px){
    .sidebar{display:none;}
    .bottom{
        display:flex;
        position:fixed;
        bottom:0;
        width:100%;
        background:var(--card);
        border-top:1px solid var(--border);
        justify-content:space-around;
        padding:10px;
    }
}

/* BUTTON */
.btn{
    background:var(--accent);
    color:#fff;
    border:none;
    padding:10px 14px;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">LayaSync</div>

    <div class="group active">All Logos <span>24</span></div>
    <div class="group">Technology</div>
    <div class="group">Brands</div>

    <br>
    <button class="btn" onclick="toggleTheme()">🌗 Toggle</button>
</div>

<!-- MAIN -->
<main>

<header>
<input class="search" id="search" placeholder="Search logos...">
<button class="btn">＋</button>
</header>

<div class="grid" id="grid"></div>

</main>

<!-- MOBILE NAV -->
<div class="bottom">
<div>🏠</div>
<div>📂</div>
<div>⚙️</div>
</div>

<script>
let db = [];

// generate demo (fast even for 2000)
for(let i=0;i<200;i++){
    db.push({
        name:"Logo "+i,
        url:"https://via.placeholder.com/150"
    });
}

function render(){
    const q=document.getElementById("search").value.toLowerCase();
    const grid=document.getElementById("grid");

    const list=db.filter(i=>i.name.toLowerCase().includes(q));

    grid.innerHTML=list.map(i=>`
        <div class="card">
            <div class="img"><img src="${i.url}" loading="lazy"></div>
            <div class="name">${i.name}</div>
        </div>
    `).join("");
}

document.getElementById("search").addEventListener("input",render);

function toggleTheme(){
    document.body.classList.toggle("dark");
}

render();
</script>

</body>
</html>
