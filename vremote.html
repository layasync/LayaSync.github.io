<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Samsung TV Remote</title>

<style>

body{
background:#0b0b0b;
color:white;
font-family:sans-serif;
text-align:center;
margin:0;
padding:20px;
}

h1{
margin-bottom:20px;
}

button{
width:90px;
height:60px;
margin:6px;
border-radius:14px;
border:none;
background:#1f1f1f;
color:white;
font-size:16px;
}

.big{
width:200px;
height:60px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
max-width:260px;
margin:auto;
}

input{
width:200px;
padding:12px;
border-radius:10px;
border:none;
background:#1c1c1c;
color:white;
}

</style>
</head>

<body>

<h1>Samsung TV Remote</h1>

<input id="ip" placeholder="TV IP Address">

<br><br>

<button class="big" onclick="connect()">CONNECT</button>

<div id="status"></div>

<h3>Navigation</h3>

<div class="grid">

<div></div>
<button onclick="key('KEY_UP')">▲</button>
<div></div>

<button onclick="key('KEY_LEFT')">◀</button>
<button onclick="key('KEY_ENTER')">OK</button>
<button onclick="key('KEY_RIGHT')">▶</button>

<div></div>
<button onclick="key('KEY_DOWN')">▼</button>
<div></div>

</div>

<h3>Volume</h3>

<button onclick="key('KEY_VOLDOWN')">Vol-</button>
<button onclick="key('KEY_MUTE')">Mute</button>
<button onclick="key('KEY_VOLUP')">Vol+</button>

<h3>Channel</h3>

<button onclick="key('KEY_CHDOWN')">CH-</button>
<button onclick="key('KEY_CHUP')">CH+</button>

<h3>System</h3>

<button onclick="key('KEY_HOME')">Home</button>
<button onclick="key('KEY_BACK')">Back</button>
<button onclick="key('KEY_MENU')">Menu</button>
<button onclick="key('KEY_SOURCE')">Source</button>
<button onclick="key('KEY_POWER')">Power</button>

<script>

const WORKER="https://stalkerhtml.layasync.workers.dev"

function connect(){

let ip=document.getElementById("ip").value

if(!ip){
alert("Enter TV IP")
return
}

fetch(`${WORKER}/connect?ip=${ip}`)
.then(r=>r.text())
.then(t=>{
document.getElementById("status").innerText=t
})

}

function key(code){

fetch(`${WORKER}/key?key=${code}`)

}

</script>

</body>
</html>
