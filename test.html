<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LayaSync | Digital Archive Authority</title>
    <style>
        :root {
            --bg: #ffffff; --text: #1c1c1e; --accent: #007aff; --pill: #f2f2f7;
            --sidebar-silver: linear-gradient(180deg, #e5e5ea 0%, #d1d1d6 100%);
            --glass: rgba(255, 255, 255, 0.95);
        }
        @media (prefers-color-scheme: dark) {
            :root { --bg: #000000; --text: #ffffff; --pill: #1c1c1e; --sidebar-silver: linear-gradient(180deg, #2c2c2e 0%, #1c1c1e 100%); --glass: rgba(0, 0, 0, 0.9); }
        }

        /* --- HARDWARE ACCELERATED BASE --- */
        * { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
        html, body { margin: 0; padding: 0; width: 100vw; height: 100%; overflow-x: hidden; background: var(--bg); color: var(--text); }

        /* --- SILVER SIDEBAR (MANUAL) --- */
        .sidebar {
            width: 280px; height: 100vh; background: var(--sidebar-silver);
            position: fixed; left: -280px; top: 0; z-index: 4000;
            transition: transform 0.4s cubic-bezier(0.2, 1, 0.2, 1);
            padding: 50px 15px; border-right: 1px solid rgba(0,0,0,0.1); overflow-y: auto;
        }
        .sidebar.active { transform: translateX(280px); }
        .sidebar-header { font-size: 24px; font-weight: 800; margin-bottom: 25px; letter-spacing: -1px; }
        .nav-label { font-size: 10px; font-weight: 800; color: #888; margin: 20px 0 10px 5px; text-transform: uppercase; }
        .group-item {
            padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600;
            margin-bottom: 5px; background: rgba(255,255,255,0.4); display: flex; justify-content: space-between; align-items: center; font-size: 13px;
        }
        .group-item.active { background: var(--accent); color: white; }

        /* --- FIXED TOP SEARCH BAR --- */
        header {
            position: sticky; top: 0; z-index: 3000; width: 100%;
            background: var(--glass); backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid rgba(120,120,128,0.2); 
            padding: 12px 15px; display: flex; align-items: center; gap: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .search-box { flex: 1; background: var(--pill); border: none; padding: 12px; border-radius: 8px; font-size: 15px; color: var(--text); outline: none; }
        .btn-icon { background: var(--pill); border: none; width: 42px; height: 42px; border-radius: 8px; cursor: pointer; font-size: 18px; color: var(--text); display: flex; align-items: center; justify-content: center; }

        /* --- CONTENT --- */
        main { flex: 1; height: 100%; overflow-y: auto; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }

        /* --- STRICT 3-COLUMN GRID --- */
        .grid { display: grid; width: 100%; padding: 15px 12px; gap: 12px; margin: 0 auto; }
        .grid.logos { grid-template-columns: repeat(3, 1fr) !important; }
        .grid.setups { grid-template-columns: 1fr !important; }

        /* --- ASSET CARDS --- */
        .asset-card { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .img-container {
            width: 100%; aspect-ratio: 1/1; 
            display: flex; align-items: center; justify-content: center; 
            background: #fff; border-radius: 15px; margin-bottom: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 2px solid transparent; cursor: pointer;
        }
        .img-container img { max-width: 80%; max-height: 80%; object-fit: contain; }
        .asset-card.selected .img-container { border-color: var(--accent); background: rgba(0, 122, 255, 0.05); }

        .casing { width: 100%; background: var(--pill); padding: 8px; border-radius: 15px; display: flex; flex-direction: column; gap: 6px; }
        .name-field { width: 100%; border: none; background: transparent; text-align: center; font-size: 10px; font-weight: 800; color: var(--text); outline: none; }
        .copy-btn { background: var(--accent); color: white; border: none; padding: 8px; border-radius: 10px; font-size: 8px; font-weight: 900; text-transform: uppercase; cursor: pointer; }

        /* --- LANDSCAPE SETUPS --- */
        .setup-card { width: 100%; display: flex; flex-direction: column; margin-bottom: 25px; }
        .landscape-box { width: 100%; height: 220px; border-radius: 20px; overflow: hidden; background: #000; box-shadow: 0 10px 20px rgba(0,0,0,0.15); }
        .landscape-box img { width: 100%; height: 100%; object-fit: cover; }

        /* --- OVERLAY & TOAST --- */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 3500; display: none; }
        .overlay.active { display: block; }
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1d1d1f; color: white; padding: 12px 25px; border-radius: 50px; font-size: 12px; font-weight: 700; transition: 0.4s; z-index: 9999; }
        #toast.active { transform: translateX(-50%) translateY(0); }

        @media (max-width: 600px) { .landscape-box { height: 170px; } .grid { gap: 8px; padding: 15px 8px; } }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<nav class="sidebar" id="sidebar">
    <div class="sidebar-header">LayaSync Admin</div>
    <div class="nav-label">Mode Selection</div>
    <div class="group-item active" id="nav-logos" onclick="setTab('logos')">📂 Logo Archive</div>
    <div class="group-item" id="nav-nuvio" onclick="setTab('setups')">📱 Nuvio Setups</div>

    <div id="catArea">
        <div class="nav-label">Groups</div>
        <div id="groupList"></div>
        <div style="display:flex; gap:5px; margin-top:10px;">
            <input type="text" id="newGrp" placeholder="Add Group..." style="flex:1; border:none; padding:10px; border-radius:10px; outline:none; background:var(--bg); font-size:12px;">
            <button onclick="addGroup()" style="background:var(--accent); color:white; border:none; padding:10px 15px; border-radius:10px; font-weight:800;">+</button>
        </div>
    </div>

    <div class="nav-label">Cloud Sync</div>
    <input type="password" id="ghToken" placeholder="GitHub Token" style="width: 100%; padding: 12px; border-radius: 10px; border: none; margin-bottom: 10px; outline: none; background:#fff;">
    <button onclick="cloudSync()" id="syncBtn" style="width: 100%; background: #34c759; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 800; cursor: pointer;">☁️ SYNC TO CLOUD</button>
</nav>

<main>
    <header>
        <button class="btn-icon" onclick="toggleSidebar()">☰</button>
        <input type="text" id="search" class="search-box" placeholder="Search archive..." onkeyup="renderUI()">
        <button id="multiBtn" class="btn-icon" onclick="toggleMultiSelect()">🔘</button>
    </header>
    <div class="grid logos" id="mainGrid"></div>
</main>

<div id="toast">Ready</div>

<script>
    let db = []; let setups = [];
    let currentTab = 'logos'; let activeG = 'All';
    let selectedSet = new Set(); let isMulti = false;

    // GITHUB INFO
    const G_USER = 'layasync';
    const G_REPO = 'LayaSync.github.io';

    async function init() {
        setTab('logos'); // Render UI structure immediately
        const v = Date.now();
        try {
            const [lRes, sRes] = await Promise.all([
                fetch(`https://raw.githubusercontent.com/${G_USER}/${G_REPO}/main/logo.json?v=${v}`).then(r => r.json()),
                fetch(`https://raw.githubusercontent.com/${G_USER}/${G_REPO}/main/setups.json?v=${v}`).then(r => r.json())
            ]);
            db = lRes; setups = sRes;
            document.getElementById('ghToken').value = localStorage.getItem('ls_token') || '';
            renderGroups(); renderUI();
        } catch(e) { console.error("Initial load failed"); }
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }

    function setTab(tab) {
        currentTab = tab; activeG = 'All';
        document.getElementById('nav-logos').classList.toggle('active', tab === 'logos');
        document.getElementById('nav-nuvio').classList.toggle('active', tab === 'setups');
        document.getElementById('catArea').style.display = tab === 'logos' ? 'block' : 'none';
        document.getElementById('mainGrid').className = `grid ${tab}`;
        renderGroups(); renderUI();
        if(window.innerWidth < 600 && document.getElementById('sidebar').classList.contains('active')) toggleSidebar();
    }

    function renderGroups() {
        const list = document.getElementById('groupList');
        if(!list) return;
        const categories = [...new Set(db.filter(i => i.group).map(i => i.group))];
        list.innerHTML = `<div class="group-item ${activeG==='All'?'active':''}" onclick="setG('All')">📂 All Logos</div>`;
        categories.forEach(g => {
            list.innerHTML += `<div class="group-item ${activeG===g?'active':''}" onclick="setG('${g}')">
                <span>🏷️ ${g}</span>
                <button onclick="deleteG(event, '${g}')" style="color:red; background:none; border:none; font-weight:800; cursor:pointer;">✕</button>
            </div>`;
        });
    }

    function setG(g) {
        if (isMulti && g !== 'All') {
            selectedSet.forEach(url => { const item = db.find(i => i.url === url); if (item) item.group = g; });
            showToast(`Items Categorized`); toggleMultiSelect();
        }
        activeG = g; renderGroups(); renderUI();
    }

    function addGroup() {
        const name = document.getElementById('newGrp').value.trim();
        if (name) { db.push({ name: "Dummy", url: "", group: name }); document.getElementById('newGrp').value = ''; renderGroups(); }
    }

    function deleteG(e, g) {
        e.stopPropagation();
        if (prompt("Password:") === "123") { db = db.filter(i => i.group !== g); renderGroups(); setG('All'); }
    }

    function renderUI() {
        const grid = document.getElementById('mainGrid');
        const q = document.getElementById('search').value.toLowerCase();

        if (currentTab === 'logos') {
            const filtered = db.filter(i => i.url && (i.name.toLowerCase().includes(q) || (i.group || '').toLowerCase().includes(q)) && (activeG === 'All' || i.group === activeG));
            grid.innerHTML = filtered.map(i => `
                <div class="asset-card ${selectedSet.has(i.url)?'selected':''}" onclick="handleCardClick('${i.url}')">
                    <div class="img-container"><img src="${i.url}" loading="eager"></div>
                    <div class="casing">
                        <input class="name-field" value="${i.name}" onchange="updateName('${i.url}', this.value)" onclick="event.stopPropagation()">
                        <button class="copy-btn" onclick="event.stopPropagation(); copyLink('${i.url}')">Copy Link</button>
                    </div>
                </div>
            `).join('');
        } else {
            const filtered = setups.filter(i => i.name.toLowerCase().includes(q));
            grid.innerHTML = filtered.map(i => `
                <div class="setup-card">
                    <div class="landscape-box"><img src="${i.screenshot}" loading="eager"></div>
                    <div class="casing">
                        <input class="name-field" style="font-size:14px;" value="${i.name}" onchange="updateSName('${i.screenshot}', this.value)">
                        ${i.files ? i.files.map(f => `<a href="${f.url}" download class="copy-btn" style="padding:12px; margin-top:5px;">⬇️ DOWNLOAD JSON COLLECTION</a>`).join('') : ''}
                    </div>
                </div>
            `).join('');
        }
    }

    function toggleMultiSelect() { if(currentTab !== 'logos') return; isMulti = !isMulti; selectedSet.clear(); document.getElementById('multiBtn').style.background = isMulti ? 'var(--accent)' : 'var(--pill)'; renderUI(); }
    function handleCardClick(url) { if (isMulti) { if (selectedSet.has(url)) selectedSet.delete(url); else selectedSet.add(url); renderUI(); } }
    function updateName(url, val) { const item = db.find(i => i.url === url); if (item) item.name = val; }
    function updateSName(src, val) { const item = setups.find(i => i.screenshot === src); if (item) item.name = val; }

    // --- REENGINEERED CLOUD SYNC (ULTIMATE) ---
    async function cloudSync() {
    const token = document.getElementById('ghToken').value;
    if (!token) return alert("Enter Token First");
    localStorage.setItem('ls_token', token);

    const btn = document.getElementById('syncBtn');
    const filename = currentTab === 'logos' ? 'logo.json' : 'setups.json';
    const dataToSave = currentTab === 'logos'
        ? db.filter(i => i.url !== "")
        : setups;

    btn.innerText = "Syncing...";
    btn.disabled = true;

    try {
        const apiUrl = `https://api.github.com/repos/${G_USER}/${G_REPO}/contents/${filename}`;

        // 🔥 STEP 1: Get latest SHA (with cache bypass)
        let sha = null;
        const getRes = await fetch(apiUrl + "?t=" + Date.now(), {
            headers: { Authorization: `token ${token}` }
        });

        if (getRes.ok) {
            const meta = await getRes.json();
            sha = meta.sha;
        }

        // 🔥 STEP 2: Encode safely
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(dataToSave, null, 2))));

        // 🔥 STEP 3: Build body (works for both create + update)
        const body = {
            message: `LayaSync Cloud Update: ${filename}`,
            content: content
        };

        if (sha) body.sha = sha; // only include if exists

        // 🔥 STEP 4: Push
        const putRes = await fetch(apiUrl, {
            method: 'PUT',
            headers: {
                Authorization: `token ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(body)
        });

        const result = await putRes.json();

        if (!putRes.ok) throw new Error(result.message);

        showToast("✅ Global Cloud Updated!");

    } catch (e) {
        alert("GitHub Error: " + e.message);
    } finally {
        btn.innerText = "☁️ SYNC TO CLOUD";
        btn.disabled = false;
    }
}

    function copyLink(url) { navigator.clipboard.writeText(url); showToast("Link Copied!"); }
    function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.classList.add('active'); setTimeout(() => t.classList.remove('active'), 2000); }

    init();
</script>
</body>
</html>
