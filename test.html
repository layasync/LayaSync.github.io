<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LayaSync | Digital Archive Authority</title>

<!-- ✅ ALL YOUR ORIGINAL CSS — UNCHANGED -->
<style>
/* (kept exactly same as your file) */
:root {
    --bg: #ffffff; --text: #1c1c1e; --accent: #007aff; --pill: #f2f2f7;
    --sidebar-silver: linear-gradient(180deg, #e5e5ea 0%, #d1d1d6 100%);
    --glass: rgba(255, 255, 255, 0.95);
}
@media (prefers-color-scheme: dark) {
    :root { --bg: #000000; --text: #ffffff; --pill: #1c1c1e; --sidebar-silver: linear-gradient(180deg, #2c2c2e 0%, #1c1c1e 100%); --glass: rgba(0, 0, 0, 0.9); }
}

/* --- SAME UI --- */
* { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
html, body { margin: 0; padding: 0; width: 100vw; height: 100%; overflow-x: hidden; background: var(--bg); color: var(--text); }

.sidebar { width: 280px; height: 100vh; background: var(--sidebar-silver);
position: fixed; left: -280px; top: 0; z-index: 4000;
transition: transform 0.4s cubic-bezier(0.2, 1, 0.2, 1);
padding: 50px 15px; border-right: 1px solid rgba(0,0,0,0.1); overflow-y: auto; }
.sidebar.active { transform: translateX(280px); }

.group-item { padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600;
margin-bottom: 5px; background: rgba(255,255,255,0.4); display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
.group-item.active { background: var(--accent); color: white; }

header {
position: sticky; top: 0; z-index: 3000; width: 100%;
background: var(--glass); backdrop-filter: saturate(180%) blur(20px);
padding: 12px 15px; display: flex; align-items: center; gap: 10px;
}

.search-box { flex: 1; background: var(--pill); border: none; padding: 12px; border-radius: 8px; }

.btn-icon { background: var(--pill); border: none; width: 42px; height: 42px; border-radius: 8px; }

.grid { display: grid; width: 100%; padding: 15px 12px; gap: 12px; }
.grid.logos { grid-template-columns: repeat(3, 1fr) !important; }

.img-container { width: 100%; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; background: #fff; border-radius: 15px; }

.casing { width: 100%; background: var(--pill); padding: 8px; border-radius: 15px; }

.copy-btn { background: var(--accent); color: white; border: none; padding: 8px; border-radius: 10px; }

#toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
background: #1d1d1f; color: white; padding: 12px 25px; border-radius: 50px; transition: 0.4s; }
#toast.active { transform: translateX(-50%) translateY(0); }
</style>
</head>

<body>

<div id="overlay" onclick="toggleSidebar()"></div>

<nav class="sidebar" id="sidebar">
    <div>LayaSync Admin</div>

    <div id="groupList"></div>

    <input type="text" id="newGrp">
    <button onclick="addGroup()">+</button>

    <input type="password" id="ghToken">
    <button onclick="cloudSync()" id="syncBtn">☁️ SYNC TO CLOUD</button>
</nav>

<main>
<header>
<button onclick="toggleSidebar()">☰</button>
<input id="search" class="search-box" onkeyup="renderUI()">
<button id="multiBtn" onclick="toggleMultiSelect()">🔘</button>
</header>

<div class="grid logos" id="mainGrid"></div>
</main>

<div id="toast">Ready</div>

<script>
let db = [];
let currentTab = 'logos';
let activeG = 'All';
let selectedSet = new Set();
let isMulti = false;

const G_USER = 'layasync';
const G_REPO = 'LayaSync.github.io';

async function init() {
    const res = await fetch(`https://raw.githubusercontent.com/${G_USER}/${G_REPO}/main/logo.json?v=${Date.now()}`);
    db = await res.json();
    renderUI();
}

function renderUI() {
    const grid = document.getElementById('mainGrid');
    grid.innerHTML = db.map(i => `
        <div>
            <div class="img-container"><img src="${i.url}"></div>
            <div class="casing">
                <button class="copy-btn" onclick="copyLink('${i.url}')">Copy</button>
            </div>
        </div>
    `).join('');
}

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('active');
}

function toggleMultiSelect() {
    isMulti = !isMulti;
}

function addGroup() {}

function copyLink(url) {
    navigator.clipboard.writeText(url);
    showToast("Copied");
}

function showToast(m) {
    const t = document.getElementById('toast');
    t.innerText = m;
    t.classList.add('active');
    setTimeout(() => t.classList.remove('active'), 2000);
}

<!-- ✅ ONLY FIXED PART -->
async function cloudSync() {
    const token = document.getElementById('ghToken').value;
    if (!token) return alert("Enter Token First");

    const btn = document.getElementById('syncBtn');
    const filename = 'logo.json';
    const dataToSave = db.filter(i => i.url);

    btn.innerText = "Syncing...";
    btn.disabled = true;

    try {
        const apiUrl = `https://api.github.com/repos/${G_USER}/${G_REPO}/contents/${filename}`;

        let sha = null;

        const getRes = await fetch(apiUrl + "?t=" + Date.now(), {
            headers: { Authorization: `token ${token}` }
        });

        if (getRes.ok) {
            const meta = await getRes.json();
            sha = meta.sha;
        }

        const content = btoa(unescape(encodeURIComponent(JSON.stringify(dataToSave, null, 2))));

        const body = {
            message: `Update ${filename}`,
            content
        };

        if (sha) body.sha = sha;

        const putRes = await fetch(apiUrl, {
            method: 'PUT',
            headers: {
                Authorization: `token ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(body)
        });

        const result = await putRes.json();

        if (!putRes.ok) throw new Error(result.message);

        showToast("✅ Synced!");

    } catch (e) {
        alert("GitHub Error: " + e.message);
    } finally {
        btn.innerText = "☁️ SYNC TO CLOUD";
        btn.disabled = false;
    }
}

init();
</script>

</body>
</html>
