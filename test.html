<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LayaSync</title>

<meta name="theme-color" content="#121212">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@500;700;900&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;font-family:'Roboto',sans-serif;-webkit-tap-highlight-color:transparent}
body{margin:0;min-height:100vh;background:linear-gradient(180deg,#6b2f24,#121212 60%);color:#fff;padding-bottom:180px}
.header{text-align:center;padding:14px 0;font-weight:900;letter-spacing:.8px}
.cover-wrap{display:flex;justify-content:center;padding:12px}
.cover{width:88%;max-width:320px;aspect-ratio:1/1;border-radius:14px;overflow:hidden;box-shadow:0 22px 60px rgba(0,0,0,.75)}
.cover img{width:100%;height:100%;object-fit:cover}
.info{padding:16px;padding-bottom:80px}
.track{font-size:22px;font-weight:900}
.artist{margin-top:4px;font-size:15px;font-weight:700;opacity:.9}
.seek-wrap{margin-top:18px}
.seek-track{position:relative;width:100%;height:4px;background:rgba(255,255,255,.25);border-radius:2px}
.seek-fill{position:absolute;height:100%;width:0;background:#fff;border-radius:2px}
#seek{position:absolute;inset:0;width:100%;opacity:0}
.time{display:flex;justify-content:space-between;margin-top:6px;font-size:12px;font-weight:700;opacity:.85}
.controls{margin-top:36px;display:flex;align-items:center;justify-content:space-between}
.icon-btn{width:26px;height:26px;opacity:.75}
.icon-btn.active{opacity:1}
.play{width:76px;height:76px;background:#fff;color:#000;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:900}
.lyric-bar{position:fixed;left:16px;right:16px;bottom:calc(16px + env(safe-area-inset-bottom,0px) + 24px);padding:16px 20px;background:linear-gradient(180deg,rgba(58,34,28,.98),rgba(36,21,18,.98));border-radius:18px;font-size:15px;font-weight:900;box-shadow:0 14px 40px rgba(0,0,0,.7)}
</style>
</head>

<body>

<div class="header">PLAYING FROM NFC</div>

<div class="cover-wrap">
  <div class="cover"><img id="coverImg"></div>
</div>

<div class="info">
  <div class="track" id="trackTitle"></div>
  <div class="artist" id="trackArtist"></div>

  <div class="seek-wrap">
    <div class="seek-track">
      <div class="seek-fill" id="seekFill"></div>
      <input type="range" id="seek" min="0" max="100">
    </div>
    <div class="time">
      <span id="current">0:00</span>
      <span id="duration">0:00</span>
    </div>
  </div>

  <div class="controls">
    <svg id="shuffle" class="icon-btn" viewBox="0 0 24 24" fill="white"><path d="M16 3h5v5h-2V6.41l-4.29 4.3-1.42-1.42 4.3-4.29H16V3z"/></svg>
    <svg id="prev" class="icon-btn" viewBox="0 0 24 24" fill="white"><path d="M6 6h2v12H6zm3.5 6L18 6v12z"/></svg>
    <div class="play" id="play">▶</div>
    <svg id="next" class="icon-btn" viewBox="0 0 24 24" fill="white"><path d="M16 6h2v12h-2zM6 6l8.5 6L6 18z"/></svg>
    <svg id="repeat" class="icon-btn" viewBox="0 0 24 24" fill="white">
      <path d="M7 7h10v3l4-4-4-4v3H7c-2.76 0-5 2.24-5 5v2h2V10c0-1.66 1.34-3 3-3z"/>
      <text id="repeatState" x="12" y="16" text-anchor="middle" font-size="10" font-weight="900"></text>
    </svg>
  </div>
</div>

<div class="lyric-bar" id="lyrics">Loading…</div>
<audio id="audio"></audio>

<script>
/* ---------- STATE ---------- */
let album = [];
let index = 0;
let lyricsData = [];
let repeatMode = 0;
let shuffleOn = false;

/* ---------- ELEMENTS ---------- */
const audio = document.getElementById("audio");
const playBtn = document.getElementById("play");
const prevBtn = document.getElementById("prev");
const nextBtn = document.getElementById("next");
const shuffleBtn = document.getElementById("shuffle");
const repeatBtn = document.getElementById("repeat");
const repeatState = document.getElementById("repeatState");
const seek = document.getElementById("seek");
const seekFill = document.getElementById("seekFill");
const lyricsBox = document.getElementById("lyrics");
const titleEl = document.getElementById("trackTitle");
const artistEl = document.getElementById("trackArtist");
const coverImg = document.getElementById("coverImg");
const current = document.getElementById("current");
const duration = document.getElementById("duration");

/* ---------- FETCH SONGS ---------- */
fetch("songs.json")
  .then(r => r.json())
  .then(data => {
    album = data;
    loadTrack(0);
  })
  .catch(e => {
    lyricsBox.textContent = "Failed to load songs";
    console.error(e);
  });

/* ---------- PLAYER ---------- */
audio.onplay = () => playBtn.textContent = "❚❚";
audio.onpause = () => playBtn.textContent = "▶";

function loadTrack(i) {
  const t = album[i];
  audio.src = t.audio;
  titleEl.textContent = t.title;
  artistEl.textContent = t.artist;
  coverImg.src = t.cover;

  lyricsData = [];
  lyricsBox.textContent = "Loading lyrics…";

  fetch(t.lrc)
    .then(r => r.text())
    .then(txt => {
      lyricsData = txt.split("\n").map(l => {
        const m = l.match(/\[(\d+):(\d+\.\d+)\](.*)/);
        return m ? { time:+m[1]*60 + +m[2], text:m[3].trim() } : null;
      }).filter(Boolean);
    });
}

playBtn.onclick = () => audio.paused ? audio.play() : audio.pause();
prevBtn.onclick = () => { index=(index-1+album.length)%album.length; loadTrack(index); audio.play(); };
nextBtn.onclick = () => { index=(index+1)%album.length; loadTrack(index); audio.play(); };

audio.ontimeupdate = () => {
  if (!audio.duration) return;
  const p = audio.currentTime / audio.duration * 100;
  seekFill.style.width = p + "%";
  seek.value = p;
  current.textContent = format(audio.currentTime);
  duration.textContent = format(audio.duration);

  for (let i = lyricsData.length - 1; i >= 0; i--) {
    if (audio.currentTime >= lyricsData[i].time) {
      lyricsBox.textContent = lyricsData[i].text;
      break;
    }
  }
};

seek.oninput = () => audio.currentTime = seek.value / 100 * audio.duration;
function format(t){return Math.floor(t/60)+":"+Math.floor(t%60).toString().padStart(2,"0")}
</script>

</body>
</html>
