<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV COMMANDER PRO V2</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --sidebar: rgba(15, 15, 15, 0.95);
            --accent: #007AFF;
            --danger: #FF3B30;
            --success: #34C759;
            --text: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            font-family: 'Roboto', sans-serif;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 0.8px;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            font-size: 10px;
        }

        .app-shell { display: flex; height: 100vh; }

        /* COLUMN 1: SOURCES */
        .col-sources {
            width: 70px; background: #000;
            display: flex; flex-direction: column;
            align-items: center; padding: 15px 0;
            border-right: 1px solid #1a1a1a;
            z-index: 100;
        }

        .source-icon {
            width: 44px; height: 44px; background: #111;
            border-radius: 12px; margin-bottom: 15px;
            cursor: pointer; display: flex; align-items: center;
            justify-content: center; border: 2px solid transparent;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .source-icon:hover { transform: scale(1.1); background: #222; }
        .source-icon.active { border-color: var(--accent); background: var(--accent); }
        .source-icon.add { color: var(--accent); border: 1px dashed #333; }

        /* COLUMN 2: CATEGORIES */
        .col-nav {
            width: 280px; background: var(--sidebar);
            backdrop-filter: blur(50px); display: flex;
            flex-direction: column; border-right: 1px solid #1a1a1a;
        }

        .traffic-lights { padding: 20px; display: flex; gap: 8px; }
        .light { width: 12px; height: 12px; border-radius: 50%; }

        .mode-switch { display: flex; padding: 0 15px 15px 15px; gap: 6px; }
        .mode-btn {
            flex: 1; padding: 10px; background: #1a1a1a;
            border-radius: 8px; text-align: center; cursor: pointer;
            font-size: 8px; color: rgba(255,255,255,0.3);
        }
        .mode-btn.active { background: var(--accent); color: #fff; }

        .cat-scroll { flex: 1; overflow-y: auto; padding: 10px; scrollbar-width: none; }
        .cat-item {
            padding: 12px 15px; margin-bottom: 4px;
            border-radius: 8px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            color: rgba(255,255,255,0.5); font-size: 9px;
        }
        .cat-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .cat-item.active { background: rgba(0, 122, 255, 0.15); color: var(--accent); }
        .cat-del { color: var(--danger); opacity: 0; padding: 5px; transition: 0.2s; }
        .cat-item:hover .cat-del { opacity: 1; }

        /* COLUMN 3: GRID */
        main { flex: 1; display: flex; flex-direction: column; background: #000; }
        header {
            height: 70px; padding: 0 25px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid #1a1a1a;
        }

        .search-bar {
            background: #0d0d0d; border: 1px solid #222;
            padding: 12px 20px; border-radius: 10px;
            width: 400px; color: #fff; font-size: 10px;
        }

        .grid {
            flex: 1; overflow-y: auto; padding: 25px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px; align-content: start;
        }

        .card {
            background: #0a0a0a; border-radius: 14px; padding: 15px;
            text-align: center; border: 1px solid #1a1a1a;
            transition: 0.2s; cursor: pointer;
        }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); background: #111; }
        .card img { width: 100%; aspect-ratio: 1; object-fit: contain; border-radius: 8px; margin-bottom: 12px; background: #000; }
        .card-name { font-size: 8px; height: 24px; overflow: hidden; line-height: 1.4; color: #eee; }

        /* MODALS */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center; z-index: 1000;
            backdrop-filter: blur(15px);
        }
        .modal {
            background: #111; padding: 40px; border-radius: 24px;
            width: 450px; border: 1px solid #222;
        }
        input, select {
            width: 100%; padding: 15px; margin: 10px 0;
            background: #000; border: 1px solid #333;
            color: #fff; border-radius: 10px; font-weight: 900; font-size: 10px;
        }
        .btn {
            width: 100%; padding: 15px; border-radius: 10px;
            border: none; cursor: pointer; color: #fff; font-weight: 900; font-size: 10px;
        }
        .btn-blue { background: var(--accent); }
        .btn-red { background: var(--danger); margin-top: 10px; }
        .btn-ghost { background: transparent; border: 1px solid #333; margin-top: 10px; }

        #loading {
            position: fixed; top: 25px; right: 25px;
            background: var(--accent); padding: 12px 25px;
            border-radius: 30px; display: none; z-index: 9999;
        }

        .stats { font-size: 8px; opacity: 0.4; margin-left: 20px; }
    </style>
</head>
<body ondragover="event.preventDefault()" ondrop="handleDrop(event)">

    <div id="loading">PROCESSING...</div>

    <!-- IMPORT MODAL -->
    <div class="modal-overlay" id="importModal" style="display: flex;">
        <div class="modal">
            <h2 style="text-align:center; margin-bottom:30px; letter-spacing: 3px;">IPTV COMMANDER</h2>
            <select id="importType" onchange="toggleFields()">
                <option value="xtream">XTREAM CODES API</option>
                <option value="m3u">M3U URL / FILE</option>
            </select>
            <div id="xtFields">
                <input type="text" id="xtHost" placeholder="SERVER URL">
                <input type="text" id="xtUser" placeholder="USERNAME">
                <input type="password" id="xtPass" placeholder="PASSWORD">
            </div>
            <div id="m3uFields" style="display:none;">
                <input type="text" id="m3uUrl" placeholder="M3U URL">
                <input type="file" id="m3uFile" accept=".m3u,.m3u8">
            </div>
            <button class="btn btn-blue" onclick="addPlaylist()">IMPORT PLAYLIST</button>
            <button class="btn btn-ghost" onclick="closeModal('importModal')" id="closeImp" style="display:none;">CANCEL</button>
        </div>
    </div>

    <!-- EDIT MODAL -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <div id="logoPreview" style="text-align:center; margin-bottom:20px;">
                <img id="modalImgPreview" src="" style="width:100px; height:100px; object-fit:contain; background:#000; border-radius:10px;">
            </div>
            <input type="text" id="editName" placeholder="NAME">
            <input type="text" id="editLogo" placeholder="LOGO URL" oninput="document.getElementById('modalImgPreview').src=this.value">
            <button class="btn btn-blue" onclick="saveEdit()">APPLY CHANGES</button>
            <button class="btn btn-red" onclick="deleteItem()">DELETE ITEM</button>
            <button class="btn btn-ghost" onclick="closeModal('editModal')">CANCEL</button>
        </div>
    </div>

    <div class="app-shell">
        <div class="col-sources" id="sourceBar">
            <div class="source-icon add" onclick="openModal('importModal')">+</div>
        </div>

        <div class="col-nav">
            <div class="traffic-lights">
                <div class="light" style="background:#FF5F56"></div>
                <div class="light" style="background:#FFBD2E"></div>
                <div class="light" style="background:#27C93F"></div>
            </div>
            <div class="mode-switch">
                <div class="mode-btn active" id="btn-live" onclick="setMode('live')">LIVE</div>
                <div class="mode-btn" id="btn-movie" onclick="setMode('movie')">VOD</div>
                <div class="mode-btn" id="btn-series" onclick="setMode('series')">SERIES</div>
            </div>
            <div class="cat-scroll" id="catList"></div>
        </div>

        <main>
            <header>
                <div style="display:flex; align-items:center;">
                    <div id="activeInfo" style="color:var(--accent)">READY</div>
                    <div class="stats" id="channelCount"></div>
                </div>
                <input type="text" class="search-bar" id="search" placeholder="SEARCH DIRECTORY..." oninput="handleSearch()">
                <div style="display:flex; gap:10px;">
                    <button class="btn btn-blue" style="width:auto; padding:8px 15px;" onclick="exportMasterM3U()">MASTER EXPORT</button>
                    <button class="btn btn-ghost" style="width:auto; padding:8px 15px; border-color:var(--accent);" onclick="exportM3U()">EXPORT CURRENT</button>
                </div>
            </header>
            <div class="grid" id="mainGrid"></div>
        </main>
    </div>

    <script>
        const PROXY = "https://layasync-proxy.layasync.workers.dev/?url=";
        let playlists = [];
        let activeIdx = -1;
        let activeMode = 'live'; 
        let activeCat = null;
        let editingId = null;

        const openModal = (id) => document.getElementById(id).style.display = 'flex';
        const closeModal = (id) => document.getElementById(id).style.display = 'none';

        function toggleFields() {
            const isXt = document.getElementById('importType').value === 'xtream';
            document.getElementById('xtFields').style.display = isXt ? 'block' : 'none';
            document.getElementById('m3uFields').style.display = isXt ? 'none' : 'block';
        }

        async function handleDrop(e) {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if (file) {
                document.getElementById('loading').style.display = 'block';
                const raw = await file.text();
                let data = { type: 'm3u', name: file.name, live: {cats:[], items:[]}, movie: {cats:[], items:[]}, series: {cats:[], items:[]} };
                parseM3U(raw, data);
                playlists.push(data);
                finalizeImport();
            }
        }

        async function addPlaylist() {
            const type = document.getElementById('importType').value;
            let data = { type, name: '', live: {cats:[], items:[]}, movie: {cats:[], items:[]}, series: {cats:[], items:[]} };
            document.getElementById('loading').style.display = 'block';

            try {
                if(type === 'xtream') {
                    const host = document.getElementById('xtHost').value;
                    const user = document.getElementById('xtUser').value;
                    const pass = document.getElementById('xtPass').value;
                    data.creds = { host, user, pass };
                    const eps = ['get_live_categories','get_live_streams','get_vod_categories','get_vod_streams','get_series_categories','get_series'];
                    const res = await Promise.all(eps.map(ep => fetch(`${PROXY}${encodeURIComponent(`${host}/player_api.php?username=${user}&password=${pass}&action=${ep}`)}`).then(r => r.json())));
                    data.live.cats = res[0]; data.live.items = res[1] || [];
                    data.movie.cats = res[2]; data.movie.items = res[3] || [];
                    data.series.cats = res[4]; data.series.items = res[5] || [];
                    data.name = new URL(host).hostname;
                } else {
                    const file = document.getElementById('m3uFile').files[0];
                    const url = document.getElementById('m3uUrl').value;
                    let raw = file ? await file.text() : await fetch(`${PROXY}${encodeURIComponent(url)}`).then(r => r.text());
                    data.name = file ? file.name : new URL(url).hostname;
                    parseM3U(raw, data);
                }
                playlists.push(data);
                finalizeImport();
            } catch(e) { alert("IMPORT FAILED"); }
            document.getElementById('loading').style.display = 'none';
        }

        function parseM3U(text, dataObj) {
            const lines = text.split('\n');
            const gMap = new Set();
            for (let i = 0; i < lines.length; i++) {
                let l = lines[i].trim();
                if (l.startsWith('#EXTINF:')) {
                    const url = lines[i + 1]?.trim();
                    if (url && !url.startsWith('#')) {
                        const name = (l.match(/,(.*)$/)?.[1] || "CHANNEL").trim();
                        const group = (l.match(/group-title="([^"]*)"/)?.[1] || "UNSORTED").trim();
                        const logo = (l.match(/tvg-logo="([^"]*)"/)?.[1] || "").trim();
                        dataObj.live.items.push({ stream_id: Math.random(), name, stream_icon: logo, category_id: group, url });
                        gMap.add(group);
                        i++;
                    }
                }
            }
            gMap.forEach(g => dataObj.live.cats.push({ category_id: g, category_name: g }));
        }

        function finalizeImport() {
            renderSources();
            closeModal('importModal');
            document.getElementById('closeImp').style.display = 'block';
            switchPlaylist(playlists.length - 1);
        }

        function renderSources() {
            const bar = document.getElementById('sourceBar');
            bar.innerHTML = '<div class="source-icon add" onclick="openModal(\'importModal\')">+</div>';
            playlists.forEach((p, idx) => {
                const div = document.createElement('div');
                div.className = `source-icon ${idx === activeIdx ? 'active' : ''}`;
                div.innerText = p.name.substring(0, 2);
                div.onclick = () => switchPlaylist(idx);
                bar.prepend(div);
            });
        }

        function switchPlaylist(idx) {
            activeIdx = idx; activeCat = null;
            renderSources();
            document.getElementById('activeInfo').innerText = playlists[idx].name;
            setMode('live');
        }

        function setMode(mode) {
            activeMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + mode).classList.add('active');
            activeCat = null;
            renderCategories();
            loadCategory(null);
        }

        function renderCategories() {
            const list = document.getElementById('catList'); list.innerHTML = "";
            if(activeIdx === -1) return;
            const current = playlists[activeIdx][activeMode];
            
            const createCat = (id, name) => {
                const div = document.createElement('div');
                div.className = `cat-item ${activeCat === id ? 'active' : ''}`;
                div.innerHTML = `<span>${name}</span><span class="cat-del" onclick="deleteCategory('${id}', event)">✕</span>`;
                div.onclick = () => loadCategory(id);
                list.appendChild(div);
            };

            createCat(null, "ALL CONTENT");
            current.cats.forEach(c => createCat(c.category_id, c.category_name));
        }

        function loadCategory(id) {
            activeCat = id;
            document.querySelectorAll('.cat-item').forEach(el => el.classList.remove('active'));
            renderCategories();
            const items = playlists[activeIdx][activeMode].items;
            const filtered = id ? items.filter(i => i.category_id == id) : items;
            document.getElementById('channelCount').innerText = `${filtered.length} ITEMS`;
            renderGrid(filtered);
        }

        function renderGrid(items) {
            const grid = document.getElementById('mainGrid'); grid.innerHTML = "";
            const frag = document.createDocumentFragment();
            items.slice(0, 1000).forEach(i => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openEdit(i);
                const img = i.stream_icon || i.cover || 'https://via.placeholder.com/200?text=NO+IMAGE';
                card.innerHTML = `<img src="${img}" loading="lazy"><div class="card-name">${i.name}</div>`;
                frag.appendChild(card);
            });
            grid.appendChild(frag);
        }

        function openEdit(item) {
            editingId = item.stream_id || item.series_id || item.vod_id;
            document.getElementById('editName').value = item.name;
            const logo = item.stream_icon || item.cover || '';
            document.getElementById('editLogo').value = logo;
            document.getElementById('modalImgPreview').src = logo || 'https://via.placeholder.com/200?text=NO+IMAGE';
            openModal('editModal');
        }

        function saveEdit() {
            const list = playlists[activeIdx][activeMode].items;
            const item = list.find(i => (i.stream_id || i.series_id || i.vod_id) == editingId);
            item.name = document.getElementById('editName').value;
            const newLogo = document.getElementById('editLogo').value;
            if(item.stream_icon !== undefined) item.stream_icon = newLogo;
            if(item.cover !== undefined) item.cover = newLogo;
            closeModal('editModal');
            loadCategory(activeCat); // RE-RENDERS AUTOMATICALLY
        }

        function deleteItem() {
            playlists[activeIdx][activeMode].items = playlists[activeIdx][activeMode].items.filter(i => (i.stream_id || i.series_id || i.vod_id) != editingId);
            closeModal('editModal');
            loadCategory(activeCat);
        }

        function deleteCategory(id, e) {
            e.stopPropagation();
            if(!confirm("DELETE ALL ITEMS IN THIS CATEGORY?")) return;
            playlists[activeIdx][activeMode].items = playlists[activeIdx][activeMode].items.filter(i => i.category_id != id);
            playlists[activeIdx][activeMode].cats = playlists[activeIdx][activeMode].cats.filter(c => c.category_id != id);
            loadCategory(null);
        }

        function handleSearch() {
            const q = document.getElementById('search').value.toLowerCase();
            const filtered = playlists[activeIdx][activeMode].items.filter(i => i.name.toLowerCase().includes(q));
            renderGrid(filtered);
        }

        function exportM3U() {
            const p = playlists[activeIdx];
            downloadM3U([p], p.name);
        }

        function exportMasterM3U() {
            downloadM3U(playlists, "MASTER_MERGED");
        }

        function downloadM3U(plistArray, filename) {
            let m3u = "#EXTM3U\n";
            plistArray.forEach(p => {
                ['live', 'movie', 'series'].forEach(mode => {
                    p[mode].items.forEach(i => {
                        let url = i.url || `${p.creds.host}/${mode==='live'?'':'movie/'}${p.creds.user}/${p.creds.pass}/${i.stream_id||i.series_id||i.vod_id}${mode==='live'?'.ts':'.mp4'}`;
                        m3u += `#EXTINF:-1 tvg-logo="${i.stream_icon||i.cover||''}" group-title="${i.category_id||mode}",${i.name}\n${url}\n`;
                    });
                });
            });
            const b = new Blob([m3u], {type: 'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(b); a.download = `${filename}_Export.m3u`; a.click();
        }
    </script>
</body>
</html>
