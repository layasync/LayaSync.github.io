<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LayaSync Music Card</title>

<style>
:root {
  --bg: #0b0b0d;
  --card: rgba(30,30,35,0.85);
  --text: #f5f5f5;
  --muted: #b5b5b5;
}

* {
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display",
               "Inter", sans-serif;
}

body {
  margin: 0;
  background: radial-gradient(circle at top, #1b1b22, var(--bg));
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.player {
  width: 92%;
  max-width: 380px;
  background: var(--card);
  border-radius: 28px;
  padding: 22px;
  box-shadow: 0 40px 80px rgba(0,0,0,0.6);
  backdrop-filter: blur(20px);
}

/* ===== ALBUM ART ===== */
.cover {
  width: 100%;
  aspect-ratio: 1 / 1;
  border-radius: 22px;
  overflow: hidden;
  box-shadow: 0 25px 60px rgba(0,0,0,0.6);
}

.cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ===== TEXT ===== */
.title {
  text-align: center;
  margin-top: 18px;
  font-size: 28px;
  font-weight: 600;
  color: var(--text);
}

.artist {
  text-align: center;
  margin-top: 6px;
  font-size: 14px;
  color: var(--muted);
}

/* ===== PLAY BUTTON ===== */
.play-btn {
  width: 76px;
  height: 76px;
  margin: 22px auto;
  border-radius: 50%;
  background: #f0f0f0;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  box-shadow: 0 15px 30px rgba(0,0,0,0.4);
}

.play-btn span {
  font-size: 26px;
  color: #111;
}

/* ===== PROGRESS ===== */
.progress {
  width: 100%;
  height: 4px;
  background: rgba(255,255,255,0.2);
  border-radius: 2px;
  overflow: hidden;
}

.progress-bar {
  width: 0%;
  height: 100%;
  background: #fff;
}

/* ===== LYRICS ===== */
.lyrics {
  margin-top: 22px;
  font-size: 13px;
  line-height: 1.7;
  color: var(--muted);
  text-align: center;
  min-height: 48px;
  filter: blur(0.3px);
}

/* ===== CONTROLS ===== */
.controls {
  margin-top: 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: #cfcfcf;
}

.controls span {
  font-size: 20px;
  cursor: pointer;
}

</style>
</head>

<body>

<div class="player">

  <!-- 🖼️ BANNER / ALBUM IMAGE -->
  <!-- Replace src with your album art URL -->
  <div class="cover">
    <img src="BANNER_IMAGE_URL_HERE.jpg">
  </div>

  <!-- 🎵 TITLE / ARTIST -->
  <div class="title">Ethereal Sunset</div>
  <div class="artist">Artist Name</div>

  <!-- ▶️ PLAY BUTTON -->
  <div class="play-btn" id="playBtn">
    <span id="playIcon">▶</span>
  </div>

  <!-- ⏱️ PROGRESS BAR -->
  <div class="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <!-- 📄 LYRICS -->
  <div class="lyrics" id="lyrics">
    Tap play to begin the journey…
  </div>

  <!-- ⏮️ ⏯️ ⏭️ -->
  <div class="controls">
    <span>⟲</span>
    <span>⏮</span>
    <span>⏸</span>
    <span>⏭</span>
    <span>⟳</span>
  </div>

  <!-- 🎵 AUDIO FILE -->
  <!-- Replace src with your MP3 / WAV link -->
  <audio id="audio" src="AUDIO_FILE_URL_HERE.mp3"></audio>

</div>

<script>
/* ===== AUDIO ===== */
const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");
const playIcon = document.getElementById("playIcon");
const progressBar = document.getElementById("progressBar");
const lyricsBox = document.getElementById("lyrics");

let lyrics = [];

/* ▶️ PLAY / PAUSE */
playBtn.onclick = () => {
  if (audio.paused) {
    audio.play();
    playIcon.textContent = "❚❚";
  } else {
    audio.pause();
    playIcon.textContent = "▶";
  }
};

/* ⏱️ PROGRESS UPDATE */
audio.ontimeupdate = () => {
  progressBar.style.width =
    (audio.currentTime / audio.duration) * 100 + "%";
  syncLyrics();
};

/* 📄 LOAD LRC FILE */
fetch("LRC_FILE_URL_HERE.lrc")  // ← ADD YOUR .LRC LINK HERE
  .then(res => res.text())
  .then(text => {
    lyrics = text.split("\n").map(line => {
      const match = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
      if (!match) return null;
      return {
        time: parseInt(match[1]) * 60 + parseFloat(match[2]),
        text: match[3]
      };
    }).filter(Boolean);
  });

/* 🎼 SYNC LYRICS */
function syncLyrics() {
  for (let i = lyrics.length - 1; i >= 0; i--) {
    if (audio.currentTime >= lyrics[i].time) {
      lyricsBox.textContent = lyrics[i].text;
      break;
    }
  }
}
</script>

</body>
</html>
