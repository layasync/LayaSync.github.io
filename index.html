<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LayaSync Player</title>

<meta name="theme-color" content="#121212">
<meta name="mobile-web-app-capable" content="yes">

<style>
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Inter, sans-serif;
}

body {
  margin: 0;
  background: linear-gradient(180deg, #6b2f24, #121212 55%);
  color: #fff;
}

/* ===== HEADER ===== */
.header {
  padding: 14px 16px;
  text-align: center;
}

.header-title {
  font-size: 14px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.6px;
}

/* ===== COVER ===== */
.cover-wrap {
  padding: 16px;
  display: flex;
  justify-content: center;
}

.cover {
  width: 88%;
  max-width: 320px;
  aspect-ratio: 1 / 1;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.75);
}

.cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ===== INFO ===== */
.info {
  padding: 16px;
}

.track {
  font-size: 22px;
  font-weight: 700;
  color: #fff;
}

.artist {
  margin-top: 6px;
  font-size: 15px;
  font-weight: 700;
  opacity: 0.85;
}

/* ===== PROGRESS ===== */
.progress {
  margin-top: 14px;
}

.bar {
  width: 100%;
  height: 4px;
  background: rgba(255,255,255,0.25);
  border-radius: 2px;
  overflow: hidden;
}

.fill {
  height: 100%;
  width: 0%;
  background: #fff;
}

.time {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  font-weight: 700;
  opacity: 0.85;
  margin-top: 6px;
}

/* ===== CONTROLS ===== */
.controls {
  margin-top: 22px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.controls span {
  font-size: 22px;
  font-weight: 700;
  color: #fff;
  opacity: 0.85;
}

.play {
  width: 68px;
  height: 68px;
  background: #fff;
  color: #000;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  font-weight: 700;
}

/* ===== SHUFFLE & REPEAT ===== */
.control-btn {
  opacity: 0.6;
  transition: opacity 0.2s, transform 0.2s;
}

.control-btn.active {
  opacity: 1;
  transform: scale(1.1);
}

/* ===== LYRICS ===== */
.lyrics {
  margin: 30px 16px 40px;
  font-size: 15px;
  font-weight: 700;
  text-align: center;
  min-height: 40px;
  opacity: 0.9;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="header-title">PLAYING FROM NFC</div>
</div>

<!-- COVER -->
<div class="cover-wrap">
  <div class="cover">
    <img src="https://raw.githubusercontent.com/layasync/LayaSync.github.io/016682fcf4fb252427df4fd8ad36ba9631854b04/file_0000000074e871f8b1ee14529973b836.png">
  </div>
</div>

<!-- INFO -->
<div class="info">
  <div class="track">Lose My Mind</div>
  <div class="artist">Don Toliver, Doja Cat</div>

  <!-- PROGRESS -->
  <div class="progress">
    <div class="bar">
      <div class="fill" id="fill"></div>
    </div>
    <div class="time">
      <span id="current">0:00</span>
      <span id="duration">0:00</span>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <span id="shuffle" class="control-btn">🔀</span>
    <span>⏮</span>
    <div class="play" id="play">▶</div>
    <span>⏭</span>
    <span id="repeat" class="control-btn">🔁</span>
  </div>
</div>

<!-- LYRICS -->
<div class="lyrics" id="lyrics">
  Tap play to begin…
</div>

<!-- AUDIO -->
<audio id="audio"
src="https://github.com/layasync/LayaSync.github.io/raw/refs/heads/Music/Don%20Toliver%20-%20Lose%20My%20Mind%20(feat.%20Doja%20Cat)%20%5BFrom%20F1%C2%AE%20The%20Movie%5D%20%5BOfficial%20Audio%5D(MP3_160K).mp3">
</audio>

<script>
const audio = document.getElementById("audio");
const play = document.getElementById("play");
const fill = document.getElementById("fill");
const current = document.getElementById("current");
const duration = document.getElementById("duration");
const lyricsBox = document.getElementById("lyrics");
const shuffleBtn = document.getElementById("shuffle");
const repeatBtn = document.getElementById("repeat");

let lyrics = [];
let isShuffle = false;
let isRepeat = false;

/* PLAY / PAUSE */
play.onclick = () => {
  if (audio.paused) {
    audio.play();
    play.textContent = "❚❚";
  } else {
    audio.pause();
    play.textContent = "▶";
  }
};

/* META */
audio.onloadedmetadata = () => {
  duration.textContent = format(audio.duration);
};

audio.ontimeupdate = () => {
  fill.style.width = (audio.currentTime / audio.duration) * 100 + "%";
  current.textContent = format(audio.currentTime);
  syncLyrics();
};

/* SHUFFLE */
shuffleBtn.onclick = () => {
  isShuffle = !isShuffle;
  shuffleBtn.classList.toggle("active", isShuffle);
};

/* REPEAT */
repeatBtn.onclick = () => {
  isRepeat = !isRepeat;
  audio.loop = isRepeat;
  repeatBtn.classList.toggle("active", isRepeat);
};

/* FORMAT TIME */
function format(t) {
  const m = Math.floor(t / 60);
  const s = Math.floor(t % 60).toString().padStart(2,"0");
  return `${m}:${s}`;
}

/* LOAD LRC */
fetch("https://raw.githubusercontent.com/layasync/LayaSync.github.io/refs/heads/lrc/Don%20Toliver%20-%20Lose%20My%20Mind%20(feat.%20Doja%20Cat).lrc")
  .then(r => r.text())
  .then(t => {
    lyrics = t.split("\n").map(l => {
      const m = l.match(/\[(\d+):(\d+\.\d+)\](.*)/);
      if (!m) return null;
      return { time: +m[1]*60 + +m[2], text: m[3] };
    }).filter(Boolean);
  });

function syncLyrics() {
  for (let i = lyrics.length - 1; i >= 0; i--) {
    if (audio.currentTime >= lyrics[i].time) {
      lyricsBox.textContent = lyrics[i].text;
      break;
    }
  }
}
</script>

</body>
</html>
