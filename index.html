<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LayaSync</title>

<meta name="theme-color" content="#121212">

<!-- Roboto -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@500;700;900&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
  font-family: 'Roboto', sans-serif;
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  min-height: 100vh;
  background: linear-gradient(180deg, #6b2f24, #121212 60%);
  color: #fff;
}

/* ===== HEADER ===== */
.header {
  text-align: center;
  padding: 14px 0;
  font-weight: 900;
  letter-spacing: 0.8px;
}

/* ===== COVER ===== */
.cover-wrap {
  display: flex;
  justify-content: center;
  padding: 12px;
}

.cover {
  width: 88%;
  max-width: 320px;
  aspect-ratio: 1/1;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 22px 60px rgba(0,0,0,0.75);
}

.cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ===== INFO ===== */
.info {
  padding: 16px;
}

.track {
  font-size: 22px;
  font-weight: 900;
}

.artist {
  margin-top: 4px;
  font-size: 15px;
  font-weight: 700;
  opacity: 0.9;
}

/* ===== SEEK BAR ===== */
.seek-wrap {
  margin-top: 18px;
}

.seek-track {
  position: relative;
  width: 100%;
  height: 4px;
  background: rgba(255,255,255,0.25);
  border-radius: 2px;
}

.seek-fill {
  position: absolute;
  height: 100%;
  width: 0%;
  background: #fff;
  border-radius: 2px;
}

#seek {
  position: absolute;
  inset: 0;
  width: 100%;
  opacity: 0;
  cursor: pointer;
}

#seek::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  background: #fff;
  border-radius: 50%;
}

.time {
  display: flex;
  justify-content: space-between;
  margin-top: 6px;
  font-size: 12px;
  font-weight: 700;
  opacity: 0.85;
}

/* ===== CONTROLS ===== */
.controls {
  margin-top: 26px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.icon-btn {
  width: 26px;
  height: 26px;
  opacity: 0.7;
}

.icon-btn.active {
  opacity: 1;
}

.play {
  width: 72px;
  height: 72px;
  background: #fff;
  color: #000;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  font-weight: 900;
}

/* ===== LYRICS MINI BAR ===== */
.lyric-bar {
  position: fixed;
  left: 12px;
  right: 12px;
  bottom: 16px;
  padding: 14px 18px;
  background: rgba(40,40,40,0.95);
  border-radius: 14px;
  font-size: 15px;
  font-weight: 900;
  color: #fff;
  text-align: left;
  box-shadow: 0 12px 40px rgba(0,0,0,0.6);
}
</style>
</head>

<body>

<div class="header">PLAYING FROM NFC</div>

<div class="cover-wrap">
  <div class="cover">
    <img src="https://raw.githubusercontent.com/layasync/LayaSync.github.io/016682fcf4fb252427df4fd8ad36ba9631854b04/file_0000000074e871f8b1ee14529973b836.png">
  </div>
</div>

<div class="info">
  <div class="track">Lose My Mind</div>
  <div class="artist">Don Toliver, Doja Cat</div>

  <!-- SEEK -->
  <div class="seek-wrap">
    <div class="seek-track">
      <div class="seek-fill" id="seekFill"></div>
      <input type="range" id="seek" min="0" max="100" value="0">
    </div>
    <div class="time">
      <span id="current">0:00</span>
      <span id="duration">0:00</span>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <div></div>

    <div class="play" id="play">▶</div>

    <!-- Repeat -->
    <svg id="repeat" class="icon-btn" viewBox="0 0 24 24" fill="white">
      <path d="M7 7h10v3l4-4-4-4v3H7c-2.76 0-5 2.24-5 5v2h2V10c0-1.66 1.34-3 3-3zm10 10H7v-3l-4 4 4 4v-3h10c2.76 0 5-2.24 5-5v-2h-2v2c0 1.66-1.34 3-3 3z"/>
      <text id="repeatState" x="12" y="16" text-anchor="middle"
            font-size="10" font-weight="900" fill="white"></text>
    </svg>
  </div>
</div>

<!-- LYRICS BAR -->
<div class="lyric-bar" id="lyrics">
  Tap play to begin…
</div>

<audio id="audio"
src="https://github.com/layasync/LayaSync.github.io/raw/refs/heads/Music/Don%20Toliver%20-%20Lose%20My%20Mind%20(feat.%20Doja%20Cat)%20%5BFrom%20F1%C2%AE%20The%20Movie%5D%20%5BOfficial%20Audio%5D(MP3_160K).mp3">
</audio>

<script>
const audio = document.getElementById("audio");
const play = document.getElementById("play");
const seek = document.getElementById("seek");
const seekFill = document.getElementById("seekFill");
const current = document.getElementById("current");
const duration = document.getElementById("duration");
const lyricsBox = document.getElementById("lyrics");
const repeatBtn = document.getElementById("repeat");
const repeatState = document.getElementById("repeatState");

let lyrics = [];
let repeatMode = 0; // 0 = off, 1 = album, 2 = one

/* PLAY */
play.onclick = () => {
  if (audio.paused) {
    audio.play();
    play.textContent = "❚❚";
  } else {
    audio.pause();
    play.textContent = "▶";
  }
};

/* META */
audio.onloadedmetadata = () => {
  duration.textContent = format(audio.duration);
};

/* TIME UPDATE */
audio.ontimeupdate = () => {
  const p = (audio.currentTime / audio.duration) * 100;
  seek.value = p;
  seekFill.style.width = p + "%";
  current.textContent = format(audio.currentTime);
  syncLyrics();
};

seek.oninput = () => {
  audio.currentTime = (seek.value / 100) * audio.duration;
};

/* REPEAT LOGIC (Spotify-style) */
repeatBtn.onclick = () => {
  repeatMode = (repeatMode + 1) % 3;

  if (repeatMode === 0) {
    audio.loop = false;
    repeatState.textContent = "";
    repeatBtn.classList.remove("active");
  }

  if (repeatMode === 1) {
    audio.loop = false; // album mode (future-ready)
    repeatState.textContent = ".";
    repeatBtn.classList.add("active");
  }

  if (repeatMode === 2) {
    audio.loop = true; // song loop
    repeatState.textContent = "1";
    repeatBtn.classList.add("active");
  }
};

/* LYRICS */
fetch("https://raw.githubusercontent.com/layasync/LayaSync.github.io/refs/heads/lrc/Don%20Toliver%20-%20Lose%20My%20Mind%20(feat.%20Doja%20Cat).lrc")
.then(r => r.text())
.then(t => {
  lyrics = t.split("\n").map(l => {
    const m = l.match(/\[(\d+):(\d+\.\d+)\](.*)/);
    if (!m) return null;
    return { time: +m[1]*60 + +m[2], text: m[3] };
  }).filter(Boolean);
});

function syncLyrics() {
  for (let i = lyrics.length - 1; i >= 0; i--) {
    if (audio.currentTime >= lyrics[i].time) {
      lyricsBox.textContent = lyrics[i].text;
      break;
    }
  }
}

function format(t) {
  const m = Math.floor(t / 60);
  const s = Math.floor(t % 60).toString().padStart(2,"0");
  return `${m}:${s}`;
}
</script>

</body>
</html>
