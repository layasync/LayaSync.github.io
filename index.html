<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LayaSync Player</title>

<meta name="theme-color" content="#121212">
<meta name="mobile-web-app-capable" content="yes">

<style>
* {
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Inter, sans-serif;
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  background: linear-gradient(180deg, #5b2e24, #121212 55%);
  color: #fff;
}

/* ===== TOP BAR ===== */
.header {
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.header span {
  font-size: 18px;
  opacity: 0.9;
}

.header-title {
  font-size: 13px;
  opacity: 0.7;
  flex: 1;
  text-align: center;
}

/* ===== COVER ===== */
.cover-wrap {
  padding: 16px;
  display: flex;
  justify-content: center;
}

.cover {
  width: 88%;
  max-width: 320px;
  aspect-ratio: 1 / 1;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7);
}

.cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ===== INFO ===== */
.info {
  padding: 16px;
}

.track {
  font-size: 20px;
  font-weight: 600;
}

.artist {
  margin-top: 6px;
  font-size: 14px;
  opacity: 0.7;
}

/* ===== PROGRESS ===== */
.progress {
  margin-top: 14px;
}

.bar {
  width: 100%;
  height: 4px;
  background: rgba(255,255,255,0.2);
  border-radius: 2px;
  overflow: hidden;
}

.fill {
  height: 100%;
  width: 0%;
  background: #fff;
}

.time {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  opacity: 0.6;
  margin-top: 6px;
}

/* ===== CONTROLS ===== */
.controls {
  margin-top: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.controls span {
  font-size: 22px;
  opacity: 0.85;
}

.play {
  width: 64px;
  height: 64px;
  background: #fff;
  color: #000;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
}

/* ===== LYRICS ===== */
.lyrics {
  margin: 28px 16px 80px;
  font-size: 15px;
  opacity: 0.85;
  text-align: center;
  min-height: 40px;
}

/* ===== BOTTOM BAR ===== */
.bottom {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #121212;
  padding: 12px 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 18px;
  border-top: 1px solid rgba(255,255,255,0.08);
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <span>⌄</span>
  <div class="header-title">PLAYING FROM NFC</div>
  <span>⋮</span>
</div>

<!-- COVER -->
<div class="cover-wrap">
  <div class="cover">
    <!-- 🖼️ CHANGE IMAGE -->
    <img src="https://raw.githubusercontent.com/layasync/LayaSync.github.io/016682fcf4fb252427df4fd8ad36ba9631854b04/file_0000000074e871f8b1ee14529973b836.png">
  </div>
</div>

<!-- INFO -->
<div class="info">
  <div class="track">Lose My Mind</div>
  <div class="artist">Artist Name</div>

  <!-- PROGRESS -->
  <div class="progress">
    <div class="bar">
      <div class="fill" id="fill"></div>
    </div>
    <div class="time">
      <span id="current">0:00</span>
      <span id="duration">0:00</span>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <span>🔀</span>
    <span>⏮</span>
    <div class="play" id="play">▶</div>
    <span>⏭</span>
    <span>🔁</span>
  </div>
</div>

<!-- LYRICS -->
<div class="lyrics" id="lyrics">
  Tap play to begin…
</div>

<!-- BOTTOM BAR -->
<div class="bottom">
  <span>📱</span>
  <span>🔗</span>
  <span>≡</span>
</div>

<!-- AUDIO -->
<audio id="audio" src="AUDIO_FILE.mp3"></audio>

<script>
const audio = document.getElementById("audio");
const play = document.getElementById("play");
const fill = document.getElementById("fill");
const current = document.getElementById("current");
const duration = document.getElementById("duration");
const lyricsBox = document.getElementById("lyrics");

let lyrics = [];

play.onclick = () => {
  if (audio.paused) {
    audio.play();
    play.textContent = "❚❚";
  } else {
    audio.pause();
    play.textContent = "▶";
  }
};

audio.onloadedmetadata = () => {
  duration.textContent = format(audio.duration);
};

audio.ontimeupdate = () => {
  fill.style.width = (audio.currentTime / audio.duration) * 100 + "%";
  current.textContent = format(audio.currentTime);
  syncLyrics();
};

function format(t) {
  const m = Math.floor(t / 60);
  const s = Math.floor(t % 60).toString().padStart(2,"0");
  return `${m}:${s}`;
}

/* LRC */
fetch("LYRICS.lrc")
  .then(r => r.text())
  .then(t => {
    lyrics = t.split("\n").map(l => {
      const m = l.match(/\[(\d+):(\d+\.\d+)\](.*)/);
      if (!m) return null;
      return { time: +m[1]*60 + +m[2], text: m[3] };
    }).filter(Boolean);
  });

function syncLyrics() {
  for (let i = lyrics.length - 1; i >= 0; i--) {
    if (audio.currentTime >= lyrics[i].time) {
      lyricsBox.textContent = lyrics[i].text;
      break;
    }
  }
}
</script>

</body>
</html>
