<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LayaSync</title>

<meta name="theme-color" content="#121212">

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@500;700;900&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
  font-family: 'Roboto', sans-serif;
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  min-height: 100vh;
  background: linear-gradient(180deg, #6b2f24, #121212 60%);
  color: #fff;
  padding-bottom: 180px; /* space for lyrics bar + nav */
}

/* HEADER */
.header {
  text-align: center;
  padding: 14px 0;
  font-weight: 900;
  letter-spacing: 0.8px;
}

/* COVER */
.cover-wrap {
  display: flex;
  justify-content: center;
  padding: 12px;
}

.cover {
  width: 88%;
  max-width: 320px;
  aspect-ratio: 1/1;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 22px 60px rgba(0,0,0,0.75);
}

.cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* INFO */
.info {
  padding: 16px;
  padding-bottom: 80px; /* 🔥 THIS lifts the controls bar up */
}

.track {
  font-size: 22px;
  font-weight: 900;
}

.artist {
  margin-top: 4px;
  font-size: 15px;
  font-weight: 700;
  opacity: 0.9;
}

/* SEEK BAR */
.seek-wrap {
  margin-top: 18px;
}

.seek-track {
  position: relative;
  width: 100%;
  height: 4px;
  background: rgba(255,255,255,0.25);
  border-radius: 2px;
}

.seek-fill {
  position: absolute;
  height: 100%;
  width: 0%;
  background: #fff;
  border-radius: 2px;
}

#seek {
  position: absolute;
  inset: 0;
  width: 100%;
  opacity: 0;
  cursor: pointer;
}

.time {
  display: flex;
  justify-content: space-between;
  margin-top: 6px;
  font-size: 12px;
  font-weight: 700;
  opacity: 0.85;
}

/* CONTROLS */
.controls {
  margin-top: 36px; /* slightly more breathing room */
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.icon-btn {
  width: 26px;
  height: 26px;
  opacity: 0.75;
}

.icon-btn.active {
  opacity: 1;
}

.play {
  width: 76px;
  height: 76px;
  background: #fff;
  color: #000;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  font-weight: 900;
}

/* LYRICS BAR (UNCHANGED) */
.lyric-bar {
  position: fixed;
  left: 16px;
  right: 16px;
  bottom: calc(16px + env(safe-area-inset-bottom, 0px) + 24px);
  padding: 16px 20px;
  background: linear-gradient(
    180deg,
    rgba(58,34,28,0.98),
    rgba(36,21,18,0.98)
  );
  border-radius: 18px;
  font-size: 15px;
  font-weight: 900;
  color: #fff;
  box-shadow: 0 14px 40px rgba(0,0,0,0.7);
}
</style>
</head>

<body>

<div class="header">PLAYING FROM NFC</div>

<div class="cover-wrap">
  <div class="cover">
    <img src="https://raw.githubusercontent.com/layasync/LayaSync.github.io/016682fcf4fb252427df4fd8ad36ba9631854b04/file_0000000074e871f8b1ee14529973b836.png">
  </div>
</div>

<div class="info">
  <div class="track">Lose My Mind</div>
  <div class="artist">Don Toliver, Doja Cat</div>

  <!-- SEEK -->
  <div class="seek-wrap">
    <div class="seek-track">
      <div class="seek-fill" id="seekFill"></div>
      <input type="range" id="seek" min="0" max="100" value="0">
    </div>
    <div class="time">
      <span id="current">0:00</span>
      <span id="duration">0:00</span>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <!-- Shuffle -->
    <svg id="shuffle" class="icon-btn" viewBox="0 0 24 24" fill="white">
      <path d="M16 3h5v5h-2V6.41l-4.29 4.3-1.42-1.42 4.3-4.29H16V3zM3 6h5l3.5 3.5-1.42 1.42L7.17 8H3V6zm5 10h5v2H8v-2zm9.59-1.59L13.3 18.7l1.42 1.42 4.29-4.3V18h2v-5h-5v2h2.59z"/>
    </svg>

    <!-- Previous -->
    <svg class="icon-btn" viewBox="0 0 24 24" fill="white">
      <path d="M6 6h2v12H6zm3.5 6L18 6v12z"/>
    </svg>

    <!-- Play -->
    <div class="play" id="play">▶</div>

    <!-- Next -->
    <svg class="icon-btn" viewBox="0 0 24 24" fill="white">
      <path d="M16 6h2v12h-2zM6 6l8.5 6L6 18z"/>
    </svg>

    <!-- Repeat -->
    <svg id="repeat" class="icon-btn" viewBox="0 0 24 24" fill="white">
      <path d="M7 7h10v3l4-4-4-4v3H7c-2.76 0-5 2.24-5 5v2h2V10c0-1.66 1.34-3 3-3zm10 10H7v-3l-4 4 4 4v-3h10c2.76 0 5-2.24 5-5v-2h-2v2c0 1.66-1.34 3-3 3z"/>
      <text id="repeatState" x="12" y="16" text-anchor="middle"
            font-size="10" font-weight="900" fill="white"></text>
    </svg>
  </div>
</div>

<!-- LYRICS BAR -->
<div class="lyric-bar" id="lyrics">
  Tap play to begin…
</div>

<audio id="audio"
src="https://github.com/layasync/LayaSync.github.io/raw/refs/heads/Music/Don%20Toliver%20-%20Lose%20My%20Mind%20(feat.%20Doja%20Cat)%20%5BFrom%20F1%C2%AE%20The%20Movie%5D%20%5BOfficial%20Audio%5D(MP3_160K).mp3">
</audio>

<script>
const audio = document.getElementById("audio");
const play = document.getElementById("play");
const seek = document.getElementById("seek");
const seekFill = document.getElementById("seekFill");
const current = document.getElementById("current");
const duration = document.getElementById("duration");
const lyricsBox = document.getElementById("lyrics");
const repeatBtn = document.getElementById("repeat");
const repeatState = document.getElementById("repeatState");
const shuffleBtn = document.getElementById("shuffle");

let lyrics = [];
let repeatMode = 0;
let shuffleOn = false;

/* PLAY */
play.onclick = () => {
  if (audio.paused) {
    audio.play();
    play.textContent = "❚❚";
  } else {
    audio.pause();
    play.textContent = "▶";
  }
};

audio.onloadedmetadata = () => {
  duration.textContent = format(audio.duration);
};

audio.ontimeupdate = () => {
  const p = (audio.currentTime / audio.duration) * 100;
  seek.value = p;
  seekFill.style.width = p + "%";
  current.textContent = format(audio.currentTime);
  syncLyrics();
};

seek.oninput = () => {
  audio.currentTime = (seek.value / 100) * audio.duration;
};

shuffleBtn.onclick = () => {
  shuffleOn = !shuffleOn;
  shuffleBtn.classList.toggle("active", shuffleOn);
};

repeatBtn.onclick = () => {
  repeatMode = (repeatMode + 1) % 3;
  if (repeatMode === 0) {
    audio.loop = false;
    repeatState.textContent = "";
  }
  if (repeatMode === 1) {
    audio.loop = false;
    repeatState.textContent = ".";
  }
  if (repeatMode === 2) {
    audio.loop = true;
    repeatState.textContent = "1";
  }
};

fetch("https://raw.githubusercontent.com/layasync/LayaSync.github.io/refs/heads/lrc/Don%20Toliver%20-%20Lose%20My%20Mind%20(feat.%20Doja%20Cat).lrc")
.then(r => r.text())
.then(t => {
  lyrics = t.split("\n").map(l => {
    const m = l.match(/\[(\d+):(\d+\.\d+)\](.*)/);
    if (!m) return null;
    return { time: +m[1]*60 + +m[2], text: m[3] };
  }).filter(Boolean);
});

function syncLyrics() {
  for (let i = lyrics.length - 1; i >= 0; i--) {
    if (audio.currentTime >= lyrics[i].time) {
      lyricsBox.textContent = lyrics[i].text;
      break;
    }
  }
}

function format(t) {
  const m = Math.floor(t / 60);
  const s = Math.floor(t % 60).toString().padStart(2,"0");
  return `${m}:${s}`;
}
</script>

</body>
</html>
