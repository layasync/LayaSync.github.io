<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LayaSync</title>

<!-- PWA polish (optional but good) -->
<meta name="theme-color" content="#0b0b0d">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
:root {
  --bg: #0b0b0d;
  --cardTop: rgba(32,32,38,0.9);
  --cardBottom: rgba(18,18,22,0.95);
  --text: #f2f2f2;
  --muted: #9a9a9a;
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Inter, sans-serif;
}

body {
  margin: 0;
  min-height: 100vh;
  background:
    radial-gradient(circle at top, #1c1c24, var(--bg));
  display: flex;
  justify-content: center;
  align-items: center;
}

/* ===== PLAYER CARD ===== */
.player {
  width: 92%;
  max-width: 390px;
  padding: 22px;
  border-radius: 32px;
  background: linear-gradient(180deg, var(--cardTop), var(--cardBottom));
  box-shadow:
    0 40px 90px rgba(0,0,0,0.8),
    inset 0 1px 0 rgba(255,255,255,0.05);
  backdrop-filter: blur(26px);
}

/* ===== COVER ===== */
.cover {
  position: relative;
  width: 100%;
  aspect-ratio: 1 / 1;
  border-radius: 26px;
  overflow: hidden;
  box-shadow:
    0 28px 60px rgba(0,0,0,0.75),
    inset 0 0 0 1px rgba(255,255,255,0.05);
}

.cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* subtle gloss */
.cover::after {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 60%);
}

/* ===== TEXT ===== */
.title {
  margin-top: 18px;
  text-align: center;
  font-size: 30px;
  font-weight: 600;
  color: var(--text);
}

.artist {
  margin-top: 6px;
  text-align: center;
  font-size: 14px;
  color: var(--muted);
}

/* ===== PLAY BUTTON ===== */
.play-wrap {
  display: flex;
  justify-content: center;
  margin: 24px 0;
}

.play-btn {
  width: 78px;
  height: 78px;
  border-radius: 50%;
  background: #f2f2f2;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow:
    0 18px 40px rgba(0,0,0,0.5),
    inset 0 -2px 6px rgba(0,0,0,0.25);
  cursor: pointer;
}

.play-btn span {
  font-size: 26px;
  color: #111;
}

/* ===== PROGRESS ===== */
.progress {
  height: 4px;
  width: 100%;
  background: rgba(255,255,255,0.15);
  border-radius: 2px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #fff, #cfcfcf);
}

/* ===== LYRICS ===== */
.lyrics {
  margin-top: 20px;
  min-height: 48px;
  text-align: center;
  font-size: 13px;
  line-height: 1.7;
  color: var(--muted);
  opacity: 0.9;
}

/* ===== CONTROLS ===== */
.controls {
  margin-top: 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: #cfcfcf;
}

.controls span {
  font-size: 20px;
}
</style>
</head>

<body>

<div class="player">

  <!-- 🖼️ ALBUM IMAGE -->
  <!-- Replace this -->
  <div class="cover">
    <img src="https://upload.wikimedia.org/wikipedia/en/a/a3/Don_Toliver_-_Lose_My_Mind.png">
  </div>

  <!-- 🎵 TITLE -->
  <div class="title">Lose My Mind</div>
  <div class="artist">Artist</div>

  <!-- ▶️ PLAY -->
  <div class="play-wrap">
    <div class="play-btn" id="playBtn">
      <span id="playIcon">▶</span>
    </div>
  </div>

  <!-- ⏱️ PROGRESS -->
  <div class="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <!-- 🎼 LYRICS -->
  <div class="lyrics" id="lyrics">
    Tap play to begin the journey…
  </div>

  <!-- 🎚️ CONTROLS (visual only) -->
  <div class="controls">
    <span>⟲</span>
    <span>⏮</span>
    <span>⏸</span>
    <span>⏭</span>
    <span>⟳</span>
  </div>

  <!-- 🎵 AUDIO -->
  <!-- Replace this -->
  <audio id="audio" src="AUDIO_FILE_URL.mp3"></audio>

</div>

<script>
const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");
const playIcon = document.getElementById("playIcon");
const progressBar = document.getElementById("progressBar");
const lyricsBox = document.getElementById("lyrics");

let lyrics = [];

/* PLAY / PAUSE */
playBtn.onclick = () => {
  if (audio.paused) {
    audio.play();
    playIcon.textContent = "❚❚";
  } else {
    audio.pause();
    playIcon.textContent = "▶";
  }
};

/* PROGRESS */
audio.ontimeupdate = () => {
  progressBar.style.width =
    (audio.currentTime / audio.duration) * 100 + "%";
  syncLyrics();
};

/* LOAD LRC */
fetch("LYRICS_FILE.lrc")  // 👈 PUT YOUR .LRC FILE URL
  .then(r => r.text())
  .then(text => {
    lyrics = text.split("\n").map(line => {
      const m = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
      if (!m) return null;
      return {
        time: (+m[1] * 60) + (+m[2]),
        text: m[3]
      };
    }).filter(Boolean);
  });

function syncLyrics() {
  for (let i = lyrics.length - 1; i >= 0; i--) {
    if (audio.currentTime >= lyrics[i].time) {
      lyricsBox.textContent = lyrics[i].text;
      break;
    }
  }
}
</script>

</body>
</html>
