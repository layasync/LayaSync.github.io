<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LayaSync Music Card</title>

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    color: white;
  }

  .card {
    width: 100%;
    max-width: 360px;
    padding: 20px;
    text-align: center;
  }

  .cover {
    width: 100%;
    border-radius: 18px;
    margin-bottom: 16px;
  }

  h1 {
    font-size: 18px;
    margin: 8px 0 12px;
    opacity: 0.9;
  }

  iframe {
    width: 100%;
    height: 60px;
    border: none;
    border-radius: 12px;
    background: #111;
  }
</style>
</head>

<body>

<div class="card">

  <!-- COVER IMAGE -->
  <img
    src="https://upload.wikimedia.org/wikipedia/en/3/37/Lost_In_the_Fire_Gesaffelstein_Single_Cover.png"
    class="cover"
    alt="Cover"
  >

  <h1>Music Card</h1>

  <!-- GOOGLE DRIVE PLAYER (ONLY WORKING WAY WITH DRIVE) -->
  <iframe
    src="https://drive.google.com/file/d/1spC6zHFXXykGULp-yupUqqTeUHZNU-W3/preview"
    allow="autoplay">
  </iframe>

</div>

</body>
</html>
