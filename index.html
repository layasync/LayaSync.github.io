<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>LayaSync Player</title>

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, "San Francisco", sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
  }

  .player {
    width: 100%;
    max-width: 380px;
    padding: 24px;
    text-align: center;
  }

  .cover {
    width: 100%;
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
  }

  .title {
    margin-top: 18px;
    font-size: 20px;
    font-weight: 600;
  }

  .artist {
    font-size: 14px;
    opacity: 0.7;
    margin-top: 4px;
  }

  .progress-container {
    margin: 22px 0 8px;
  }

  input[type="range"] {
    width: 100%;
    appearance: none;
    height: 4px;
    background: #333;
    border-radius: 10px;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #fff;
  }

  .time {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    opacity: 0.6;
  }

  .controls {
    margin-top: 26px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 30px;
  }

  .btn {
    font-size: 28px;
    cursor: pointer;
    user-select: none;
  }

  .play {
    font-size: 44px;
  }
</style>
</head>

<body>

<div class="player">

  <!-- COVER -->
  <img
    src="https://upload.wikimedia.org/wikipedia/en/3/37/Lost_In_the_Fire_Gesaffelstein_Single_Cover.png"
    class="cover"
  >

  <!-- META -->
  <div class="title">Lost in the Fire</div>
  <div class="artist">Gesaffelstein & The Weeknd</div>

  <!-- AUDIO -->
  <audio id="audio">
    <source src="https://fine.sunproxy.net/file/YXlCSUozZDU2dmo4cnpHRCtJYmVnejRvdVZnMGVESE9wc05HdExuK3hsL2VRNHYyZHIyQjI2UkJJTFVVRCtVQWN1MUN0ak94Vnl3QStCakxTK1lmSGZMSEdKVHE2R2dHKzZaTGZtK1RWN3c9/Gesaffelstein_The_Weekend_dj_Jammer_-_Lost_In_The_Fire_Slow_d_And_Throw_d_(SkySound.cc).mp3">
  </audio>

  

</body>
</html>
