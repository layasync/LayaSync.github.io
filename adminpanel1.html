<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LayaSync Admin</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body {
  background:#121212;
  color:#fff;
  font-family:Roboto, system-ui, sans-serif;
  padding:20px;
}
h2 { margin-bottom:10px; }

input, button {
  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:12px;
  border:none;
  font-size:15px;
}

button {
  background:#fff;
  color:#000;
  font-weight:900;
}

pre {
  background:#1e1e1e;
  padding:14px;
  border-radius:12px;
  white-space:pre-wrap;
}

.cover-preview {
  width:100%;
  max-width:200px;
  margin:12px auto;
  display:none;
  border-radius:12px;
}
</style>
</head>

<body>

<h2>LayaSync Admin Panel (GitHub MP3)</h2>

<input id="audio" placeholder="Paste GitHub RAW MP3 URL">
<button onclick="readFromUrl()">Fetch Metadata</button>

<img id="coverPreview" class="cover-preview">

<input id="title" placeholder="Song Title">
<input id="artist" placeholder="Artist">
<input id="lrc" placeholder="LRC URL">
<input id="cover" placeholder="Cover Image URL">

<button onclick="addSong()">Add Song</button>

<pre id="output">Waiting…</pre>

<script src="https://cdn.jsdelivr.net/npm/jsmediatags@3.9.7/dist/jsmediatags.min.js"></script>

<script>
let songs = [];

/* READ MP3 FROM URL */
function readFromUrl() {
  const url = audio.value.trim();
  if (!url) {
    alert("Paste MP3 URL first");
    return;
  }

  jsmediatags.read(url, {
    onSuccess: tag => {
      /* TITLE */
      if (tag.tags.title) {
        title.value = tag.tags.title;
      }

      /* ARTIST */
      if (tag.tags.artist) {
        artist.value = tag.tags.artist;
      }

      /* COVER */
      const pic = tag.tags.picture;
      if (pic) {
        const bytes = new Uint8Array(pic.data);
        const blob = new Blob([bytes], { type: pic.format });
        const imgUrl = URL.createObjectURL(blob);

        coverPreview.src = imgUrl;
        coverPreview.style.display = "block";

        cover.value = "UPLOAD_COVER_AND_PASTE_URL";
      } else {
        alert("No embedded cover found");
      }
    },
    onError: err => {
      console.error(err);
      alert("Failed to read MP3 metadata");
    }
  });
}

/* ADD SONG TO JSON */
function addSong() {
  const song = {
    title: title.value.trim(),
    artist: artist.value.trim(),
    audio: audio.value.trim(),
    lrc: lrc.value.trim(),
    cover: cover.value.trim()
  };

  songs.push(song);

  output.textContent = JSON.stringify(
    { tracks: songs },
    null,
    2
  );
}
</script>

</body>
</html>
