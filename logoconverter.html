<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LayaSync Auto-Title Converter</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f5f5f7; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 700px; }
        textarea { width: 100%; height: 200px; border: 1px solid #ddd; border-radius: 12px; padding: 15px; font-family: monospace; font-size: 13px; outline: none; margin-bottom: 20px; }
        button { background: #007aff; color: white; border: none; padding: 15px 30px; border-radius: 12px; font-weight: 600; cursor: pointer; width: 100%; font-size: 16px; }
        button:hover { background: #0056b3; }
        #output { background: #1e1e1e; color: #9cdcfe; margin-top: 20px; }
        h2 { margin-top: 0; font-weight: 700; letter-spacing: -0.5px; }
    </style>
</head>
<body>

<div class="box">
    <h2>Bulk Link Converter</h2>
    <p style="color: #666; font-size: 14px;">Paste your ImgBB links below (one per line):</p>
    
    <textarea id="inputLinks" placeholder="https://i.ibb.co/.../Netflix.png&#10;https://i.ibb.co/.../Disney.png"></textarea>
    
    <button onclick="processLinks()">Convert to JSON Code</button>

    <p style="color: #666; font-size: 14px; margin-top: 20px;">Resulting JSON:</p>
    <textarea id="output" readonly></textarea>
</div>

<script>
    function processLinks() {
        const input = document.getElementById('inputLinks').value.trim();
        const lines = input.split('\n');
        const results = [];

        lines.forEach(line => {
            const url = line.trim();
            if (url) {
                // Get filename from URL
                // Example: https://i.ibb.co/xtg/Netflix.png -> Netflix.png
                let fileName = url.substring(url.lastIndexOf('/') + 1);
                
                // Remove extension (.png, .jpg, etc)
                // Example: Netflix.png -> Netflix
                let title = fileName.split('.')[0];

                // Capitalize first letter (optional)
                title = title.charAt(0).toUpperCase() + title.slice(1);

                results.push({
                    name: title,
                    category: "Logos",
                    url: url
                });
            }
        });

        document.getElementById('output').value = JSON.stringify(results, null, 2);
    }
</script>

</body>
</html>
