<!DOCTYPE html>
<html lang="en">
<head>
    <title>Link to JSON Converter</title>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #f0f0f0; }
        textarea { width: 100%; height: 150px; margin-bottom: 10px; border-radius: 8px; padding: 10px; }
        button { padding: 10px 20px; background: #007aff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #output { background: #222; color: #0f0; padding: 20px; border-radius: 8px; white-space: pre-wrap; margin-top: 20px; }
    </style>
</head>
<body>
    <h2>Logo JSON Generator</h2>
    <p>Enter Name and Direct Link (separated by comma) - One per line:</p>
    <textarea id="inputData" placeholder="Google, https://i.ibb.co/link1.png&#10;Apple, https://i.ibb.co/link2.png"></textarea>
    <button onclick="generateJSON()">Generate JSON Code</button>

    <div id="output">JSON will appear here...</div>

    <script>
        function generateJSON() {
            const input = document.getElementById('inputData').value;
            const lines = input.split('\n');
            const result = [];

            lines.forEach(line => {
                if(line.trim() !== "") {
                    const parts = line.split(',');
                    result.push({
                        name: parts[0].trim(),
                        category: "General",
                        url: parts[1].trim()
                    });
                }
            });

            document.getElementById('output').innerText = JSON.stringify(result, null, 2);
        }
    </script>
</body>
</html>
