<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Careless Whisper – Player</title>

<style>
:root {
  --accent: #ffffff;
  --muted: #bdbdbd;
}

* {
  box-sizing: border-box;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  color: white;
  background: black;
}

/* ===== Dynamic Background ===== */
.bg {
  position: fixed;
  inset: 0;
  background-image: url("https://upload.wikimedia.org/wikipedia/en/1/10/Careless_Whisper_UK_single.jpg");
  background-size: cover;
  background-position: center;
  filter: blur(40px) brightness(0.55);
  transform: scale(1.2);
  z-index: -2;
}

.bg-overlay {
  position: fixed;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.2),
    rgba(0,0,0,0.75)
  );
  z-index: -1;
}

/* ===== Top Bar ===== */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px;
}

.topbar svg {
  width: 22px;
  height: 22px;
  fill: white;
}

.toggle {
  display: flex;
  background: rgba(255,255,255,0.12);
  border-radius: 20px;
  overflow: hidden;
}

.toggle span {
  padding: 6px 14px;
  font-size: 14px;
  opacity: 0.6;
}

.toggle .active {
  background: rgba(255,255,255,0.2);
  opacity: 1;
}

/* ===== Album Art ===== */
.album-wrap {
  display: flex;
  justify-content: center;
  margin-top: 20px;
}

.album {
  width: 78%;
  max-width: 320px;
  border-radius: 14px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

/* ===== Song Info ===== */
.info {
  text-align: center;
  margin-top: 24px;
}

.info h1 {
  font-size: 22px;
  margin: 0;
}

.info p {
  margin: 6px 0 0;
  color: var(--muted);
}

/* ===== Progress ===== */
.progress {
  padding: 20px;
}

.bar {
  height: 4px;
  background: rgba(255,255,255,0.25);
  border-radius: 4px;
  position: relative;
}

.bar span {
  position: absolute;
  left: 0;
  top: 0;
  height: 100%;
  width: 8%;
  background: white;
  border-radius: 4px;
}

.time {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  margin-top: 6px;
  color: var(--muted);
}

/* ===== Controls ===== */
.controls {
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 10px 24px;
}

.controls svg {
  width: 26px;
  height: 26px;
  fill: white;
  opacity: 0.9;
}

.play {
  width: 64px;
  height: 64px;
  background: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.play svg {
  fill: black;
  width: 30px;
  height: 30px;
}

/* ===== Bottom Tabs ===== */
.tabs {
  position: absolute;
  bottom: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  padding: 14px 0;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);
  font-size: 14px;
}

.tabs span {
  color: var(--muted);
}

.tabs .active {
  color: white;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="bg-overlay"></div>

<!-- Top Bar -->
<div class="topbar">
  <!-- Down Arrow -->
  <svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>

  <div class="toggle">
    <span class="active">Song</span>
    <span>Video</span>
  </div>

  <div>
    <!-- Cast -->
    <svg viewBox="0 0 24 24"><path d="M1 18v3h3c0-1.7-1.3-3-3-3zm0-4v2c2.8 0 5 2.2 5 5h2c0-3.9-3.1-7-7-7zm0-4v2c5 0 9 4 9 9h2c0-6.1-4.9-11-11-11zM21 3H3c-1.1 0-2 .9-2 2v3h2V5h18v14h-7v2h7c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>
    <!-- Menu -->
    <svg viewBox="0 0 24 24"><path d="M12 8a2 2 0 110-4 2 2 0 010 4zm0 6a2 2 0 110-4 2 2 0 010 4zm0 6a2 2 0 110-4 2 2 0 010 4z"/></svg>
  </div>
</div>

<!-- Album -->
<div class="album-wrap">
  <img class="album" src="https://upload.wikimedia.org/wikipedia/en/1/10/Careless_Whisper_UK_single.jpg">
</div>

<!-- Info -->
<div class="info">
  <h1>Careless Whisper</h1>
  <p>George Michael</p>
</div>

<!-- Progress -->
<div class="progress">
  <div class="bar"><span></span></div>
  <div class="time">
    <span>0:02</span>
    <span>6:32</span>
  </div>
</div>

<!-- Controls -->
<div class="controls">
  <!-- Shuffle -->
  <svg viewBox="0 0 24 24"><path d="M16 3h5v5l-1.8-1.8-3.3 3.3-1.4-1.4 3.3-3.3L16 3zM3 6h4.6l4 4-1.4 1.4-3.4-3.4H3V6zm0 10v-2h4.6l3.4-3.4 1.4 1.4-4 4H3zm13.6-2l1.4-1.4 3.3 3.3L21 16v5h-5l1.8-1.8-3.2-3.2z"/></svg>

  <!-- Prev -->
  <svg viewBox="0 0 24 24"><path d="M6 18V6h2v12H6zm3.5-6L18 6v12l-8.5-6z"/></svg>

  <!-- Play -->
  <div class="play">
    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
  </div>

  <!-- Next -->
  <svg viewBox="0 0 24 24"><path d="M16 6v12h-2V6h2zm-3.5 6L4 18V6l8.5 6z"/></svg>

  <!-- Repeat -->
  <svg viewBox="0 0 24 24"><path d="M7 7h11v3l4-4-4-4v3H6a4 4 0 00-4 4v2h2V9a2 2 0 012-2zm10 10H6v-3l-4 4 4 4v-3h12a4 4 0 004-4v-2h-2v2a2 2 0 01-2 2z"/></svg>
</div>

<!-- Tabs -->
<div class="tabs">
  <span>UP NEXT</span>
  <span class="active">LYRICS</span>
  <span>RELATED</span>
</div>

</body>
</html>
