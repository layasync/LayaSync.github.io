<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Simple Network Video Player</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
  margin: 0;
  background: #111;
  color: #fff;
  font-family: Arial, sans-serif;
}
.container {
  max-width: 900px;
  margin: 20px auto;
}
input {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  border-radius: 6px;
  border: none;
  margin-bottom: 10px;
}
button {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  border-radius: 6px;
  border: none;
  background: #ff8800;
  font-weight: bold;
}
video {
  width: 100%;
  background: black;
  margin-top: 10px;
}
</style>
</head>

<body>
<div class="container">
  <input id="url" placeholder="Paste video URL (.mp4 or .m3u8)">
  <button onclick="play()">PLAY</button>
  <video id="video" controls></video>
</div>

<script>
let hls;
const video = document.getElementById("video");

function play() {
  const url = document.getElementById("url").value.trim();
  if (!url) return;

  if (hls) {
    hls.destroy();
    hls = null;
  }

  if (url.endsWith(".m3u8")) {
    if (Hls.isSupported()) {
      hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
    } else {
      video.src = url; // Safari
      video.play();
    }
  } else {
    video.src = url;
    video.play();
  }
}
</script>
</body>
</html>
