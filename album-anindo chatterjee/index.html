<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LayaSync</title>

<meta name="theme-color" content="#121212">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@500;700;900&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;font-family:'Roboto',sans-serif}
body{
  margin:0;
  min-height:100vh;
  background:linear-gradient(180deg,#6b2f24,#121212 60%);
  color:#fff;
  padding-bottom:160px
}
.header{text-align:center;padding:14px 0;font-weight:900}
.cover-wrap{display:flex;justify-content:center;padding:12px}
.cover{
  width:88%;
  max-width:320px;
  aspect-ratio:1/1;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 22px 60px rgba(0,0,0,.75)
}
.cover img{width:100%;height:100%;object-fit:cover}
.info{padding:16px}
.track{font-size:22px;font-weight:900}
.artist{margin-top:4px;font-size:15px;font-weight:700;opacity:.9}
.controls{
  margin-top:40px;
  display:flex;
  justify-content:center
}
.play{
  width:76px;
  height:76px;
  background:#fff;
  color:#000;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  font-weight:900;
  cursor:pointer;
  user-select:none
}
.lyric-bar{
  position:fixed;
  left:16px;
  right:16px;
  bottom:calc(16px + env(safe-area-inset-bottom,0px) + 24px);
  padding:16px 20px;
  background:linear-gradient(180deg,rgba(58,34,28,.98),rgba(36,21,18,.98));
  border-radius:18px;
  font-size:15px;
  font-weight:900;
  text-align:center;
  box-shadow:0 14px 40px rgba(0,0,0,.7)
}

/* hide iframe visually but keep it alive */
#player{
  position:absolute;
  width:1px;
  height:1px;
  opacity:0;
  pointer-events:none
}
</style>
</head>

<body>

<div class="header">PLAYING FROM NFC</div>

<div class="cover-wrap">
  <div class="cover">
    <img src="https://raw.githubusercontent.com/layasync/LayaSync.github.io/refs/heads/Images/600x600bf-60.jpg">
  </div>
</div>

<div class="info">
  <div class="track">Lose My Mind</div>
  <div class="artist">Don Toliver, Doja Cat</div>

  <div class="controls">
    <div class="play" id="playBtn">▶</div>
  </div>
</div>

<div class="lyric-bar">
  PLAYING VIA YOUTUBE
</div>

<!-- YouTube Iframe API -->
<div id="player"></div>
<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player;
let isPlaying = false;

/* 🔧 CHANGE ONLY THIS */
const VIDEO_ID = "Zz0PcNCZbBY";

function onYouTubeIframeAPIReady() {
  player = new YT.Player('player', {
    videoId: VIDEO_ID,
    playerVars: {
      autoplay: 0,
      controls: 0,
      modestbranding: 1,
      rel: 0
    },
    events: {
      onStateChange: onPlayerStateChange
    }
  });
}

function onPlayerStateChange(event) {
  if (event.data === YT.PlayerState.PLAYING) {
    isPlaying = true;
    playBtn.textContent = "❚❚";
  }
  if (event.data === YT.PlayerState.PAUSED || event.data === YT.PlayerState.ENDED) {
    isPlaying = false;
    playBtn.textContent = "▶";
  }
}

const playBtn = document.getElementById("playBtn");

playBtn.onclick = () => {
  if (!player) return;
  if (isPlaying) {
    player.pauseVideo();
  } else {
    player.playVideo();
  }
};
</script>

</body>
</html>
