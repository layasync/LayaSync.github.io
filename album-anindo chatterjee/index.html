<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LayaSync</title>

<meta name="theme-color" content="#121212">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@500;700;900&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;font-family:'Roboto',sans-serif;-webkit-tap-highlight-color:transparent}
body{margin:0;min-height:100vh;background:linear-gradient(180deg,#6b2f24,#121212 60%);color:#fff;padding-bottom:180px}
.header{text-align:center;padding:14px 0;font-weight:900;letter-spacing:.8px}

.cover-wrap{display:flex;justify-content:center;padding:12px}
.cover{width:88%;max-width:320px;aspect-ratio:1/1;border-radius:14px;overflow:hidden;box-shadow:0 22px 60px rgba(0,0,0,.75)}
.cover img{width:100%;height:100%;object-fit:cover}

.info{padding:16px;padding-bottom:80px}
.track{font-size:22px;font-weight:900}
.artist{margin-top:4px;font-size:15px;font-weight:700;opacity:.9}

/* SEEK */
.seek-wrap{margin-top:18px;position:relative}
.seek-track{position:relative;width:100%;height:4px;background:rgba(255,255,255,.25);border-radius:2px}
.seek-fill{position:absolute;height:100%;width:0%;background:#fff;border-radius:2px}
#seek{position:absolute;inset:0;width:100%;opacity:0}
.time{display:flex;justify-content:space-between;margin-top:6px;font-size:12px;font-weight:700;opacity:.85}

/* Thank you */
.thankyou{
  position:absolute;left:50%;top:26px;
  transform:translateX(-50%);
  font-size:13px;font-weight:700;
  color:rgba(255,255,255,.9);
  opacity:0;pointer-events:none
}
.thankyou.show{animation:thankFade 2.2s ease forwards}
@keyframes thankFade{
  0%{opacity:0;transform:translateX(-50%) translateY(4px)}
  20%{opacity:1;transform:translateX(-50%) translateY(0)}
  80%{opacity:1}
  100%{opacity:0;transform:translateX(-50%) translateY(-4px)}
}

/* CONTROLS */
.controls{margin-top:36px;display:flex;align-items:center;justify-content:space-between}
.icon-btn{width:26px;height:26px;opacity:.75}

/* PLAY + LOADER */
.play{
  position:relative;width:76px;height:76px;
  background:#fff;color:#000;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:30px;font-weight:900
}
.play::after{
  content:"";position:absolute;inset:-6px;border-radius:50%;
  border:3px solid rgba(255,255,255,.25);
  border-top-color:#fff;
  animation:spin 1s linear infinite;
  opacity:0;pointer-events:none
}
.play.loading::after{opacity:1}
@keyframes spin{to{transform:rotate(360deg)}}

.lyric-bar{
  position:fixed;left:16px;right:16px;
  bottom:calc(16px + env(safe-area-inset-bottom,0px) + 24px);
  padding:16px 20px;
  background:linear-gradient(180deg,rgba(58,34,28,.98),rgba(36,21,18,.98));
  border-radius:18px;font-size:15px;font-weight:900;
  box-shadow:0 14px 40px rgba(0,0,0,.7)
}

#player{display:none}
</style>
</head>

<body>

<div class="header">PLAYING FROM NFC</div>

<div class="cover-wrap">
  <div class="cover">
    <img src="https://raw.githubusercontent.com/layasync/LayaSync.github.io/refs/heads/Images/600x600bf-60.jpg">
  </div>
</div>

<div class="info">
  <div class="track">YouTube Music Track</div>
  <div class="artist">YouTube</div>

  <div class="seek-wrap">
    <div class="seek-track">
      <div class="seek-fill" id="seekFill"></div>
      <input type="range" id="seek" min="0" max="100" value="0">
    </div>
    <div class="thankyou" id="thankyou">Thank you 🫶</div>
    <div class="time">
      <span id="current">0:00</span>
      <span id="duration">0:00</span>
    </div>
  </div>

  <div class="controls">
    <svg class="icon-btn" viewBox="0 0 24 24"></svg>
    <svg class="icon-btn" viewBox="0 0 24 24"></svg>
    <div class="play" id="play">▶</div>
    <svg class="icon-btn" viewBox="0 0 24 24"></svg>
    <svg class="icon-btn" viewBox="0 0 24 24"></svg>
  </div>
</div>

<div class="lyric-bar">Streaming via YouTube Music</div>
<div id="player"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
let player;
let isPlaying=false,isSeeking=false;
let shouldAutoPlay=false,thankYouShown=false;
let warmUpPhase=true;

const playBtn=document.getElementById("play");
const seek=document.getElementById("seek");
const seekFill=document.getElementById("seekFill");
const current=document.getElementById("current");
const duration=document.getElementById("duration");
const thankyou=document.getElementById("thankyou");

function onYouTubeIframeAPIReady(){
  player=new YT.Player("player",{
    videoId:"Zz0PcNCZbBY",
    playerVars:{playsinline:1,mute:1},
    events:{onReady:onReady,onStateChange:onState}
  });
}

function onReady(){
  player.playVideo();
  const warm=setInterval(()=>{
    if(player.getCurrentTime()>0.15){
      player.pauseVideo();
      player.seekTo(0,true);
      player.unMute();
      warmUpPhase=false;   // 🔑 critical
      clearInterval(warm);
    }
  },50);
  setInterval(update,100);
}

function onState(e){
  if(isSeeking) return;

  if(e.data===YT.PlayerState.BUFFERING || e.data===YT.PlayerState.CUED){
    playBtn.classList.add("loading");
    if(!thankYouShown){
      thankYouShown=true;
      thankyou.classList.add("show");
    }
  }

  if(e.data===YT.PlayerState.PLAYING){
    playBtn.classList.remove("loading");
    isPlaying=true;
    shouldAutoPlay=false;
    playBtn.textContent="❚❚";
  }

  if((e.data===YT.PlayerState.PAUSED || e.data===YT.PlayerState.CUED)
     && shouldAutoPlay && !warmUpPhase){
    player.playVideo();   // 🔥 auto-resume
  }

  if(e.data===YT.PlayerState.PAUSED && !shouldAutoPlay && !warmUpPhase){
    playBtn.classList.remove("loading");
    isPlaying=false;
    playBtn.textContent="▶";
  }
}

playBtn.onclick=()=>{
  if(isPlaying){
    shouldAutoPlay=false;
    player.pauseVideo();
  }else{
    shouldAutoPlay=true;
    playBtn.classList.add("loading");
    player.playVideo();
  }
};

/* SEEK */
seek.oninput=()=>{
  isSeeking=true;
  const d=player.getDuration();
  if(d){
    const t=seek.value/100*d;
    seekFill.style.width=seek.value+"%";
    current.textContent=format(t);
  }
};
seek.onchange=()=>{
  const d=player.getDuration();
  if(d) player.seekTo(seek.value/100*d,true);
  setTimeout(()=>isSeeking=false,120);
};

function update(){
  if(!player||!player.getDuration||isSeeking) return;
  const d=player.getDuration();
  if(!d) return;
  const c=player.getCurrentTime();
  const p=c/d*100;
  seek.value=p;
  seekFill.style.width=p+"%";
  current.textContent=format(c);
  duration.textContent=format(d);
}

function format(t){
  const m=Math.floor(t/60);
  const s=Math.floor(t%60).toString().padStart(2,"0");
  return `${m}:${s}`;
}
</script>

</body>
</html>
