<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify</title>

<style>
:root {
  --bg: #121212;
  --bg2: #181818;
  --text: #ffffff;
  --sub: #b3b3b3;
  --green: #1DB954;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
}

body {
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}

/* MAIN VIEW */
.screen {
  height: calc(100vh - 140px);
  overflow-y: auto;
  padding: 20px;
}

/* HEADER */
.header {
  font-size: 26px;
  font-weight: 700;
  margin-bottom: 20px;
}

/* SONG CARD */
.song {
  display: flex;
  gap: 16px;
  align-items: center;
}

.song img {
  width: 140px;
  height: 140px;
  border-radius: 6px;
}

.song h2 {
  font-size: 22px;
}

.song p {
  color: var(--sub);
  margin-top: 6px;
}

/* LYRICS */
.lyrics {
  margin-top: 30px;
  font-size: 18px;
  line-height: 2;
}

.lyrics div {
  color: var(--sub);
}

.lyrics .active {
  color: var(--green);
  font-weight: 700;
}

/* MINI PLAYER */
.mini-player {
  position: fixed;
  bottom: 70px;
  width: 100%;
  background: var(--bg2);
  display: flex;
  align-items: center;
  padding: 10px 14px;
  gap: 12px;
}

.mini-player img {
  width: 50px;
  height: 50px;
}

.mini-player button {
  margin-left: auto;
  font-size: 24px;
  background: none;
  border: none;
  color: white;
}

/* FULL PLAYER */
.player {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #000;
  padding: 14px;
}

.progress {
  width: 100%;
}

.controls {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 10px;
}

.controls button {
  font-size: 28px;
  background: none;
  border: none;
  color: white;
}

/* BOTTOM NAV */
.nav {
  position: fixed;
  bottom: 0;
  height: 60px;
  width: 100%;
  background: #000;
  display: flex;
  justify-content: space-around;
  align-items: center;
  color: var(--sub);
  font-size: 12px;
}
</style>
</head>

<body>

<div class="screen">
  <div class="header">Now Playing</div>

  <div class="song">
    <img src="https://upload.wikimedia.org/wikipedia/en/1/10/Careless_Whisper_UK_single.jpg">
    <div>
      <h2>Lose My Mind</h2>
      <p>Don Toliver feat. Doja Cat</p>
    </div>
  </div>

  <div class="lyrics" id="lyrics"></div>
</div>

<!-- MINI PLAYER -->
<div class="mini-player">
  <img src="https://upload.wikimedia.org/wikipedia/en/1/10/Careless_Whisper_UK_single.jpg">
  <div>
    <div>Lose My Mind</div>
    <small style="color:#b3b3b3;">Don Toliver</small>
  </div>
  <button id="play">▶</button>
</div>

<!-- FULL PLAYER BAR -->
<div class="player">
  <input class="progress" type="range" id="progress" value="0">
  <div class="controls">
    <span id="time">0:00</span>
    <button id="bigPlay">⏯</button>
    <input type="range" min="0" max="1" step="0.01" value="1" id="volume">
  </div>
</div>

<div class="nav">
  <div>Home</div>
  <div>Search</div>
  <div>Library</div>
</div>

<audio id="audio"
src="https://github.com/layasync/LayaSync.github.io/raw/refs/heads/Music/Genie%20In%20a%20Bottle(MP3_160K).mp3">
</audio>

<script>
const audio = document.getElementById("audio");
const play = document.getElementById("play");
const bigPlay = document.getElementById("bigPlay");
const progress = document.getElementById("progress");
const volume = document.getElementById("volume");
const time = document.getElementById("time");
const lyricsBox = document.getElementById("lyrics");

let lyrics = [];

function toggle() {
  if (audio.paused) {
    audio.play();
    play.textContent = "⏸";
    bigPlay.textContent = "⏸";
  } else {
    audio.pause();
    play.textContent = "▶";
    bigPlay.textContent = "▶";
  }
}

play.onclick = toggle;
bigPlay.onclick = toggle;

audio.ontimeupdate = () => {
  progress.value = (audio.currentTime / audio.duration) * 100;
  time.textContent = format(audio.currentTime);
  syncLyrics();
};

progress.oninput = () => {
  audio.currentTime = (progress.value / 100) * audio.duration;
};

volume.oninput = () => audio.volume = volume.value;

function format(t) {
  return Math.floor(t / 60) + ":" + String(Math.floor(t % 60)).padStart(2, "0");
}

// LOAD LRC
fetch("https://raw.githubusercontent.com/layasync/LayaSync.github.io/refs/heads/lrc/Don%20Toliver%20-%20Lose%20My%20Mind%20(feat.%20Doja%20Cat).lrc")
.then(r => r.text())
.then(t => {
  t.split("\n").forEach(l => {
    const m = l.match(/\[(\d+):(\d+\.\d+)\](.*)/);
    if (m) {
      lyrics.push({
        time: +m[1] * 60 + +m[2],
        text: m[3]
      });
    }
  });

  lyrics.forEach(l => {
    const d = document.createElement("div");
    d.textContent = l.text;
    lyricsBox.appendChild(d);
    l.el = d;
  });
});

function syncLyrics() {
  for (let i = 0; i < lyrics.length; i++) {
    if (
      audio.currentTime >= lyrics[i].time &&
      (!lyrics[i + 1] || audio.currentTime < lyrics[i + 1].time)
    ) {
      lyrics.forEach(l => l.el.classList.remove("active"));
      lyrics[i].el.classList.add("active");
      lyrics[i].el.scrollIntoView({ block: "center", behavior: "smooth" });
      break;
    }
  }
}
</script>

</body>
</html>
