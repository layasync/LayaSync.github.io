<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spotify Clone</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  background: #121212;
  color: white;
  height: 100vh;
  overflow: hidden;
}

.app {
  display: flex;
  height: calc(100vh - 90px);
}

.sidebar {
  width: 220px;
  background: #000;
  padding: 20px;
}

.sidebar h1 {
  color: #1DB954;
  margin-bottom: 25px;
}

.sidebar p {
  margin: 14px 0;
  color: #b3b3b3;
  cursor: pointer;
}

.main {
  flex: 1;
  padding: 30px;
  overflow-y: auto;
}

.album {
  display: flex;
  align-items: center;
  gap: 25px;
}

.album img {
  width: 200px;
  border-radius: 10px;
}

.lyrics {
  margin-top: 35px;
  line-height: 1.9;
  font-size: 16px;
  color: #b3b3b3;
}

.lyrics div {
  padding: 4px 0;
}

.lyrics .active {
  color: #1DB954;
  font-weight: bold;
}

/* PLAYER */
.player {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 90px;
  background: #181818;
  display: flex;
  align-items: center;
  padding: 10px 20px;
  gap: 20px;
}

.player img {
  width: 60px;
  height: 60px;
}

.info {
  width: 220px;
}

.info small {
  color: #b3b3b3;
}

.controls {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 10px;
}

button {
  background: none;
  border: none;
  color: white;
  font-size: 22px;
  cursor: pointer;
}

input[type="range"] {
  flex: 1;
}

.volume {
  width: 120px;
}
</style>
</head>

<body>

<div class="app">
  <div class="sidebar">
    <h1>Spotify</h1>
    <p>Home</p>
    <p>Search</p>
    <p>Your Library</p>
  </div>

  <div class="main">
    <div class="album">
      <img src="https://upload.wikimedia.org/wikipedia/en/1/10/Careless_Whisper_UK_single.jpg">
      <div>
        <h2>Lose My Mind</h2>
        <p style="color:#b3b3b3;">Don Toliver feat. Doja Cat</p>
      </div>
    </div>

    <div class="lyrics" id="lyrics"></div>
  </div>
</div>

<div class="player">
  <img src="https://upload.wikimedia.org/wikipedia/en/1/10/Careless_Whisper_UK_single.jpg">

  <div class="info">
    <div>Lose My Mind</div>
    <small>Don Toliver feat. Doja Cat</small>
  </div>

  <div class="controls">
    <button id="play">▶</button>
    <input type="range" id="progress" value="0">
    <span id="time">0:00</span>
  </div>

  <input class="volume" type="range" id="volume" min="0" max="1" step="0.01" value="1">
</div>

<audio id="audio"
src="https://github.com/layasync/LayaSync.github.io/raw/refs/heads/Music/Genie%20In%20a%20Bottle(MP3_160K).mp3">
</audio>

<script>
const audio = document.getElementById("audio");
const playBtn = document.getElementById("play");
const progress = document.getElementById("progress");
const volume = document.getElementById("volume");
const time = document.getElementById("time");
const lyricsBox = document.getElementById("lyrics");

let lyrics = [];

// PLAY / PAUSE
playBtn.onclick = () => {
  if (audio.paused) {
    audio.play();
    playBtn.textContent = "⏸";
  } else {
    audio.pause();
    playBtn.textContent = "▶";
  }
};

// PROGRESS
audio.ontimeupdate = () => {
  progress.value = (audio.currentTime / audio.duration) * 100;
  time.textContent = format(audio.currentTime);
  syncLyrics();
};

progress.oninput = () => {
  audio.currentTime = (progress.value / 100) * audio.duration;
};

volume.oninput = () => {
  audio.volume = volume.value;
};

function format(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60).toString().padStart(2, "0");
  return `${m}:${s}`;
}

// LOAD LRC
fetch("https://raw.githubusercontent.com/layasync/LayaSync.github.io/refs/heads/lrc/Don%20Toliver%20-%20Lose%20My%20Mind%20(feat.%20Doja%20Cat).lrc")
.then(res => res.text())
.then(text => {
  const lines = text.split("\n");
  lines.forEach(line => {
    const match = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
    if (match) {
      const time = parseInt(match[1]) * 60 + parseFloat(match[2]);
      lyrics.push({ time, text: match[3] });
    }
  });

  lyrics.forEach(l => {
    const div = document.createElement("div");
    div.textContent = l.text;
    lyricsBox.appendChild(div);
    l.el = div;
  });
});

// SYNC LYRICS
function syncLyrics() {
  for (let i = 0; i < lyrics.length; i++) {
    if (
      audio.currentTime >= lyrics[i].time &&
      (!lyrics[i + 1] || audio.currentTime < lyrics[i + 1].time)
    ) {
      lyrics.forEach(l => l.el.classList.remove("active"));
      lyrics[i].el.classList.add("active");
      lyrics[i].el.scrollIntoView({ block: "center", behavior: "smooth" });
      break;
    }
  }
}
</script>

</body>
</html>
