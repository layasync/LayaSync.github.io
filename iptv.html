<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Xtream IPTV Player</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{margin:0;background:#111;color:#fff;font-family:Arial}
.login,.app{padding:10px}
input,button{width:100%;padding:10px;margin:5px 0}
.sidebar{width:260px;background:#1b1b1b;overflow:auto}
.channel{padding:8px;border-bottom:1px solid #333;cursor:pointer}
.channel:hover{background:#333}
.main{flex:1}
.app{display:flex;height:100vh}
video{width:100%;height:100%;background:black}
</style>
</head>

<body>

<div class="login" id="login">
  <input id="server" placeholder="http://SERVER:PORT">
  <input id="user" placeholder="Username">
  <input id="pass" placeholder="Password">
  <button onclick="login()">LOGIN</button>
</div>

<div class="app" id="app" style="display:none">
  <div class="sidebar" id="list"></div>
  <div class="main">
    <video id="video" controls autoplay></video>
  </div>
</div>

<script>
const api = "http://localhost:3000/xtream";
let SERVER, USER, PASS, hls;

function login(){
  SERVER=server.value;
  USER=user.value;
  PASS=pass.value;
  fetch(`${api}?server=${SERVER}&username=${USER}&password=${PASS}&action=get_live_streams`)
    .then(r=>r.json())
    .then(showChannels);
}

function showChannels(channels){
  login.style.display="none";
  app.style.display="flex";
  list.innerHTML="";
  channels.forEach(c=>{
    const d=document.createElement("div");
    d.className="channel";
    d.textContent=c.name;
    d.onclick=()=>play(c.stream_id);
    list.appendChild(d);
  });
}

function play(id){
  const url=`${SERVER}/live/${USER}/${PASS}/${id}.m3u8`;
  if(hls){hls.destroy()}
  if(Hls.isSupported()){
    hls=new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  }else{
    video.src=url;
  }
}
</script>

</body>
</html>
