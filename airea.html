<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LayaSync | AI Blaster Archive</title>
    
    <!-- Tesseract AI Vision Engine -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <style>
        :root {
            --bg: #ffffff;
            --text: #1d1d1f;
            --accent: #007aff;
            --pill: #f2f2f7;
            --glass: rgba(255, 255, 255, 0.75);
            --sidebar: rgba(255, 255, 255, 0.95);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --text: #ffffff;
                --pill: #1c1c1e;
                --glass: rgba(0, 0, 0, 0.75);
                --sidebar: rgba(28, 28, 30, 0.95);
            }
        }

        * { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        body { margin: 0; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; overflow-x: hidden; }

        /* --- SIDEBAR --- */
        .sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: var(--sidebar); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            z-index: 3000; border-right: 1px solid rgba(128,128,128,0.2); padding: 60px 20px;
        }
        .sidebar.active { transform: translateX(280px); }
        .sidebar-title { font-size: 24px; font-weight: 800; margin-bottom: 30px; letter-spacing: -1px; }
        .nav-item { 
            padding: 14px; border-radius: 12px; cursor: pointer; font-weight: 600; 
            margin-bottom: 8px; display: flex; align-items: center; gap: 12px;
        }
        .nav-item.active { background: var(--accent); color: white; }

        /* --- HEADER --- */
        .header {
            position: sticky; top: 0; z-index: 2000;
            background: var(--glass); backdrop-filter: saturate(180%) blur(25px);
            -webkit-backdrop-filter: saturate(180%) blur(25px);
            border-bottom: 1px solid rgba(128,128,128,0.2); padding: 12px 15px;
        }
        .top-row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; }
        .menu-btn { background: var(--pill); border: none; width: 42px; height: 42px; border-radius: 12px; cursor: pointer; color: var(--text); font-size: 20px; }
        .search-input { flex: 1; background: var(--pill); border: none; padding: 12px 18px; border-radius: 12px; font-size: 16px; color: var(--text); outline: none; }

        /* --- AUTO-CATEGORY CHIPS --- */
        .cat-bar { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .cat-bar::-webkit-scrollbar { display: none; }
        .chip { padding: 7px 16px; background: var(--pill); border-radius: 20px; font-size: 11px; font-weight: 800; cursor: pointer; white-space: nowrap; text-transform: uppercase; }
        .chip.active { background: var(--accent); color: white; }
        .chip.blaster { border: 1px solid var(--accent); color: var(--accent); animation: pulse 2s infinite; }

        /* --- GRID: 3 PER ROW MOBILE --- */
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px 12px; padding: 15px; max-width: 1600px; margin: 0 auto;
        }

        .card { display: flex; flex-direction: column; align-items: center; animation: slideIn 0.4s ease; }
        .img-wrap { 
            width: 100%; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; 
            margin-bottom: 10px; background: rgba(128,128,128,0.05); border-radius: 18px; overflow: hidden;
        }
        .img-wrap img { max-width: 95%; max-height: 95%; object-fit: contain; filter: drop-shadow(0 5px 12px rgba(0,0,0,0.12)); }

        /* --- PILL CUT CASING --- */
        .casing {
            width: 100%; background: var(--pill); padding: 12px; border-radius: 22px;
            display: flex; flex-direction: column; gap: 8px; border: 1px solid rgba(128,128,128,0.1);
        }
        .name-input {
            width: 100%; border: none; background: transparent; text-align: center;
            font-size: 11px; font-weight: 800; color: var(--text); outline: none;
        }
        .hard-btn {
            background: var(--accent); color: white; border: none; width: 100%;
            padding: 10px; border-radius: 12px; font-size: 10px; font-weight: 900;
            text-transform: uppercase; cursor: pointer; letter-spacing: 0.8px;
        }
        .hard-btn:active { transform: scale(0.95); }

        /* --- OVERLAY --- */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 2500; display: none; }
        .overlay.active { display: block; }

        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(3, 1fr); gap: 15px 8px; padding: 10px; }
            .casing { padding: 8px; border-radius: 14px; gap: 6px; }
            .name-input { font-size: 9px; }
            .hard-btn { padding: 8px; font-size: 8px; border-radius: 8px; }
            .img-wrap { border-radius: 12px; }
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: var(--text); color: var(--bg); padding: 12px 28px; border-radius: 50px;
            font-size: 13px; font-weight: 800; z-index: 9999; transition: 0.4s cubic-bezier(0.17, 0.89, 0.32, 1.28);
        }
        #toast.active { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<nav class="sidebar" id="sidebar">
    <div class="sidebar-title">LayaSync AI</div>
    <div class="nav-item active" onclick="switchTab('logos')">🖼️ Asset Archive</div>
    <div class="nav-item" onclick="switchTab('setups')">📱 Nuvio Setups</div>
</nav>

<header class="header">
    <div class="top-row">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <input type="text" id="search" class="search-input" placeholder="Search AI library..." onkeyup="syncUI()">
    </div>
    <div class="cat-bar" id="catBar">
        <div class="chip active" onclick="setFilter('All')">All</div>
        <div id="aiStatus" class="chip blaster" style="display:none">Processing AI Blaster...</div>
    </div>
</header>

<div class="grid" id="mainGrid"></div>
<div id="toast">Copied to Clipboard</div>

<script>
    let library = [];
    let setups = [];
    let activeTab = 'logos';
    let activeFilter = 'All';
    let categories = new Set(['All']);

    // BLASTER ENGINE RULES
    const AI_BRAIN = {
        Streaming: ['netflix', 'disney', 'hulu', 'prime', 'hbo', 'hotstar', 'apple', 'sonyliv', 'paramount', 'zee5', 'chaupal'],
        Movies: ['film', 'movie', 'cinema', 'poster', 'theatrical', 'collection', 'directed by'],
        Series: ['season', 'episode', 'series', 'tv show', 's0', 'e0'],
        Actors: ['dicaprio', 'pitt', 'bale', 'cruise', 'hanks', 'deniro', 'rock', 'actor', 'srk'],
        Actresses: ['johansson', 'zendaya', 'robbie', 'gadot', 'lawrence', 'actress'],
        Directors: ['nolan', 'spielberg', 'tarantino', 'scorsese', 'cameron', 'director'],
        '80s': ['198'], '90s': ['199'], '20s': ['202']
    };

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    async function init() {
        const timestamp = Date.now();
        const logoUrl = `https://raw.githubusercontent.com/layasync/LayaSync.github.io/main/logo.json?v=${timestamp}`;
        const setupUrl = `https://raw.githubusercontent.com/layasync/LayaSync.github.io/main/setups.json?v=${timestamp}`;

        try {
            const [lRes, sRes] = await Promise.all([
                fetch(logoUrl).then(r => r.json()),
                fetch(setupUrl).then(r => r.json())
            ]);

            library = lRes.map(i => ({
                ...i,
                aiName: localStorage.getItem(`n-${i.url}`) || i.name,
                aiCat: i.url.toLowerCase().includes('.gif') ? 'GIFs' : 'Scanning'
            }));
            setups = sRes;

            syncUI();
            if (activeTab === 'logos') runBlaster();
        } catch (e) { console.error("Sync Error", e); }
    }

    async function runBlaster() {
        const status = document.getElementById('aiStatus');
        status.style.display = 'block';

        for (let item of library) {
            if (item.aiCat === 'Scanning') {
                try {
                    // Vision Processing
                    const { data: { text } } = await Tesseract.recognize(item.url, 'eng');
                    const raw = text.toLowerCase();
                    const clean = text.trim().split('\n')[0].replace(/[^a-zA-Z0-9 ]/g, "");

                    if (clean.length > 2) {
                        item.aiName = clean.charAt(0).toUpperCase() + clean.slice(1);
                        item.aiCat = 'Other';
                        for (let [cat, keys] of Object.entries(AI_BRAIN)) {
                            if (keys.some(k => raw.includes(k))) {
                                item.aiCat = cat;
                                break;
                            }
                        }
                    } else {
                        item.aiCat = 'Logos';
                    }
                } catch (e) { item.aiCat = 'Unprocessed'; }
                
                categories.add(item.aiCat);
                updateChips();
                syncUI();
            }
        }
        status.style.display = 'none';
    }

    function updateChips() {
        const bar = document.getElementById('catBar');
        bar.style.display = activeTab === 'logos' ? 'flex' : 'none';
        bar.innerHTML = Array.from(categories).map(c => `
            <div class="chip ${c === activeFilter ? 'active' : ''}" onclick="setFilter('${c}')">${c}</div>
        `).join('') + `<div id="aiStatus" class="chip blaster" style="display:none">Processing...</div>`;
    }

    function switchTab(t) {
        activeTab = t;
        toggleSidebar();
        updateChips();
        syncUI();
    }

    function setFilter(c) {
        activeFilter = c;
        updateChips();
        syncUI();
    }

    function syncUI() {
        const grid = document.getElementById('mainGrid');
        const q = document.getElementById('search').value.toLowerCase();
        const currentData = activeTab === 'logos' ? library : setups;

        const filtered = currentData.filter(i => {
            const name = (i.aiName || i.name).toLowerCase();
            const matchesSearch = name.includes(q);
            const matchesCat = activeTab === 'setups' || activeFilter === 'All' || i.aiCat === activeFilter;
            return matchesSearch && matchesCat;
        });

        grid.innerHTML = filtered.map(i => {
            const img = activeTab === 'logos' ? i.url : i.image;
            const copyUrl = activeTab === 'logos' ? i.url : i.fileUrl;
            const name = i.aiName || i.name;

            return `
                <div class="card">
                    <div class="img-wrap"><img src="${img}" loading="eager"></div>
                    <div class="casing">
                        <input class="name-input" value="${name}" onchange="saveName('${img}', this.value)" spellcheck="false">
                        <button class="hard-btn" onclick="copy('${copyUrl}')">Copy Link</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function saveName(url, val) {
        localStorage.setItem(`n-${url}`, val);
        const item = library.find(i => i.url === url);
        if(item) item.aiName = val;
        toast("Updated Successfully");
    }

    function copy(url) {
        navigator.clipboard.writeText(url);
        toast("Copied to Clipboard");
    }

    function toast(m) {
        const t = document.getElementById('toast');
        t.innerText = m; t.classList.add('active');
        setTimeout(() => t.classList.remove('active'), 2000);
    }

    init();
</script>
</body>
</html>
