<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LayaSync | Authorised Manager</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1c1c1e;
            --accent: #007aff;
            --pill: #f2f2f7;
            --sidebar-silver: linear-gradient(180deg, #e5e5ea 0%, #d1d1d6 100%);
            --glass: rgba(255, 255, 255, 0.85);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --text: #ffffff;
                --pill: #1c1c1e;
                --sidebar-silver: linear-gradient(180deg, #2c2c2e 0%, #1c1c1e 100%);
                --glass: rgba(0, 0, 0, 0.85);
            }
        }

        * { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; transition: transform 0.2s; }
        body { margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; display: flex; }

        /* --- FIXED 3-COLUMN GRID --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr) !important; /* LOCKED 3 PER ROW PC & MOBILE */
            gap: 15px;
            padding: 15px;
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* --- SILVER SIDEBAR --- */
        .sidebar {
            width: 280px; height: 100vh; background: var(--sidebar-silver);
            position: fixed; left: -280px; top: 0; z-index: 3000;
            transition: left 0.4s cubic-bezier(0.2, 1, 0.2, 1);
            padding: 40px 15px; border-right: 1px solid rgba(0,0,0,0.1);
            overflow-y: auto;
        }
        .sidebar.active { left: 0; }
        .sidebar-header { font-size: 22px; font-weight: 800; margin-bottom: 25px; }

        .group-item {
            padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600;
            margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.4); font-size: 13px;
        }
        .group-item.active { background: var(--accent); color: white; }
        .del-btn { color: red; background: none; border: none; font-weight: 800; cursor: pointer; padding: 5px; }

        /* --- MAIN HEADER --- */
        header {
            position: sticky; top: 0; z-index: 2000; width: 100%;
            background: var(--glass); backdrop-filter: saturate(180%) blur(25px);
            -webkit-backdrop-filter: saturate(180%) blur(25px);
            border-bottom: 1px solid rgba(120,120,128,0.2); padding: 12px 15px;
            display: flex; align-items: center; gap: 10px;
        }
        .search-box { flex: 1; background: var(--pill); border: none; padding: 12px 15px; border-radius: 12px; font-size: 15px; color: var(--text); outline: none; }
        .btn-icon { background: var(--pill); border: none; width: 40px; height: 40px; border-radius: 10px; cursor: pointer; font-size: 18px; color: var(--text); }
        .multi-indicator { background: var(--accent); color: white; padding: 5px 10px; border-radius: 20px; font-size: 10px; font-weight: 800; display: none; }

        /* --- ASSET CARDS --- */
        .asset-card { display: flex; flex-direction: column; align-items: center; position: relative; }
        .img-container {
            width: 100%; height: 220px; /* Big Height */
            display: flex; align-items: center; justify-content: center; margin-bottom: 10px;
            cursor: pointer; position: relative;
        }
        .img-container img { max-width: 90%; max-height: 90%; object-fit: contain; }
        
        /* Multi-Select Overlay */
        .select-overlay {
            position: absolute; inset: 0; background: rgba(0,122,255,0.2);
            border: 3px solid var(--accent); border-radius: 15px; display: none;
        }
        .asset-card.selected .select-overlay { display: block; }

        /* --- PILL CUT CASING --- */
        .casing {
            width: 100%; background: var(--pill); padding: 10px; border-radius: 18px;
            display: flex; flex-direction: column; gap: 6px; border: 1px solid rgba(0,0,0,0.05);
        }
        .name-field { width: 100%; border: none; background: transparent; text-align: center; font-size: 11px; font-weight: 800; color: var(--text); outline: none; }
        .copy-btn { background: var(--accent); color: white; border: none; padding: 8px; border-radius: 10px; font-size: 9px; font-weight: 900; text-transform: uppercase; cursor: pointer; }

        /* Overlay */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 2500; display: none; }
        .overlay.active { display: block; }

        @media (max-width: 600px) {
            .img-container { height: 130px; }
            .name-field { font-size: 9px; }
            .copy-btn { font-size: 8px; }
        }

        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: var(--text); color: var(--bg); padding: 12px 25px; border-radius: 50px;
            font-size: 12px; font-weight: 700; transition: 0.4s cubic-bezier(0.17, 0.89, 0.32, 1.28); z-index: 9999;
        }
        #toast.active { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<nav class="sidebar" id="sidebar">
    <div class="sidebar-header">LayaSync Admin</div>
    <div id="groupList"></div>
    
    <div style="margin-top: 20px;">
        <input type="text" id="newGrp" placeholder="Group Name..." style="width:70%; padding:8px; border-radius:8px; border:none; font-size:12px;">
        <button onclick="addGroup()" style="padding:8px; border-radius:8px; background:var(--accent); color:white; border:none; cursor:pointer;">+</button>
    </div>

    <div id="multiActions" style="margin-top: 30px; display: none;">
        <p style="font-size: 10px; font-weight: 800; color: #888;">BULK ACTION</p>
        <select id="bulkMove" onchange="moveSelected(this.value)" style="width:100%; padding:10px; border-radius:10px; border:none; font-weight:700;">
            <option value="">Move selected to...</option>
        </select>
    </div>
</nav>

<main style="flex: 1;">
    <header>
        <button class="btn-icon" onclick="toggleSidebar()">☰</button>
        <input type="text" id="search" class="search-box" placeholder="Search name or group..." onkeyup="sync()">
        <span id="multiCount" class="multi-indicator">0 SELECTED</span>
        <button id="selectModeBtn" class="btn-icon" onclick="toggleSelectMode()">🔘</button>
    </header>

    <div class="grid" id="mainGrid"></div>
</main>

<div id="toast">Copied</div>

<script>
    let db = [];
    let groups = JSON.parse(localStorage.getItem('ls_groups')) || ["Streaming", "Movies", "Social"];
    let activeG = 'All';
    let isSelectMode = false;
    let selectedUrls = new Set();

    async function init() {
        const res = await fetch(`https://raw.githubusercontent.com/layasync/LayaSync.github.io/main/logo.json?v=${Date.now()}`);
        db = await res.json();
        renderGroups();
        sync();
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function toggleSelectMode() {
        isSelectMode = !isSelectMode;
        selectedUrls.clear();
        document.getElementById('selectModeBtn').style.background = isSelectMode ? 'var(--accent)' : 'var(--pill)';
        document.getElementById('multiCount').style.display = isSelectMode ? 'block' : 'none';
        document.getElementById('multiActions').style.display = isSelectMode ? 'block' : 'none';
        sync();
    }

    function renderGroups() {
        const list = document.getElementById('groupList');
        const bulk = document.getElementById('bulkMove');
        list.innerHTML = `<div class="group-item ${activeG==='All'?'active':''}" onclick="setG('All')">📂 All Logos</div>`;
        bulk.innerHTML = `<option value="">Move selected to...</option>`;

        groups.forEach(g => {
            list.innerHTML += `
                <div class="group-item ${activeG===g?'active':''}" onclick="setG('${g}')">
                    <span>🏷️ ${g}</span>
                    <button class="del-btn" onclick="deleteG(event, '${g}')">✕</button>
                </div>
            `;
            bulk.innerHTML += `<option value="${g}">${g}</option>`;
        });
    }

    function deleteG(e, g) {
        e.stopPropagation();
        const user = prompt("Enter Username:");
        const pass = prompt("Enter Password:");
        if (user === "123" && pass === "123") {
            groups = groups.filter(item => item !== g);
            localStorage.setItem('ls_groups', JSON.stringify(groups));
            renderGroups();
            setG('All');
        } else {
            alert("Unauthorized Access.");
        }
    }

    function addGroup() {
        const val = document.getElementById('newGrp').value.trim();
        if (val && !groups.includes(val)) {
            groups.push(val);
            localStorage.setItem('ls_groups', JSON.stringify(groups));
            document.getElementById('newGrp').value = '';
            renderGroups();
        }
    }

    function setG(g) { activeG = g; renderGroups(); sync(); }

    function sync() {
        const grid = document.getElementById('mainGrid');
        const q = document.getElementById('search').value.toLowerCase();
        
        const filtered = db.filter(i => {
            const name = localStorage.getItem(`n-${i.url}`) || i.name;
            const grp = localStorage.getItem(`g-${i.url}`) || "Uncategorized";
            const matchesSearch = name.toLowerCase().includes(q) || grp.toLowerCase().includes(q);
            const matchesTab = activeG === 'All' || grp === activeG;
            return matchesSearch && matchesTab;
        });

        grid.innerHTML = filtered.map(i => {
            const name = localStorage.getItem(`n-${i.url}`) || i.name;
            const isSelected = selectedUrls.has(i.url);
            return `
                <div class="asset-card ${isSelected?'selected':''}" onclick="handleCardClick('${i.url}')">
                    <div class="img-container">
                        <div class="select-overlay"></div>
                        <img src="${i.url}" loading="eager">
                    </div>
                    <div class="casing">
                        <input class="name-field" value="${name}" onchange="localStorage.setItem('n-${i.url}', this.value)" onclick="event.stopPropagation()">
                        <button class="copy-btn" onclick="event.stopPropagation(); copy('${i.url}')">Copy Link</button>
                    </div>
                </div>
            `;
        }).join('');
        document.getElementById('multiCount').innerText = `${selectedUrls.size} SELECTED`;
    }

    function handleCardClick(url) {
        if (!isSelectMode) return;
        if (selectedUrls.has(url)) selectedUrls.delete(url);
        else selectedUrls.add(url);
        sync();
    }

    function moveSelected(g) {
        if (!g || selectedUrls.size === 0) return;
        selectedUrls.forEach(url => localStorage.setItem(`g-${url}`, g));
        toast(`Moved ${selectedUrls.size} to ${g}`);
        toggleSelectMode();
        sync();
    }

    function copy(url) {
        navigator.clipboard.writeText(url);
        toast("Copied!");
    }

    function toast(m) {
        const t = document.getElementById('toast');
        t.innerText = m; t.classList.add('active');
        setTimeout(() => t.classList.remove('active'), 2000);
    }

    init();
</script>
</body>
</html>
