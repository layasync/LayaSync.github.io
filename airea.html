<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LayaSync Platinum | Asset Manager</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1c1c1e;
            --accent: #007aff;
            --pill: #f2f2f7;
            --sidebar-silver: linear-gradient(180deg, #e5e5ea 0%, #d1d1d6 100%);
            --glass: rgba(255, 255, 255, 0.8);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --text: #ffffff;
                --pill: #1c1c1e;
                --sidebar-silver: linear-gradient(180deg, #2c2c2e 0%, #1c1c1e 100%);
                --glass: rgba(0, 0, 0, 0.8);
            }
        }

        * { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; transition: transform 0.2s, background 0.3s; }
        body { margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; -webkit-font-smoothing: antialiased; display: flex; }

        /* --- SILVER SIDEBAR --- */
        .sidebar {
            width: 280px; height: 100vh; background: var(--sidebar-silver);
            position: fixed; left: -280px; top: 0; z-index: 3000;
            transition: left 0.4s cubic-bezier(0.2, 1, 0.2, 1);
            padding: 60px 20px; border-right: 1px solid rgba(0,0,0,0.1);
            overflow-y: auto;
        }
        .sidebar.active { left: 0; }
        .sidebar-title { font-size: 24px; font-weight: 800; margin-bottom: 30px; letter-spacing: -1px; }

        .group-item {
            padding: 12px 15px; border-radius: 12px; cursor: pointer; font-weight: 600;
            margin-bottom: 5px; display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.3); color: var(--text);
        }
        .group-item:hover { background: rgba(255,255,255,0.5); }
        .group-item.active { background: var(--accent); color: white; }

        /* Add Group Button */
        .add-group-wrap { margin-top: 20px; display: flex; gap: 8px; }
        .group-input { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.1); outline: none; font-size: 13px; }
        .add-btn { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 10px; font-weight: 800; cursor: pointer; }

        /* --- MAIN AREA --- */
        main { flex: 1; min-height: 100vh; }

        /* --- HEADER & SEARCH --- */
        .header {
            position: sticky; top: 0; z-index: 2000;
            background: var(--glass); backdrop-filter: saturate(180%) blur(25px);
            -webkit-backdrop-filter: saturate(180%) blur(25px);
            border-bottom: 1px solid rgba(120,120,128,0.2); padding: 15px 20px;
            display: flex; align-items: center; gap: 15px;
        }
        .menu-toggle { background: var(--pill); border: none; width: 45px; height: 45px; border-radius: 12px; cursor: pointer; font-size: 20px; color: var(--text); }
        .search-box { flex: 1; background: var(--pill); border: none; padding: 14px 20px; border-radius: 15px; font-size: 16px; color: var(--text); outline: none; }

        /* --- THE GRID: 3 PER ROW MOBILE --- */
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 40px 20px; padding: 30px; max-width: 1600px; margin: 0 auto;
        }

        .asset-item { display: flex; flex-direction: column; align-items: center; animation: fadeInUp 0.4s ease; }
        
        .img-container {
            width: 100%; height: 200px; display: flex; align-items: center;
            justify-content: center; margin-bottom: 15px;
        }
        .img-container img { 
            max-width: 100%; max-height: 100%; object-fit: contain; 
            filter: drop-shadow(0 8px 20px rgba(0,0,0,0.12)); 
        }

        /* --- PILL CUT CASING --- */
        .casing {
            width: 100%; background: var(--pill); padding: 15px; border-radius: 25px;
            display: flex; flex-direction: column; gap: 10px; border: 1px solid rgba(120,120,128,0.1);
        }
        .name-field {
            width: 100%; border: none; background: transparent; text-align: center;
            font-size: 14px; font-weight: 800; color: var(--text); outline: none;
        }
        
        /* Dropdown to assign groups */
        .group-select {
            width: 100%; background: rgba(120,120,128,0.1); border: none;
            padding: 8px; border-radius: 10px; font-size: 11px; font-weight: 700;
            color: var(--text); cursor: pointer; text-align-last: center;
        }

        .copy-btn {
            background: var(--accent); color: white; border: none; width: 100%;
            padding: 12px; border-radius: 14px; font-size: 11px; font-weight: 900;
            text-transform: uppercase; cursor: pointer; letter-spacing: 1px;
        }
        .copy-btn:active { transform: scale(0.95); opacity: 0.8; }

        /* Overlay */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 2500; display: none; }
        .overlay.active { display: block; }

        /* --- MOBILE ADAPTIVE (3 PER ROW) --- */
        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(3, 1fr); gap: 15px 10px; padding: 10px; }
            .img-container { height: 100px; margin-bottom: 10px; }
            .casing { padding: 8px; border-radius: 15px; gap: 6px; }
            .name-field { font-size: 9px; }
            .group-select { font-size: 8px; padding: 4px; }
            .copy-btn { font-size: 8px; padding: 8px; border-radius: 8px; }
        }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: var(--text); color: var(--bg); padding: 12px 25px; border-radius: 50px;
            font-size: 13px; font-weight: 700; transition: 0.4s cubic-bezier(0.17, 0.89, 0.32, 1.28);
            z-index: 9999;
        }
        #toast.active { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<nav class="sidebar" id="sidebar">
    <div class="sidebar-title">Collections</div>
    <div id="groupList">
        <div class="group-item active" onclick="setGroup('All')">📂 All Logos</div>
    </div>
    
    <div class="add-group-wrap">
        <input type="text" id="newGroupInput" class="group-input" placeholder="New Group...">
        <button class="add-btn" onclick="createNewGroup()">+</button>
    </div>
</nav>

<main>
    <header class="header">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <input type="text" id="search" class="search-box" placeholder="Search by name or group..." onkeyup="syncUI()">
    </header>

    <div class="grid" id="mainGrid"></div>
</main>

<div id="toast">Copied to Clipboard</div>

<script>
    let rawData = [];
    let customGroups = JSON.parse(localStorage.getItem('LayaSync_Groups')) || ["Streaming", "Social", "Gaming"];
    let activeGroup = 'All';

    async function init() {
        const source = 'https://raw.githubusercontent.com/layasync/LayaSync.github.io/main/logo.json';
        const res = await fetch(`${source}?v=${Date.now()}`);
        rawData = await res.json();
        
        renderGroups();
        syncUI();
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function createNewGroup() {
        const input = document.getElementById('newGroupInput');
        const name = input.value.trim();
        if (name && !customGroups.includes(name)) {
            customGroups.push(name);
            localStorage.setItem('LayaSync_Groups', JSON.stringify(customGroups));
            input.value = '';
            renderGroups();
        }
    }

    function renderGroups() {
        const list = document.getElementById('groupList');
        list.innerHTML = `<div class="group-item ${activeGroup === 'All' ? 'active' : ''}" onclick="setGroup('All')">📂 All Logos</div>`;
        
        customGroups.forEach(g => {
            list.innerHTML += `
                <div class="group-item ${activeGroup === g ? 'active' : ''}" onclick="setGroup('${g}')">
                    🏷️ ${g}
                </div>
            `;
        });
    }

    function setGroup(g) {
        activeGroup = g;
        renderGroups();
        if(window.innerWidth < 600) toggleSidebar();
        syncUI();
    }

    function syncUI() {
        const grid = document.getElementById('mainGrid');
        const query = document.getElementById('search').value.toLowerCase();
        
        const filtered = rawData.filter(item => {
            const localName = localStorage.getItem(`name-${item.url}`) || item.name;
            const localGroup = localStorage.getItem(`group-${item.url}`) || "General";
            
            const matchesSearch = localName.toLowerCase().includes(query) || localGroup.toLowerCase().includes(query);
            const matchesGroup = activeGroup === 'All' || localGroup === activeGroup;
            
            return matchesSearch && matchesGroup;
        });

        grid.innerHTML = filtered.map(item => {
            const localName = localStorage.getItem(`name-${item.url}`) || item.name;
            const localGroup = localStorage.getItem(`group-${item.url}`) || "General";

            return `
                <div class="asset-item">
                    <div class="img-container">
                        <img src="${item.url}" loading="eager">
                    </div>
                    <div class="casing">
                        <input class="name-field" value="${localName}" 
                               onchange="saveLocalName('${item.url}', this.value)" spellcheck="false">
                        
                        <select class="group-select" onchange="assignGroup('${item.url}', this.value)">
                            <option value="General" ${localGroup === 'General' ? 'selected' : ''}>Move to Group...</option>
                            ${customGroups.map(g => `<option value="${g}" ${localGroup === g ? 'selected' : ''}>${g}</option>`).join('')}
                        </select>

                        <button class="copy-btn" onclick="copy('${item.url}')">Copy Link</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function saveLocalName(url, val) {
        localStorage.setItem(`name-${url}`, val);
        showToast("Name Updated Locally");
    }

    function assignGroup(url, val) {
        localStorage.setItem(`group-${url}`, val);
        showToast(`Moved to ${val}`);
        syncUI();
    }

    function copy(url) {
        navigator.clipboard.writeText(url);
        showToast("Direct Link Copied!");
    }

    function showToast(m) {
        const t = document.getElementById('toast');
        t.innerText = m; t.classList.add('active');
        setTimeout(() => t.classList.remove('active'), 2000);
    }

    init();
</script>

</body>
</html>
