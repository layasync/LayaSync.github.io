<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPlayer TV - macOS Style</title>
    <!-- HLS.js for professional streaming -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: rgba(255, 255, 255, 0.1);
            --accent: #007AFF; /* Apple Blue */
            --text: #ffffff;
            --focus-border: 4px solid #ffffff;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-color);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
        }

        /* Sidebar - macOS Style */
        #sidebar {
            width: 300px;
            background: rgba(40, 40, 40, 0.8);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
        }

        .logo { font-size: 32px; font-weight: 700; margin-bottom: 40px; padding-left: 10px; }

        /* Main Content */
        #main {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        .search-bar {
            background: var(--card-bg);
            border: none;
            padding: 15px 25px;
            border-radius: 12px;
            color: white;
            font-size: 22px;
            margin-bottom: 30px;
        }

        /* Virtual List Container */
        #channel-list-container {
            flex: 1;
            overflow-y: auto;
            position: relative;
        }

        .channel-item {
            height: 70px; /* Fixed height for virtual scroll math */
            display: flex;
            align-items: center;
            padding: 0 20px;
            margin-bottom: 10px;
            background: var(--card-bg);
            border-radius: 12px;
            font-size: 24px;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .channel-item.focused {
            background: var(--accent);
            transform: scale(1.02);
            border: var(--focus-border);
        }

        /* Video Player Overlay */
        #player-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            display: none;
            z-index: 100;
        }

        video { width: 100%; height: 100%; }

        .controls-overlay {
            position: absolute;
            bottom: 0; width: 100%;
            padding: 40px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            display: flex;
            align-items: center;
            gap: 20px;
            opacity: 0; transition: opacity 0.5s;
        }

        #player-wrapper:hover .controls-overlay { opacity: 1; }

        .status-badge {
            position: absolute; top: 20px; right: 20px;
            background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 20px;
        }

        /* Settings Modal */
        #settings-modal {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(30,30,30,0.95);
            padding: 40px; border-radius: 20px;
            width: 500px; display: none; z-index: 200;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="logo">iPlayer TV</div>
        <div style="color: #888; font-size: 18px;">MENU</div>
        <p>Press BLUE for Settings</p>
        <p id="channel-count">Channels: 0</p>
    </div>

    <div id="main">
        <input type="text" class="search-bar" placeholder="Enter M3U URL..." id="m3u-input">
        <div id="channel-list-container">
            <div id="virtual-spacer" style="width: 100%;"></div>
            <div id="render-area" style="position: absolute; top: 0; width: 100%;">
                <!-- Channels rendered here via JS -->
            </div>
        </div>
    </div>

    <!-- Video Player -->
    <div id="player-wrapper">
        <video id="video" crossorigin="anonymous"></video>
        <div class="status-badge" id="video-info">1080p | Auto</div>
        <div class="controls-overlay">
            <h1 id="playing-title">Channel Name</h1>
        </div>
    </div>

    <script>
        let allChannels = [];
        let currentIndex = 0;
        const itemHeight = 80; // height + margin
        const visibleCount = 10;
        let lastPlayedUrl = localStorage.getItem('lastChannel');

        const video = document.getElementById('video');
        const hls = new Hls();

        // 1. M3U Parser
        async function loadM3U(url) {
            try {
                const response = await fetch(url);
                const data = await response.text();
                parseM3U(data);
            } catch (e) {
                alert("Failed to load M3U URL");
            }
        }

        function parseM3U(content) {
            const lines = content.split('\n');
            allChannels = [];
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].startsWith('#EXTINF')) {
                    const name = lines[i].split(',')[1];
                    const url = lines[i + 1]?.trim();
                    if (url) allChannels.push({ name, url });
                }
            }
            document.getElementById('channel-count').innerText = `Channels: ${allChannels.length}`;
            render();
            
            // Load last channel if exists
            if (lastPlayedUrl) {
                playChannel(lastPlayedUrl, "Resuming last channel...");
            }
        }

        // 2. Virtual Rendering Engine (Lag-less)
        function render() {
            const container = document.getElementById('channel-list-container');
            const renderArea = document.getElementById('render-area');
            const spacer = document.getElementById('virtual-spacer');

            spacer.style.height = (allChannels.length * itemHeight) + "px";
            
            const start = Math.max(0, Math.floor(container.scrollTop / itemHeight) - 5);
            const end = Math.min(allChannels.length, start + visibleCount + 10);

            renderArea.style.transform = `translateY(${start * itemHeight}px)`;
            
            let html = '';
            for (let i = start; i < end; i++) {
                const isFocused = i === currentIndex ? 'focused' : '';
                html += `<div class="channel-item ${isFocused}" onclick="playChannel('${allChannels[i].url}', '${allChannels[i].name}')">
                            ${allChannels[i].name}
                         </div>`;
            }
            renderArea.innerHTML = html;
        }

        // 3. Video Controller
        function playChannel(url, name) {
            document.getElementById('player-wrapper').style.display = 'block';
            document.getElementById('playing-title').innerText = name;
            localStorage.setItem('lastChannel', url);

            if (Hls.isSupported()) {
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play();
            }
        }

        // 4. Remote Control Logic
        window.addEventListener('keydown', (e) => {
            const step = 1;
            switch(e.keyCode) {
                case 38: // Up
                    if (currentIndex > 0) currentIndex--;
                    break;
                case 40: // Down
                    if (currentIndex < allChannels.length - 1) currentIndex++;
                    break;
                case 13: // Enter
                    if (document.getElementById('player-wrapper').style.display === 'block') {
                        // Toggle pause/play in player
                    } else {
                        playChannel(allChannels[currentIndex].url, allChannels[currentIndex].name);
                    }
                    break;
                case 10009: // Samsung Back Button
                case 27:    // ESC
                    if (document.getElementById('player-wrapper').style.display === 'block') {
                        document.getElementById('player-wrapper').style.display = 'none';
                        video.pause();
                        e.preventDefault();
                    }
                    break;
                case 403: // Red Button (example) - Load URL
                    const url = prompt("Enter M3U URL:");
                    if(url) loadM3U(url);
                    break;
            }
            
            // Auto-scroll the virtual container
            const container = document.getElementById('channel-list-container');
            container.scrollTop = (currentIndex * itemHeight) - (container.clientHeight / 2);
            render();
        });

        // 5. Settings & Audio/Resolution handling
        hls.on(Hls.Events.LEVEL_SWITCHED, (event, data) => {
            const level = hls.levels[data.level];
            document.getElementById('video-info').innerText = `${level.height}p | Audio: ${hls.audioTracks.length > 0 ? 'Multi' : 'Stereo'}`;
        });

        // Load default or saved M3U
        const savedM3u = localStorage.getItem('m3u_url') || "https://iptv-org.github.io/iptv/index.m3u";
        loadM3U(savedM3u);

        // Handle URL input change
        document.getElementById('m3u-input').addEventListener('change', (e) => {
            localStorage.setItem('m3u_url', e.target.value);
            loadM3U(e.target.value);
        });

    </script>
</body>
</html>
