<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV COMMANDER ELITE - FULL EDITOR</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --sidebar: #0f0f0f; --accent: #007AFF; --danger: #FF3B30; --text: #FFFFFF; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto', sans-serif; text-transform: uppercase; font-weight: 900; letter-spacing: 0.5px; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; font-size: 10px; }
        
        /* 3-COLUMN LAYOUT */
        .app-shell { display: flex; height: 100vh; }
        .col-sources { width: 70px; background: #000; display: flex; flex-direction: column; align-items: center; padding: 20px 0; border-right: 1px solid #222; }
        .source-icon { width: 45px; height: 45px; background: #1a1a1a; border-radius: 12px; margin-bottom: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; border: 2px solid transparent; transition: 0.2s; }
        .source-icon.active { border-color: var(--accent); background: var(--accent); }
        
        .col-nav { width: 280px; background: var(--sidebar); display: flex; flex-direction: column; border-right: 1px solid #222; }
        .mode-switch { display: flex; padding: 15px; gap: 5px; }
        .mode-btn { flex: 1; padding: 10px; background: #222; border-radius: 8px; text-align: center; cursor: pointer; font-size: 8px; color: #555; }
        .mode-btn.active { background: var(--accent); color: #fff; }
        
        .cat-scroll { flex: 1; overflow-y: auto; padding: 10px; }
        .cat-item { padding: 12px; margin-bottom: 4px; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; color: #666; transition: 0.2s; position: relative; }
        .cat-item:hover { background: #1a1a1a; color: #fff; }
        .cat-item.active { background: rgba(0, 122, 255, 0.2); color: var(--accent); }
        .cat-edit-btn { opacity: 0; font-size: 8px; background: #333; padding: 4px 6px; border-radius: 4px; color: #fff; }
        .cat-item:hover .cat-edit-btn { opacity: 1; }

        /* GRID */
        main { flex: 1; display: flex; flex-direction: column; background: #000; }
        header { height: 70px; padding: 0 25px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #222; }
        .search-bar { background: #111; border: 1px solid #333; padding: 12px 20px; border-radius: 10px; width: 350px; color: #fff; font-size: 10px; }
        
        .grid { flex: 1; overflow-y: auto; padding: 25px; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .card { background: #0a0a0a; border-radius: 12px; padding: 15px; text-align: center; border: 1px solid #222; cursor: pointer; transition: 0.2s; }
        .card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .card img { width: 100%; aspect-ratio: 1; object-fit: contain; border-radius: 6px; background: #000; margin-bottom: 10px; }
        .card-name { font-size: 8px; height: 22px; overflow: hidden; color: #ccc; }

        /* MODALS */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: #111; padding: 35px; border-radius: 20px; width: 450px; border: 1px solid #333; }
        input, select { width: 100%; padding: 14px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; font-weight: 900; }
        .btn { width: 100%; padding: 14px; border-radius: 8px; border: none; cursor: pointer; color: #fff; font-weight: 900; transition: 0.2s; }
        .btn-blue { background: var(--accent); }
        .btn-red { background: var(--danger); margin-top: 10px; }
        #loading { position: fixed; top: 20px; right: 20px; background: var(--accent); padding: 10px 20px; border-radius: 20px; display: none; z-index: 2000; }
    </style>
</head>
<body>

    <div id="loading">PROCESSING DATA...</div>

    <!-- IMPORT MODAL -->
    <div class="modal-overlay" id="importModal" style="display: flex;">
        <div class="modal">
            <h2 style="text-align:center; margin-bottom:20px;">IPTV COMMANDER ELITE</h2>
            <input type="text" id="xtHost" placeholder="SERVER URL (http://...)">
            <input type="text" id="xtUser" placeholder="USERNAME">
            <input type="password" id="xtPass" placeholder="PASSWORD">
            <div style="text-align:center; margin: 15px 0; font-size: 8px; opacity:0.4;">— OR IMPORT M3U FILE —</div>
            <input type="file" id="m3uFile" accept=".m3u,.m3u8">
            <button class="btn btn-blue" onclick="addPlaylist()">IMPORT SOURCE</button>
        </div>
    </div>

    <!-- ITEM EDITOR -->
    <div class="modal-overlay" id="itemModal">
        <div class="modal">
            <h3>EDIT CHANNEL</h3>
            <input type="text" id="editItemName" placeholder="CHANNEL NAME">
            <input type="text" id="editItemLogo" placeholder="LOGO URL">
            <label style="font-size: 8px; color: #555;">MOVE TO GROUP:</label>
            <select id="editItemCat"></select>
            <button class="btn btn-blue" onclick="saveItemChanges()">SAVE ITEM</button>
            <button class="btn btn-red" onclick="deleteItem()">DELETE ITEM</button>
            <button class="btn" style="background:#222; margin-top:10px;" onclick="closeModal('itemModal')">CANCEL</button>
        </div>
    </div>

    <!-- GROUP EDITOR -->
    <div class="modal-overlay" id="groupModal">
        <div class="modal">
            <h3>EDIT GROUP</h3>
            <input type="text" id="editGroupName" placeholder="GROUP NAME">
            <button class="btn btn-blue" onclick="saveGroupRename()">RENAME GROUP</button>
            <button class="btn btn-red" onclick="deleteGroup()">DELETE ENTIRE GROUP</button>
            <button class="btn" style="background:#222; margin-top:10px;" onclick="closeModal('groupModal')">CANCEL</button>
        </div>
    </div>

    <div class="app-shell">
        <div class="col-sources" id="sourceBar">
            <div class="source-icon active" onclick="location.reload()">+</div>
        </div>
        <div class="col-nav">
            <div class="mode-switch">
                <div class="mode-btn active" id="btn-live" onclick="setMode('live')">LIVE</div>
                <div class="mode-btn" id="btn-movie" onclick="setMode('movie')">VOD</div>
                <div class="mode-btn" id="btn-series" onclick="setMode('series')">SERIES</div>
            </div>
            <div class="cat-scroll" id="catList"></div>
        </div>
        <main>
            <header>
                <div id="activeInfo" style="color:var(--accent)">READY</div>
                <input type="text" class="search-bar" id="search" placeholder="SEARCH DIRECTORY..." oninput="handleSearch()">
                <button class="btn btn-blue" style="width:auto; padding:10px 20px;" onclick="exportM3U()">EXPORT M3U</button>
            </header>
            <div class="grid" id="mainGrid"></div>
        </main>
    </div>

    <script>
        const PROXY = "https://layasync-proxy.layasync.workers.dev/?url=";
        let playlist = { live: {cats:[], items:[]}, movie: {cats:[], items:[]}, series: {cats:[], items:[]}, creds: null };
        let activeMode = 'live', activeCatId = null, editingItemId = null, editingCatId = null;

        const openModal = (id) => document.getElementById(id).style.display = 'flex';
        const closeModal = (id) => document.getElementById(id).style.display = 'none';

        async function addPlaylist() {
            document.getElementById('loading').style.display = 'block';
            const file = document.getElementById('m3uFile').files[0];
            try {
                if(file) {
                    const text = await file.text();
                    parseM3U(text);
                } else {
                    const h = document.getElementById('xtHost').value, u = document.getElementById('xtUser').value, p = document.getElementById('xtPass').value;
                    playlist.creds = { h, u, p };
                    const eps = ['get_live_categories','get_live_streams','get_vod_categories','get_vod_streams','get_series_categories','get_series'];
                    const res = await Promise.all(eps.map(ep => fetch(`${PROXY}${encodeURIComponent(`${h}/player_api.php?username=${u}&password=${p}&action=${ep}`)}`).then(r => r.json())));
                    playlist.live = { cats: res[0], items: res[1] || [] };
                    playlist.movie = { cats: res[2], items: res[3] || [] };
                    playlist.series = { cats: res[4], items: res[5] || [] };
                }
                closeModal('importModal');
                setMode('live');
            } catch(e) { alert("IMPORT FAILED. CHECK PROXY/SERVER."); }
            document.getElementById('loading').style.display = 'none';
        }

        function parseM3U(text) {
            const lines = text.split('\n');
            const gMap = new Map();
            lines.forEach((line, i) => {
                if(line.startsWith('#EXTINF:')) {
                    const url = lines[i+1]?.trim();
                    if(url && !url.startsWith('#')) {
                        const name = (line.match(/,(.*)$/)?.[1] || "UNNAMED").trim();
                        const group = (line.match(/group-title="([^"]*)"/)?.[1] || "UNSORTED").trim();
                        const logo = (line.match(/tvg-logo="([^"]*)"/)?.[1] || "").trim();
                        if(!gMap.has(group)) gMap.set(group, { category_id: group, category_name: group });
                        playlist.live.items.push({ stream_id: 'm3u-'+Math.random(), name, stream_icon: logo, category_id: group, url });
                    }
                }
            });
            playlist.live.cats = Array.from(gMap.values());
        }

        function setMode(mode) {
            activeMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.id === 'btn-'+mode));
            activeCatId = null;
            renderCategories();
            loadCategory(null);
        }

        function renderCategories() {
            const list = document.getElementById('catList'); list.innerHTML = "";
            const cats = playlist[activeMode].cats;
            
            const all = document.createElement('div');
            all.className = `cat-item ${activeCatId === null ? 'active' : ''}`;
            all.innerText = "ALL CONTENT";
            all.onclick = () => loadCategory(null);
            list.appendChild(all);

            cats.forEach(c => {
                const div = document.createElement('div');
                div.className = `cat-item ${activeCatId === c.category_id ? 'active' : ''}`;
                div.innerHTML = `<span>${c.category_name}</span> <div class="cat-edit-btn" onclick="openCatEditor('${c.category_id}', event)">EDIT</div>`;
                div.onclick = () => loadCategory(c.category_id);
                list.appendChild(div);
            });
        }

        function loadCategory(id) {
            activeCatId = id;
            renderCategories();
            const items = playlist[activeMode].items;
            const filtered = id ? items.filter(i => i.category_id == id) : items;
            renderGrid(filtered);
        }

        function renderGrid(items) {
            const grid = document.getElementById('mainGrid'); grid.innerHTML = "";
            const frag = document.createDocumentFragment();
            items.slice(0, 1000).forEach(i => {
                const card = document.createElement('div');
                card.className = 'card';
                card.setAttribute('data-id', i.stream_id || i.series_id || i.vod_id);
                card.onclick = () => openItemEditor(i);
                const img = i.stream_icon || i.cover || 'https://via.placeholder.com/150?text=NO+LOGO';
                card.innerHTML = `<img src="${img}" loading="lazy"><div class="card-name">${i.name}</div>`;
                frag.appendChild(card);
            });
            grid.appendChild(frag);
        }

        // ITEM EDITOR LOGIC
        function openItemEditor(item) {
            editingItemId = item.stream_id || item.series_id || item.vod_id;
            document.getElementById('editItemName').value = item.name;
            document.getElementById('editItemLogo').value = item.stream_icon || item.cover || '';
            
            const sel = document.getElementById('editItemCat');
            sel.innerHTML = playlist[activeMode].cats.map(c => `<option value="${c.category_id}" ${c.category_id == item.category_id ? 'selected' : ''}>${c.category_name}</option>`).join('');
            
            openModal('itemModal');
        }

        function saveItemChanges() {
            const item = playlist[activeMode].items.find(i => (i.stream_id || i.series_id || i.vod_id) == editingItemId);
            const newName = document.getElementById('editItemName').value;
            const newLogo = document.getElementById('editItemLogo').value;
            const newCat = document.getElementById('editItemCat').value;

            item.name = newName;
            if(item.stream_icon !== undefined) item.stream_icon = newLogo;
            if(item.cover !== undefined) item.cover = newLogo;
            item.category_id = newCat;

            // BUG FIX: Instant Logo & Name Update in DOM
            const card = document.querySelector(`.card[data-id="${editingItemId}"]`);
            if(card) {
                card.querySelector('.card-name').innerText = newName;
                card.querySelector('img').src = newLogo;
            }
            
            closeModal('itemModal');
            loadCategory(activeCatId); // Refresh grid view
        }

        function deleteItem() {
            playlist[activeMode].items = playlist[activeMode].items.filter(i => (i.stream_id || i.series_id || i.vod_id) != editingItemId);
            closeModal('itemModal');
            loadCategory(activeCatId);
        }

        // GROUP EDITOR LOGIC
        function openCatEditor(id, e) {
            e.stopPropagation();
            editingCatId = id;
            const cat = playlist[activeMode].cats.find(c => c.category_id == id);
            document.getElementById('editGroupName').value = cat.category_name;
            openModal('groupModal');
        }

        function saveGroupRename() {
            const newName = document.getElementById('editGroupName').value;
            const cat = playlist[activeMode].cats.find(c => c.category_id == editingCatId);
            cat.category_name = newName;
            
            // If M3U, we must update all items that share this name as an ID
            playlist[activeMode].items.forEach(i => {
                if(i.category_id == editingCatId) i.category_id = editingCatId; // IDs stay consistent, only name changes
            });

            closeModal('groupModal');
            renderCategories();
        }

        function deleteGroup() {
            if(!confirm("DELETE ALL CHANNELS IN THIS GROUP?")) return;
            playlist[activeMode].items = playlist[activeMode].items.filter(i => i.category_id != editingCatId);
            playlist[activeMode].cats = playlist[activeMode].cats.filter(c => c.category_id != editingCatId);
            closeModal('groupModal');
            setMode(activeMode);
        }

        function handleSearch() {
            const q = document.getElementById('search').value.toLowerCase();
            const filtered = playlist[activeMode].items.filter(i => i.name.toLowerCase().includes(q));
            renderGrid(filtered);
        }

        function exportM3U() {
            let m3u = "#EXTM3U\n";
            ['live', 'movie', 'series'].forEach(m => {
                playlist[m].items.forEach(i => {
                    let url = i.url;
                    if(!url && playlist.creds) {
                        url = `${playlist.creds.h}/${m==='live'?'':'movie/'}${playlist.creds.u}/${playlist.creds.p}/${i.stream_id||i.series_id||i.vod_id}${m==='live'?'.ts':'.mp4'}`;
                    }
                    const catName = playlist[m].cats.find(c => c.category_id == i.category_id)?.category_name || m;
                    m3u += `#EXTINF:-1 tvg-logo="${i.stream_icon||i.cover||''}" group-title="${catName}",${i.name}\n${url}\n`;
                });
            });
            const b = new Blob([m3u], {type: 'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(b); a.download = "Commander_Elite_Export.m3u"; a.click();
        }
    </script>
</body>
</html>
