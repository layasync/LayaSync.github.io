<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Samsung Remote</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:#0f0f0f; color:#fff; font-family:'Inter',sans-serif; min-height:100dvh; padding-bottom:50px; }

/* Top bar */
.topbar { display:flex; align-items:center; justify-content:space-between; padding:16px 18px; background:#0f0f0f; border-bottom:1px solid #1e1e1e; position:sticky; top:0; z-index:50; }
.topbar-title { font-size:16px; font-weight:700; }
.badge { display:flex; align-items:center; gap:7px; padding:8px 14px; border-radius:100px; background:#1a1a1a; border:1.5px solid #2a2a2a; font-size:12px; font-weight:600; cursor:pointer; transition:border-color .2s; }
.badge:hover { border-color:#555; }
.dot { width:7px; height:7px; border-radius:50%; background:#ff4444; flex-shrink:0; transition:all .3s; }
.dot.on  { background:#00e676; box-shadow:0 0 8px #00e676; }
.dot.ing { background:#ffbb00; animation:blink .7s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* Sheet */
.sheet { background:#141414; border-bottom:1px solid #222; padding:20px 18px; display:none; }
.sheet.open { display:block; }
.sheet-title { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:#666; margin-bottom:16px; }

/* Scan UI */
.scan-area { display:flex; flex-direction:column; gap:10px; }
.scan-btn {
  width:100%; padding:14px; border-radius:12px;
  background:linear-gradient(135deg,#1a2a6c,#2a4fff);
  border:none; color:#fff; font-family:'Inter',sans-serif;
  font-size:15px; font-weight:700; cursor:pointer;
  transition:opacity .2s, transform .1s;
  display:flex; align-items:center; justify-content:center; gap:10px;
}
.scan-btn:hover { opacity:.9; }
.scan-btn:active { transform:scale(.97); }
.scan-btn:disabled { background:#222; color:#555; cursor:not-allowed; }

.scan-progress { display:none; }
.scan-progress.show { display:block; }
.progress-bar-bg { background:#1e1e1e; border-radius:100px; height:4px; margin-bottom:10px; overflow:hidden; }
.progress-bar { height:100%; border-radius:100px; background:linear-gradient(90deg,#2a4fff,#00e676); width:0%; transition:width .1s; }
.scan-status { font-size:12px; color:#666; text-align:center; margin-bottom:8px; }

/* Found devices */
.devices { display:flex; flex-direction:column; gap:8px; margin-top:4px; }
.device-card {
  display:flex; align-items:center; gap:12px; padding:14px;
  background:#1e1e1e; border:1.5px solid #2a2a2a; border-radius:12px;
  cursor:pointer; transition:all .2s;
}
.device-card:hover { border-color:#4f7fff; background:#222; }
.device-card:active { transform:scale(.97); }
.device-icon { font-size:28px; flex-shrink:0; }
.device-info { flex:1; }
.device-name { font-size:14px; font-weight:600; }
.device-ip   { font-size:12px; color:#666; margin-top:2px; }
.device-arrow { color:#444; font-size:18px; }

/* Manual input */
.divider { display:flex; align-items:center; gap:10px; color:#444; font-size:12px; margin:4px 0; }
.divider::before, .divider::after { content:''; flex:1; height:1px; background:#222; }

.input-row { display:flex; gap:8px; }
input {
  flex:1; background:#1e1e1e; border:1.5px solid #2a2a2a; border-radius:10px;
  padding:12px 14px; color:#fff; font-family:'Inter',sans-serif; font-size:15px; outline:none; transition:border-color .2s;
}
input:focus { border-color:#4f7fff; }
input::placeholder { color:#444; }
.btn-manual {
  padding:0 18px; height:48px; background:#4f7fff; border:none; border-radius:10px;
  color:#fff; font-family:'Inter',sans-serif; font-size:14px; font-weight:600;
  cursor:pointer; white-space:nowrap; transition:background .2s;
}
.btn-manual:hover { background:#3d6fee; }
.btn-manual:disabled { background:#333; color:#555; cursor:not-allowed; }

/* Log */
.log { background:#0a0a0a; border-radius:8px; padding:8px 12px; font-family:monospace; font-size:11px; color:#00e676; max-height:70px; overflow-y:auto; display:none; line-height:1.8; margin-top:8px; }
.log.open { display:block; }
.le { color:#ff4444; } .lw { color:#ffbb00; } .li { color:#444; }

/* Remote body */
.remote { padding:18px; display:flex; flex-direction:column; align-items:center; gap:14px; max-width:340px; margin:0 auto; }

/* Buttons */
.btn { background:#1e1e1e; border:1.5px solid #2a2a2a; border-radius:12px; color:#fff; font-family:'Inter',sans-serif; font-weight:600; cursor:pointer; transition:background .12s, transform .1s; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:4px; user-select:none; }
.btn:hover  { background:#272727; border-color:#444; }
.btn:active { transform:scale(.90); background:#111; }

.row { display:flex; gap:10px; width:100%; }
.lbl { width:100%; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:#444; padding-top:2px; }

/* Power row */
.btn-power { width:60px; height:60px; border-radius:50%; background:#2a1010; border-color:#5a1a1a; color:#ff4444; font-size:22px; flex-shrink:0; }
.btn-power:hover { background:#3a1515; border-color:#ff4444; }
.btn-source { flex:1; height:60px; font-size:13px; }
.btn-source .ico { font-size:20px; }
.btn-bixby { width:60px; height:60px; border-radius:50%; background:#101828; border-color:#1e3a7a; color:#4f7fff; flex-shrink:0; }
.btn-bixby:hover { border-color:#4f7fff; box-shadow:0 0 14px rgba(79,127,255,.3); }
.btn-bixby.glow { animation:bglow 1s ease-in-out infinite; }
@keyframes bglow { 0%,100%{box-shadow:0 0 8px rgba(79,127,255,.3)} 50%{box-shadow:0 0 24px rgba(79,127,255,.7)} }

/* Vol/Ch */
.vc-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; width:100%; }
.vc-card { background:#161616; border:1.5px solid #222; border-radius:14px; padding:14px; }
.vc-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:#555; margin-bottom:12px; }
.vc-row { display:flex; align-items:center; justify-content:space-between; }
.btn-circ { width:44px; height:44px; border-radius:50%; font-size:20px; font-weight:300; }
.btn-mid  { width:36px; height:36px; border-radius:50%; font-size:13px; color:#888; }

/* Dpad */
.dpad { position:relative; width:196px; height:196px; flex-shrink:0; }
.btn-ok { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:70px; height:70px; border-radius:50%; background:#4f7fff; border:none; color:#fff; font-size:14px; font-weight:700; cursor:pointer; z-index:2; box-shadow:0 0 20px rgba(79,127,255,.4); transition:transform .1s, background .1s; font-family:'Inter',sans-serif; }
.btn-ok:active { transform:translate(-50%,-50%) scale(.9); background:#3d6fee; }
.btn-dir { position:absolute; width:56px; height:56px; background:#1e1e1e; border:1.5px solid #2a2a2a; color:#fff; font-size:16px; cursor:pointer; transition:all .12s; display:flex; align-items:center; justify-content:center; font-family:'Inter',sans-serif; }
.btn-dir:hover  { background:#272727; border-color:#444; }
.btn-dir:active { background:#111; }
.dir-up    { top:0;    left:50%; transform:translateX(-50%); border-radius:12px 12px 4px 4px; }
.dir-down  { bottom:0; left:50%; transform:translateX(-50%); border-radius:4px 4px 12px 12px; }
.dir-left  { left:0;   top:50%;  transform:translateY(-50%); border-radius:12px 4px 4px 12px; }
.dir-right { right:0;  top:50%;  transform:translateY(-50%); border-radius:4px 12px 12px 4px; }
.dir-up:active    { transform:translateX(-50%) scale(.88) !important; }
.dir-down:active  { transform:translateX(-50%) scale(.88) !important; }
.dir-left:active  { transform:translateY(-50%) scale(.88) !important; }
.dir-right:active { transform:translateY(-50%) scale(.88) !important; }

/* Media */
.btn-med { flex:1; height:48px; border-radius:11px; font-size:18px; }

/* Colors */
.colors { display:flex; gap:8px; width:100%; }
.btn-col { flex:1; height:10px; border-radius:100px; border:none; cursor:pointer; transition:transform .2s; }
.btn-col:hover { transform:scaleY(3); } .btn-col:active { transform:scaleY(2); }

/* Grids */
.grid4 { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; width:100%; }
.grid3 { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; width:100%; }
.btn-sp  { height:54px; border-radius:11px; font-size:11px; font-weight:600; }
.btn-sp .ico { font-size:18px; }
.btn-app { height:64px; border-radius:13px; font-size:11px; font-weight:600; color:#aaa; }
.btn-app .ico { font-size:24px; }
.btn-app:hover { color:#fff; }
.btn-num { height:54px; border-radius:11px; font-size:20px; font-weight:600; }
.num-0 { grid-column:2; }

/* Voice */
.voice-card { width:100%; background:#161616; border:1.5px solid #222; border-radius:14px; padding:14px 16px; display:flex; align-items:center; gap:14px; }
.btn-mic { width:52px; height:52px; border-radius:50%; flex-shrink:0; font-size:22px; background:#1e1e1e; border:2px solid #2a2a2a; color:#888; cursor:pointer; transition:all .2s; display:flex; align-items:center; justify-content:center; }
.btn-mic:hover { border-color:#4f7fff; color:#4f7fff; }
.btn-mic.on { border-color:#ff4444; color:#ff4444; animation:mpulse 1s ease-in-out infinite; box-shadow:0 0 14px rgba(255,68,68,.3); }
@keyframes mpulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
.voice-info { flex:1; }
.voice-title { font-size:13px; font-weight:600; margin-bottom:2px; }
.voice-hint  { font-size:11px; color:#555; line-height:1.5; }
.voice-res   { font-size:12px; color:#4f7fff; font-style:italic; margin-top:3px; min-height:16px; }

/* Toast */
.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(100px); background:#222; border:1px solid #333; border-radius:100px; padding:11px 22px; font-size:13px; font-weight:600; z-index:999; transition:transform .3s cubic-bezier(.34,1.56,.64,1); white-space:nowrap; max-width:88vw; text-align:center; pointer-events:none; }
.toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">📺 Samsung Remote</div>
  <div class="badge" onclick="toggleSheet()">
    <div class="dot" id="dot"></div>
    <span id="connLabel">Connect</span>
  </div>
</div>

<div class="sheet open" id="sheet">
  <div class="sheet-title">Find Your TV</div>
  <div class="scan-area">

    <button class="scan-btn" id="scanBtn" onclick="startScan()">
      <span id="scanBtnIcon">🔍</span>
      <span id="scanBtnText">Auto-Scan My Network</span>
    </button>

    <div class="scan-progress" id="scanProgress">
      <div class="scan-status" id="scanStatus">Scanning…</div>

    </div>

    <div class="devices" id="deviceList"></div>

    <div class="divider">or enter manually</div>

      <button class="btn-manual" id="manualBtn" onclick="connectTo(document.getElementById('ipInput').value.trim())">Connect</button>

    <div class="log" id="log"></div>

</div>

<div class="remote">

    <button class="btn-mic" id="micBtn" onclick="toggleVoice()">🎤</button>
    <div class="voice-info">
      <div class="voice-title">Voice Control</div>
      <div class="voice-hint">Say: "volume up", "Netflix", "channel 5", "Bixby"</div>
      <div class="voice-res" id="voiceRes"></div>
    </div>
  </div>

  <div class="lbl">Power</div>
  <div class="row">
    <button class="btn btn-power" onclick="k('KEY_POWER')">⏻</button>
    <button class="btn btn-source" onclick="k('KEY_SOURCE')"><span class="ico">⤢</span>Source / Input</button>
    <button class="btn btn-bixby" id="bixbyBtn" onclick="bixby()">

        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/>
        <path d="M8.5 12c0-1.93 1.57-3.5 3.5-3.5s3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="12" cy="12" r="2" fill="currentColor"/>
      </svg>
    </button>
  </div>

  <div class="lbl">Volume & Channel</div>
  <div class="vc-grid">

  <div class="lbl">Navigate</div>

    <button class="btn-dir dir-up"    onclick="k('KEY_UP')">▲</button>
    <button class="btn-dir dir-left"  onclick="k('KEY_LEFT')">◀</button>
    <button class="btn-ok"            onclick="k('KEY_ENTER')">OK</button>
    <button class="btn-dir dir-right" onclick="k('KEY_RIGHT')">▶</button>

  </div>

  <div class="row">
    <button class="btn" style="flex:1;height:50px;border-radius:11px;font-size:11px;font-weight:600" onclick="k('KEY_HOME')"><span style="font-size:18px">🏠</span>Home</button>
    <button class="btn" style="flex:1;height:50px;border-radius:11px;font-size:11px;font-weight:600" onclick="k('KEY_BACK')"><span style="font-size:18px">↩</span>Back</button>

    <button class="btn btn-app" onclick="app('3201910019365')"><span class="ico">🎵</span>Spotify</button>
    <button class="btn btn-app" onclick="app('3201606009684')"><span class="ico">🎬</span>Prime</button>

    <button class="btn btn-sp" onclick="k('KEY_CAPTION')"><span class="ico">💬</span>CC</button>

    <button class="btn btn-num" onclick="k('KEY_6')">6</button>

    <button class="btn btn-num" onclick="k('KEY_8')">8</button>

</div>

<div class="toast" id="toast"></div>

<script>
let ws = null, connected = false, tvIp = '';
let voiceOn = false, rec = null;
let scanning = false, scanAbort = false;

// ── Toast ──────────────────────────────────────────────────────
let toastTimer;
function toast(msg, ms=2500) {
  clearTimeout(toastTimer);
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  toastTimer = setTimeout(() => el.classList.remove('show'), ms);
}

// ── Status ─────────────────────────────────────────────────────
function setStatus(state, label) {
  connected = state === true;
  document.getElementById('dot').className = 'dot'+(state===true?' on':state===null?' ing':'');
  document.getElementById('connLabel').textContent = label;
}

// ── Log ────────────────────────────────────────────────────────
function addLog(msg, cls='') {
  const b = document.getElementById('log');
  b.classList.add('open');
  const s = document.createElement('span');
  s.className = cls ? 'l'+cls : '';
  s.textContent = msg + '\n';
  b.appendChild(s);
  b.scrollTop = b.scrollHeight;
}

function toggleSheet() {
  document.getElementById('sheet').classList.toggle('open');
}

// ── Auto Scan ──────────────────────────────────────────────────
// Strategy: detect phone's subnet via WebRTC, then sweep .1–.254
// trying Samsung TV ports 8001 & 8002 on each IP via WebSocket

async function getLocalSubnet() {
  return new Promise(resolve => {
    try {
      const pc = new RTCPeerConnection({ iceServers: [] });
      pc.createDataChannel('');
      pc.createOffer().then(o => pc.setLocalDescription(o));
      pc.onicecandidate = e => {
        if (!e || !e.candidate) return;
        const m = e.candidate.candidate.match(/(\d+\.\d+\.\d+)\.\d+/);
        if (m) { pc.close(); resolve(m[1]); }
      };
      setTimeout(() => { pc.close(); resolve(null); }, 3000);
    } catch(e) { resolve(null); }
  });
}

async function probeSamsungTV(ip) {
  // Try to open WebSocket — if it connects or sends data it's likely a Samsung TV
  return new Promise(resolve => {
    const name = encodeURIComponent(btoa('SamsungRemote'));
    const url = `ws://${ip}:8001/api/v2/channels/samsung.remote.control?name=${name}`;
    let done = false;
    let sock;
    try { sock = new WebSocket(url); } catch(e) { resolve(false); return; }

    const t = setTimeout(() => { if (!done) { done=true; try{sock.close();}catch(x){} resolve(false); } }, 1200);

    sock.onopen = () => {
      if (!done) { done=true; clearTimeout(t); try{sock.close();}catch(x){} resolve(ip); }
    };
    sock.onmessage = () => {
      if (!done) { done=true; clearTimeout(t); resolve(ip); }
    };
    sock.onerror = () => {
      if (!done) { done=true; clearTimeout(t); resolve(false); }
    };
    sock.onclose = () => {
      // onclose after onopen means it responded — could still be TV
    };
  });
}

async function startScan() {
  if (scanning) { scanAbort = true; return; }

  scanning = true;
  scanAbort = false;
  const scanBtn = document.getElementById('scanBtn');
  const scanBtnText = document.getElementById('scanBtnText');
  const scanBtnIcon = document.getElementById('scanBtnIcon');
  const progress = document.getElementById('scanProgress');
  const statusEl = document.getElementById('scanStatus');
  const bar = document.getElementById('progressBar');
  const list = document.getElementById('deviceList');

  scanBtn.disabled = false;
  scanBtnText.textContent = 'Stop Scan';
  scanBtnIcon.textContent = '⏹';
  progress.classList.add('show');
  list.innerHTML = '';
  bar.style.width = '0%';

  // Detect subnet
  statusEl.textContent = 'Detecting your network…';
  let subnet = await getLocalSubnet();

  if (!subnet) {
    // Fallback: guess common home subnets
    statusEl.textContent = 'Could not detect subnet, trying common ranges…';
    subnet = '192.168.1';
  }

  addLog('Scanning subnet ' + subnet + '.1–254 for Samsung TVs…');
  statusEl.textContent = 'Scanning ' + subnet + '.x — this takes ~30 seconds';

  const found = [];
  const total = 254;
  let done = 0;
  const BATCH = 20; // scan 20 IPs at a time

  for (let start = 1; start <= total && !scanAbort; start += BATCH) {
    const batch = [];
    for (let i = start; i < start + BATCH && i <= total; i++) {
      batch.push(subnet + '.' + i);
    }

    const results = await Promise.all(batch.map(ip => probeSamsungTV(ip)));

    for (let i = 0; i < results.length; i++) {
      done++;
      bar.style.width = Math.round((done / total) * 100) + '%';
      if (results[i]) {
        const ip = results[i];
        found.push(ip);
        addLog('✅ Found Samsung TV at ' + ip);
        addDeviceCard(ip, list);
      }
    }
  }

  // Also try common TV IPs if nothing found
  if (found.length === 0 && !scanAbort) {
    statusEl.textContent = 'Trying common TV addresses…';
    const common = ['192.168.0.1','192.168.1.1','192.168.2.1','10.0.0.1','10.0.1.1'];
    // try alternate subnets
    for (const altSubnet of ['192.168.0','192.168.2','10.0.0','10.0.1']) {
      if (altSubnet + '' !== subnet && !scanAbort) {
        for (let i = 1; i <= 30 && !scanAbort; i++) {
          const ip = altSubnet + '.' + i;
          const r = await probeSamsungTV(ip);
          if (r) { found.push(r); addDeviceCard(r, list); addLog('✅ Found at ' + r); }
        }
      }
    }
  }

  // Done
  scanning = false;
  scanAbort = false;
  scanBtn.disabled = false;
  scanBtnText.textContent = 'Scan Again';
  scanBtnIcon.textContent = '🔍';
  bar.style.width = '100%';

  if (found.length === 0) {
    statusEl.textContent = '❌ No Samsung TVs found';
    addLog('No TVs found. Make sure TV is on and on same WiFi.', 'e');
    addLog('You can still enter the IP manually below.', 'w');
    toast('No TVs found — try entering IP manually', 3500);
  } else {
    statusEl.textContent = '✅ Found ' + found.length + ' TV' + (found.length>1?'s':'') + ' — tap to connect';
    toast('✅ Found ' + found.length + ' Samsung TV!');
  }
}

function addDeviceCard(ip, container) {
  const card = document.createElement('div');
  card.className = 'device-card';
  card.innerHTML = `
    <div class="device-icon">📺</div>
    <div class="device-info">
      <div class="device-name">Samsung TV</div>
      <div class="device-ip">${ip}</div>
    </div>
    <div class="device-arrow">›</div>
  `;
  card.onclick = () => connectTo(ip);
  container.appendChild(card);
}

// ── Connect ────────────────────────────────────────────────────
function connectTo(ip) {
  ip = ip.trim();
  if (!ip) { toast('⚠️ Enter TV IP'); return; }

  tvIp = ip;
  document.getElementById('ipInput').value = ip;
  document.getElementById('manualBtn').disabled = true;
  setStatus(null, 'Connecting…');
  if (ws) { try{ws.close();}catch(e){} ws=null; }

  const name = encodeURIComponent(btoa('SamsungRemote'));
  const saved = (() => { try{return localStorage.getItem('tv_tok_'+ip)||'';}catch(e){return '';} })();
  const tok = saved ? '&token='+saved : '';

  addLog('Connecting to ' + ip + '…');
  tryPort(`wss://${ip}:8002/api/v2/channels/samsung.remote.control?name=${name}${tok}`,
          `ws://${ip}:8001/api/v2/channels/samsung.remote.control?name=${name}${tok}`);
}

function tryPort(urlA, urlB, fallback=false) {
  let sock;
  try { sock = new WebSocket(urlA); }
  catch(e) {
    if (!fallback) tryPort(urlB, null, true);
    else connFail();
    return;
  }

  const t = setTimeout(() => {
    try{sock.close();}catch(e){}
    if (!fallback) { addLog('Trying port 8001…','w'); tryPort(urlB, null, true); }
    else connFail();
  }, 5000);

  sock.onopen = () => {
    clearTimeout(t);
    ws = sock;
    setStatus(true, tvIp);
    document.getElementById('manualBtn').disabled = false;
    document.getElementById('sheet').classList.remove('open');
    addLog('✅ Connected to ' + tvIp);
    toast('✅ Connected! Accept TV popup if it appears.');
  };

  sock.onerror = () => {
    clearTimeout(t);
    if (!fallback) { addLog('Port 8002 failed, trying 8001…','w'); tryPort(urlB, null, true); }
    else connFail();
  };

  sock.onmessage = e => {
    try {
      const d = JSON.parse(e.data);
      if (d.data?.token) {
        try{localStorage.setItem('tv_tok_'+tvIp, d.data.token);}catch(x){}
        addLog('🔑 TV paired & token saved');
      }
    } catch(x){}
  };

  sock.onclose = () => {
    if (connected) {
      setStatus(false, 'Disconnected');
      toast('📡 TV disconnected — tap Connect to reconnect');
      ws = null;
    }
  };
}

function connFail() {
  setStatus(false, 'Failed');
  document.getElementById('manualBtn').disabled = false;
  addLog('❌ Connection failed. Make sure:', 'e');
  addLog('  • Phone & TV on same WiFi', 'e');
  addLog('  • TV on and not in sleep mode', 'e');
  addLog('  • TV: Settings → General → External Device Manager → Device Connect Manager → First Time Only', 'e');
  toast('❌ Could not connect — check log', 3500);
  document.getElementById('sheet').classList.add('open');
}

// ── Keys ───────────────────────────────────────────────────────
function k(key) {
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    toast('Not connected — tap Connect at the top');
    document.getElementById('sheet').classList.add('open');
    return;
  }
  ws.send(JSON.stringify({ method:'ms.remote.control', params:{ Cmd:'Click', DataOfCmd:key, Option:'false', TypeOfRemote:'SendRemoteKey' } }));
  if (navigator.vibrate) navigator.vibrate(22);
}

function app(id) {
  if (!ws || ws.readyState !== WebSocket.OPEN) { toast('Not connected'); return; }
  ws.send(JSON.stringify({ method:'ms.channel.emit', params:{ event:'ed.apps.launch', to:'host', data:{ appId:id } } }));
  toast('🚀 Opening app…');
  if (navigator.vibrate) navigator.vibrate(22);
}

function bixby() {
  k('KEY_BIXBY');
  const b = document.getElementById('bixbyBtn');
  b.classList.add('glow');
  toast('🔵 Bixby!');
  setTimeout(() => b.classList.remove('glow'), 2000);
}

// ── Voice ──────────────────────────────────────────────────────
function toggleVoice() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) { toast('⚠️ Voice needs Chrome'); return; }
  if (voiceOn) { stopVoice(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  rec = new SR(); rec.lang='en-US'; rec.interimResults=false;
  rec.onstart = () => { voiceOn=true; document.getElementById('micBtn').classList.add('on'); document.getElementById('micBtn').textContent='🛑'; document.getElementById('voiceRes').textContent='Listening…'; };
  rec.onresult = e => { const cmd=e.results[0][0].transcript.toLowerCase().trim(); document.getElementById('voiceRes').textContent='"'+cmd+'"'; doVoice(cmd); };
  rec.onerror = () => stopVoice();
  rec.onend   = () => stopVoice();
  rec.start();
}
function stopVoice() {
  voiceOn=false;
  document.getElementById('micBtn').classList.remove('on');
  document.getElementById('micBtn').textContent='🎤';
  try{rec&&rec.stop();}catch(e){}
}
function doVoice(cmd) {
  toast('🎤 "'+cmd+'"');
  const map=[
    [['volume up','louder'],()=>k('KEY_VOLUP')],
    [['volume down','quieter'],()=>k('KEY_VOLDOWN')],
    [['mute','unmute'],()=>k('KEY_MUTE')],
    [['pause'],()=>k('KEY_PAUSE')],[['play'],()=>k('KEY_PLAY')],[['stop'],()=>k('KEY_STOP')],
    [['home'],()=>k('KEY_HOME')],[['back'],()=>k('KEY_BACK')],[['menu'],()=>k('KEY_MENU')],
    [['up'],()=>k('KEY_UP')],[['down'],()=>k('KEY_DOWN')],[['left'],()=>k('KEY_LEFT')],[['right'],()=>k('KEY_RIGHT')],
    [['ok','select','enter'],()=>k('KEY_ENTER')],
    [['power','turn off','turn on'],()=>k('KEY_POWER')],
    [['channel up','next'],()=>k('KEY_CHUP')],[['channel down','previous'],()=>k('KEY_CHDOWN')],
    [['source','input'],()=>k('KEY_SOURCE')],[['rewind'],()=>k('KEY_REWIND')],[['forward'],()=>k('KEY_FF')],
    [['bixby'],bixby],
    [['youtube'],()=>app('11101200001')],[['netflix'],()=>app('3201907018807')],
    [['spotify'],()=>app('3201910019365')],[['prime','amazon'],()=>app('3201606009684')],
  ];
  for (const [p,fn] of map) { if (p.some(x=>cmd.includes(x))) { fn(); return; } }
  const m=cmd.match(/(\d+)/);
  if(m){[...m[1]].forEach((d,i)=>setTimeout(()=>k('KEY_'+d),i*380));return;}
  document.getElementById('voiceRes').textContent='? Not recognized: "'+cmd+'"';
}

// Keyboard
document.addEventListener('keydown',e=>{
  const m={ArrowUp:'KEY_UP',ArrowDown:'KEY_DOWN',ArrowLeft:'KEY_LEFT',ArrowRight:'KEY_RIGHT',Enter:'KEY_ENTER',Backspace:'KEY_BACK',Escape:'KEY_HOME',m:'KEY_MUTE','+':'KEY_VOLUP','-':'KEY_VOLDOWN'};
  if(m[e.key]){e.preventDefault();k(m[e.key]);}
});
</script>
