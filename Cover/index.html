<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Music UI</title>

<style>
/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  font-family: Roboto, system-ui, sans-serif;
  background: linear-gradient(180deg, #1f3a46 0%, #0b1419 65%, #05090c 100%);
  color:#fff;
}

/* MAIN CONTAINER */
.player{
  max-width:420px;
  margin:0 auto;
  padding:16px;
  height:100%;
  display:flex;
  flex-direction:column;
}

/* COVER */
.cover{
  width:100%;
  aspect-ratio:1/1;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 24px 50px rgba(0,0,0,.6);
}

.cover img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* TITLE */
.info{
  margin-top:18px;
}

.info h1{
  font-size:22px;
  font-weight:700;
  letter-spacing:.2px;
}

.info p{
  margin-top:6px;
  font-size:15px;
  color:#b5b5b5;
}

/* ACTION ROW */
.actions{
  margin-top:22px;
  display:flex;
  justify-content:space-between;
}

.action{
  width:25%;
  text-align:center;
  font-size:12px;
  color:#b5b5b5;
}

.action svg{
  width:22px;
  height:22px;
  fill:#fff;
  display:block;
  margin:0 auto 6px;
}

/* SEEK BAR */
.seek{
  margin-top:26px;
}

.time{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  color:#9a9a9a;
  margin-bottom:6px;
}

.bar{
  width:100%;
  height:3px;
  background:#5f5f5f;
  border-radius:2px;
  position:relative;
}

.bar::after{
  content:"";
  position:absolute;
  left:0;
  top:50%;
  transform:translateY(-50%);
  width:14px;
  height:14px;
  background:#fff;
  border-radius:50%;
}

/* CONTROLS */
.controls{
  margin-top:30px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.controls svg{
  width:26px;
  height:26px;
  fill:#fff;
}

.play{
  width:72px;
  height:72px;
  background:#fff;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.play svg{
  width:30px;
  height:30px;
  fill:#000;
}

/* BOTTOM LABEL */
.footer{
  margin-top:auto;
  text-align:center;
  font-size:13px;
  color:#9a9a9a;
}
</style>
</head>

<body>

<div class="player">

  <!-- COVER -->
  <div class="cover">
    <img src="https://raw.githubusercontent.com/layasync/LayaSync.github.io/refs/heads/Images/images.jpeg">
  </div>

  <!-- TITLE -->
  <div class="info">
    <h1>Father Figure</h1>
    <p>George Michael</p>
  </div>

  <!-- ACTIONS -->
  <div class="actions">
    <div class="action">
      <svg viewBox="0 0 24 24"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14 1 7.59 7.41C7.22 7.78 7 8.3 7 8.83V19c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></svg>
      2.5 lakh
    </div>

    <div class="action">
      <svg viewBox="0 0 24 24"><path d="M15 3H6c-.83 0-1.54.5-1.84 1.22L1.14 11.27c-.09.23-.14.47-.14.73v2c0 1.1.9 2 2 2h6.31l-.95 4.57-.03.32c0 .41.17.79.44 1.06L10 23l6.41-6.41c.37-.37.59-.89.59-1.42V5c0-1.1-.9-2-2-2z"/></svg>
    </div>

    <div class="action">
      <svg viewBox="0 0 24 24"><path d="M21 6h-18v12h14l4 4z"/></svg>
      941
    </div>

    <div class="action">
      <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14l4-4h12c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>
      Save
    </div>
  </div>

  <!-- SEEK -->
  <div class="seek">
    <div class="time">
      <span>0:00</span>
      <span>5:36</span>
    </div>
    <div class="bar"></div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <svg viewBox="0 0 24 24"><path d="M17 3l-5 4V4h-2v6l5 4v-3l5 4V3z"/></svg>
    <svg viewBox="0 0 24 24"><path d="M6 18V6h2v12H6zm3-6l9-6v12l-9-6z"/></svg>

    <div class="play">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </div>

    <svg viewBox="0 0 24 24"><path d="M6 6l9 6-9 6V6zm10 0h2v12h-2z"/></svg>
    <svg viewBox="0 0 24 24"><path d="M7 7h10v4l5-5-5-5v4H5v6h2zm10 10H7v-4l-5 5 5 5v-4h12v-6h-2z"/></svg>
  </div>

  <div class="footer">Father Figure (Remastered mix)</div>

</div>

</body>
</html>
