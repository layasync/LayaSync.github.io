<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Father Figure – Player</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:Roboto,system-ui;
  background:linear-gradient(180deg,#17384b,#0c1b24 60%);
  color:#fff;
  height:100vh;
  overflow:hidden;
}
.app{
  max-width:420px;
  margin:auto;
  padding:16px;
}
.cover{
  width:100%;
  aspect-ratio:1/1;
  border-radius:12px;
  overflow:hidden;
  margin-top:16px;
}
.cover img{width:100%;height:100%;object-fit:cover}
.title{
  margin-top:16px;
}
.title h1{
  font-size:22px;
  font-weight:700;
}
.title p{
  opacity:.75;
  font-size:14px;
}
.lyrics-box{
  margin-top:14px;
  background:rgba(255,255,255,.12);
  border-radius:20px;
  padding:12px;
  height:64px;
  overflow:hidden;
}
.lyrics{
  font-size:14px;
  line-height:20px;
  transition:.3s;
}
.lyrics .active{
  color:#fff;
  font-weight:500;
}
.progress{
  margin-top:18px;
}
input[type=range]{
  width:100%;
}
.time{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  opacity:.7;
}
.controls{
  margin-top:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.controls button{
  background:none;
  border:none;
  color:white;
  font-size:22px;
}
.play{
  width:64px;
  height:64px;
  background:white;
  color:black;
  border-radius:50%;
  font-size:26px;
}
</style>
</head>

<body>
<div class="app">

  <div class="cover">
    <img src="https://upload.wikimedia.org/wikipedia/en/9/9a/George_Michael_-_Faith.png">
  </div>

  <div class="title">
    <h1>Father Figure</h1>
    <p>George Michael</p>
  </div>

  <div class="lyrics-box">
    <div class="lyrics" id="lyrics"></div>
  </div>

  <div class="progress">
    <input type="range" id="seek" value="0">
    <div class="time">
      <span id="current">0:00</span>
      <span id="duration">0:00</span>
    </div>
  </div>

  <div class="controls">
    <button id="shuffle">🔀</button>
    <button id="prev">⏮</button>
    <button class="play" id="play">⏸</button>
    <button id="next">⏭</button>
    <button id="repeat">🔁</button>
  </div>

</div>

<audio id="audio" src="https://github.com/layasync/LayaSync.github.io/raw/refs/heads/Music/Father%20Figure(MP3_160K).mp3"></audio>

<script>
const audio=document.getElementById("audio")
const playBtn=document.getElementById("play")
const seek=document.getElementById("seek")
const cur=document.getElementById("current")
const dur=document.getElementById("duration")
const lyricsEl=document.getElementById("lyrics")

let lyrics=[]

fetch("https://github.com/layasync/LayaSync.github.io/raw/refs/heads/lrc/George%20Michael%20-%20Father%20Figure%20(Remastered).lrc")
.then(r=>r.text())
.then(t=>{
  lyrics=t.split("\n").map(l=>{
    let m=l.match(/\[(\d+):(\d+.\d+)\](.*)/)
    if(!m)return null
    return{time:+m[1]*60+ +m[2],text:m[3]}
  }).filter(Boolean)
  lyrics.forEach(l=>{
    let d=document.createElement("div")
    d.textContent=l.text
    lyricsEl.appendChild(d)
    l.el=d
  })
})

playBtn.onclick=()=>{
  if(audio.paused){audio.play();playBtn.textContent="⏸"}
  else{audio.pause();playBtn.textContent="▶"}
}

audio.ontimeupdate=()=>{
  seek.value=audio.currentTime/audio.duration*100
  cur.textContent=format(audio.currentTime)
  lyrics.forEach(l=>{
    l.el.classList.toggle("active",audio.currentTime>=l.time)
  })
}

audio.onloadedmetadata=()=>dur.textContent=format(audio.duration)

seek.oninput=()=>audio.currentTime=seek.value/100*audio.duration

function format(t){
  let m=Math.floor(t/60)
  let s=Math.floor(t%60).toString().padStart(2,"0")
  return m+":"+s
}
</script>
</body>
</html>
