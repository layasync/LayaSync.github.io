<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=360, initial-scale=1.0" />
<title>YouTube Music – Now Playing</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:linear-gradient(180deg,#0f1e26 0%, #030607 80%);
  font-family:Roboto,system-ui;
  color:#fff;
}
.app{
  width:360px;
  margin:auto;
  padding:16px;
}

/* COVER */
.cover{
  margin-top:8px;
}
.cover img{
  width:100%;
  border-radius:12px;
  display:block;
}

/* TITLE */
.meta{
  margin-top:16px;
}
.meta h1{
  font-size:20px;
  font-weight:700;
}
.meta p{
  margin-top:4px;
  font-size:14px;
  opacity:.75;
}

/* ACTION ROW */
.actions{
  margin-top:14px;
  display:flex;
  justify-content:space-between;
}
.actions svg{
  width:22px;
  height:22px;
  fill:white;
  opacity:.85;
}

/* SEEK */
.seek{
  margin-top:18px;
}
input[type=range]{
  -webkit-appearance:none;
  width:100%;
  height:3px;
  background:#5f6d74;
  border-radius:2px;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:10px;
  height:10px;
  border-radius:50%;
  background:white;
}
.time{
  margin-top:6px;
  display:flex;
  justify-content:space-between;
  font-size:12px;
  opacity:.7;
}

/* CONTROLS */
.controls{
  margin-top:22px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.controls svg{
  width:26px;
  height:26px;
  fill:white;
}
.play{
  width:64px;
  height:64px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}
.play svg{
  width:34px;
  height:34px;
}
.footer{
  margin-top:18px;
  text-align:center;
  opacity:.6;
  font-size:13px;
}
</style>
</head>

<body>
<div class="app">

  <div class="cover">
    <img src="https://upload.wikimedia.org/wikipedia/en/9/9a/George_Michael_-_Faith.png">
  </div>

  <div class="meta">
    <h1>Father Figure</h1>
    <p>George Michael</p>
  </div>

  <div class="actions">
    <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54z"/></svg>
    <svg viewBox="0 0 24 24"><path d="M15 3H6c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h9l5-5V5c0-1.1-.9-2-2-2zm-2 9H8v-2h5v2zm3-4H8V6h8v2z"/></svg>
    <svg viewBox="0 0 24 24"><path d="M3 3h18v2H3zm0 7h18v2H3zm0 7h18v2H3z"/></svg>
    <svg viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z"/></svg>
  </div>

  <div class="seek">
    <input type="range" id="seek" value="0">
    <div class="time">
      <span id="cur">0:00</span>
      <span id="dur">0:00</span>
    </div>
  </div>

  <div class="controls">
    <svg viewBox="0 0 24 24"><path d="M16 3h5v5h-2V6.41l-4.29 4.3-1.42-1.42L17.59 5H16z"/></svg>
    <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6L18 18V6z"/></svg>

    <button class="play" id="play">
      <svg id="icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </button>

    <svg viewBox="0 0 24 24"><path d="M16 6h2v12h-2zM6 18l8.5-6L6 6z"/></svg>
    <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7z"/></svg>
  </div>

  <div class="footer">Your queue</div>

</div>

<audio id="audio" src="https://github.com/layasync/LayaSync.github.io/raw/refs/heads/Music/Father%20Figure(MP3_160K).mp3"></audio>

<script>
const audio=document.getElementById("audio");
const play=document.getElementById("play");
const icon=document.getElementById("icon");
const seek=document.getElementById("seek");
const cur=document.getElementById("cur");
const dur=document.getElementById("dur");

play.onclick=()=>{
  if(audio.paused){
    audio.play();
    icon.innerHTML='<path d="M6 19h4V5H6zm8-14v14h4V5z"/>';
  }else{
    audio.pause();
    icon.innerHTML='<path d="M8 5v14l11-7z"/>';
  }
};

audio.ontimeupdate=()=>{
  seek.value=(audio.currentTime/audio.duration)*100||0;
  cur.textContent=fmt(audio.currentTime);
};
audio.onloadedmetadata=()=>dur.textContent=fmt(audio.duration);
seek.oninput=()=>audio.currentTime=(seek.value/100)*audio.duration;

function fmt(t){
  let m=Math.floor(t/60);
  let s=Math.floor(t%60).toString().padStart(2,"0");
  return m+":"+s;
}
</script>
</body>
</html>
