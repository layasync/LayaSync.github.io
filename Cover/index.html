<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CDN Fetch Test</title>
</head>

<body style="background:#111;color:#0f0;font-family:monospace;padding:20px">

<h2>CDN Fetch Test</h2>
<button onclick="run()">Test Fetch</button>

<pre id="out">Waiting…</pre>

<script>
function toCDN(url) {
  return url
    .replace("github.com/", "cdn.jsdelivr.net/gh/")
    .replace("/raw/refs/heads/", "@main/");
}

async function run() {
  const raw =
"https://github.com/layasync/LayaSync.github.io/raw/refs/heads/Music/Genie%20In%20a%20Bottle(MP3_160K).mp3";

  const cdn = toCDN(raw);

  document.getElementById("out").textContent =
    "Converted URL:\n" + cdn + "\n\nFetching…";

  try {
    const res = await fetch(cdn);
    document.getElementById("out").textContent +=
      "\nSUCCESS ✅\nStatus: " + res.status;
  } catch (e) {
    document.getElementById("out").textContent +=
      "\nFAILED ❌\n" + e.message;
  }
}
</script>

</body>
</html>
