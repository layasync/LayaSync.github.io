<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LayaSync Hybrid Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  background:#121212;
  color:#fff;
  font-family:Roboto, system-ui, sans-serif;
  padding:20px;
}
h2 { margin-bottom:6px; }
p { opacity:.7; font-size:13px; }

input, button, select {
  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:12px;
  border:none;
  font-size:15px;
}

button {
  background:#fff;
  color:#000;
  font-weight:900;
}

pre {
  background:#1e1e1e;
  padding:14px;
  border-radius:12px;
  white-space:pre-wrap;
  overflow:auto;
}

.cover {
  width:100%;
  max-width:220px;
  margin:12px auto;
  display:none;
  border-radius:14px;
  box-shadow:0 10px 30px rgba(0,0,0,.6);
}

.small {
  font-size:12px;
  opacity:.6;
}
</style>
</head>

<body>

<h2>LayaSync Hybrid Admin</h2>
<p>Local MP3 · GitHub RAW · Wikipedia · Single / Playlist Add</p>

<select id="mode">
  <option value="single">Single Add</option>
  <option value="playlist">Playlist Add</option>
</select>

<hr class="small">

<p class="small">Local MP3</p>
<input type="file" id="file" accept=".mp3">

<p class="small">GitHub RAW MP3 URL</p>
<input id="audio" placeholder="https://github.com/...raw/...mp3">

<button onclick="process()">Process MP3</button>

<img id="coverPreview" class="cover">

<input id="title" placeholder="Song Title">
<input id="artist" placeholder="Artist">
<input id="lrc" placeholder="LRC URL">
<input id="cover" placeholder="Cover Image URL">

<button onclick="wikiCover()">Fetch Cover from Wikipedia</button>
<button onclick="addSong()">Add</button>
<button onclick="copyJSON()">Copy Output</button>

<pre id="output">Waiting…</pre>

<script src="https://cdn.jsdelivr.net/npm/jsmediatags@3.9.7/dist/jsmediatags.min.js"></script>

<script>
let playlist = [];
let singleStarted = false;

/* TIMESTAMP */
function nowStamp() {
  const d = new Date();
  const p = n => n.toString().padStart(2,"0");
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} `
       + `${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}

/* PROCESS INPUT */
function process() {
  if (file.files.length) {
    readLocal(file.files[0]);
  } else if (audio.value.trim()) {
    alert("GitHub MP3 detected.\nFill fields manually or use Wikipedia.");
  } else {
    alert("Select MP3 or paste GitHub RAW URL");
  }
}

/* LOCAL MP3 */
function readLocal(mp3) {
  jsmediatags.read(mp3, {
    onSuccess: tag => {
      title.value = tag.tags.title || "";
      artist.value = tag.tags.artist || "";

      if (tag.tags.picture) {
        const bytes = new Uint8Array(tag.tags.picture.data);
        coverPreview.src = URL.createObjectURL(new Blob([bytes]));
        coverPreview.style.display = "block";
        cover.value = "UPLOAD_IMAGE_AND_PASTE_URL";
      }
    },
    onError: () => alert("No ID3 metadata found")
  });
}

/* WIKIPEDIA COVER */
async function wikiCover() {
  if (!title.value || !artist.value) {
    alert("Title & artist required");
    return;
  }

  const q = encodeURIComponent(artist.value + " " + title.value);
  const api =
    `https://en.wikipedia.org/w/api.php?action=query&format=json&origin=*` +
    `&prop=pageimages&piprop=thumbnail&pithumbsize=500&titles=${q}`;

  try {
    const data = await fetch(api).then(r => r.json());
    const page = data.query.pages[Object.keys(data.query.pages)[0]];
    if (page.thumbnail) {
      coverPreview.src = page.thumbnail.source;
      coverPreview.style.display = "block";
      cover.value = page.thumbnail.source;
    } else {
      alert("No image found on Wikipedia");
    }
  } catch {
    alert("Wikipedia fetch failed");
  }
}

/* ADD SONG */
function addSong() {
  const song = {
    title: title.value.trim(),
    artist: artist.value.trim(),
    audio: audio.value.trim(),
    lrc: lrc.value.trim(),
    cover: cover.value.trim()
  };

  const mode = modeSelect();

  if (mode === "single") {
    if (!singleStarted) {
      output.textContent = `/ Added at ${nowStamp()} /\n\n`;
      singleStarted = true;
    }
    output.textContent += JSON.stringify(song, null, 2) + ",\n";
  }

  if (mode === "playlist") {
    playlist.push(song);
    output.textContent = JSON.stringify({
      _comment: `Added at ${nowStamp()}`,
      tracks: playlist
    }, null, 2);
  }
}

function modeSelect() {
  return document.getElementById("mode").value;
}

/* COPY */
function copyJSON() {
  navigator.clipboard.writeText(output.textContent)
    .then(() => alert("Copied"))
    .catch(() => alert("Copy failed"));
}
</script>

</body>
</html>
