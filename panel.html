<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LayaSync Hybrid Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  background:#121212;
  color:#fff;
  font-family:Roboto, system-ui, sans-serif;
  padding:20px;
}
h2 { margin-bottom:6px; }
p { opacity:.7; font-size:13px; }

input, button {
  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:12px;
  border:none;
  font-size:15px;
}

button {
  background:#fff;
  color:#000;
  font-weight:900;
}

pre {
  background:#1e1e1e;
  padding:14px;
  border-radius:12px;
  white-space:pre-wrap;
  overflow:auto;
}

.cover {
  width:100%;
  max-width:220px;
  margin:12px auto;
  display:none;
  border-radius:14px;
  box-shadow:0 10px 30px rgba(0,0,0,.6);
}

.small {
  font-size:12px;
  opacity:.6;
}
</style>
</head>

<body>

<h2>LayaSync Hybrid Admin</h2>
<p>Local MP3 → auto metadata | GitHub MP3 → JSON | Wikipedia fallback</p>

<hr class="small">

<p class="small">1️⃣ Select MP3 (recommended)</p>
<input type="file" id="file" accept=".mp3">

<p class="small">OR</p>

<p class="small">2️⃣ Paste GitHub RAW MP3 URL</p>
<input id="audio" placeholder="GitHub RAW MP3 URL">

<button onclick="process()">Process MP3</button>

<img id="coverPreview" class="cover">

<input id="title" placeholder="Song Title">
<input id="artist" placeholder="Artist">
<input id="lrc" placeholder="LRC URL">
<input id="cover" placeholder="Cover Image URL">

<button onclick="wikiCover()">Fetch Cover from Wikipedia</button>
<button onclick="addSong()">Add Song</button>
<button onclick="copyJSON()">Copy JSON</button>

<pre id="output">Waiting…</pre>

<script src="https://cdn.jsdelivr.net/npm/jsmediatags@3.9.7/dist/jsmediatags.min.js"></script>

<script>
let songs = [];

/* TIME STAMP (OUTSIDE JSON) */
function nowStamp() {
  const d = new Date();
  const pad = n => n.toString().padStart(2, "0");
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} `
       + `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

/* PROCESS */
function process() {
  if (file.files.length) {
    readLocal(file.files[0]);
  } else if (audio.value.trim()) {
    alert("GitHub MP3 detected.\nMetadata must be extracted locally.\nUse manual or Wikipedia mode.");
  } else {
    alert("Select MP3 or paste GitHub URL");
  }
}

/* LOCAL MP3 METADATA */
function readLocal(mp3) {
  jsmediatags.read(mp3, {
    onSuccess: tag => {
      title.value = tag.tags.title || "";
      artist.value = tag.tags.artist || "";

      const pic = tag.tags.picture;
      if (pic) {
        const bytes = new Uint8Array(pic.data);
        const blob = new Blob([bytes], { type: pic.format });
        const url = URL.createObjectURL(blob);

        coverPreview.src = url;
        coverPreview.style.display = "block";
        cover.value = "UPLOAD_THIS_IMAGE_AND_PASTE_URL";
      }
    },
    onError: () => {
      alert("No ID3 metadata found in MP3");
    }
  });
}

/* WIKIPEDIA COVER */
async function wikiCover() {
  if (!title.value || !artist.value) {
    alert("Title & artist required");
    return;
  }

  const query = encodeURIComponent(artist.value + " " + title.value);
  const api =
    `https://en.wikipedia.org/w/api.php?action=query&format=json&origin=*` +
    `&prop=pageimages&piprop=thumbnail&pithumbsize=500&titles=${query}`;

  try {
    const res = await fetch(api);
    const data = await res.json();
    const pages = data.query.pages;
    const page = pages[Object.keys(pages)[0]];

    if (page.thumbnail) {
      coverPreview.src = page.thumbnail.source;
      coverPreview.style.display = "block";
      cover.value = page.thumbnail.source;
    } else {
      alert("No image found on Wikipedia");
    }
  } catch {
    alert("Wikipedia fetch failed");
  }
}

/* ADD SONG (COMMENT HEADER) */
function addSong() {
  const song = {
    title: title.value.trim(),
    artist: artist.value.trim(),
    audio: audio.value.trim(),
    lrc: lrc.value.trim(),
    cover: cover.value.trim()
  };

  songs.push(song);

  const header = `/ Added at ${nowStamp()} /\n\n`;

  output.textContent =
    header +
    JSON.stringify(
      { tracks: songs },
      null,
      2
    );
}

/* COPY */
function copyJSON() {
  navigator.clipboard.writeText(output.textContent)
    .then(() => alert("Copied to clipboard"))
    .catch(() => alert("Copy failed"));
}
</script>

</body>
</html>
