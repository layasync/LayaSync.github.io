<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LayaSync</title>

<link rel="manifest" href="/manifest.json">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="theme-color" content="#121212">

<link


 href="https://fonts.googleapis.com/css2?family=Roboto:wght@500;700;900&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
  font-family: 'Roboto', sans-serif;
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  min-height: 100vh;
  background: linear-gradient(180deg, #6b2f24, #121212 60%);
  color: #fff;
  padding-bottom: 160px;
}

/* HEADER */
.header {
  text-align: center;
  padding: 14px 0;
  font-weight: 900;
  letter-spacing: 0.8px;
}

/* COVER */
.cover-wrap {
  display: flex;
  justify-content: center;
  padding: 12px;
}

.cover {
  width: 88%;
  max-width: 320px;
  aspect-ratio: 1/1;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 22px 60px rgba(0,0,0,0.75);
}

.cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* INFO */
.info {
  padding: 16px;
}

.track {
  font-size: 22px;
  font-weight: 900;
}

.artist {
  margin-top: 4px;
  font-size: 15px;
  font-weight: 700;
  opacity: 0.9;
}

/* SEEK */
.seek-wrap {
  margin-top: 18px;
}

.seek-track {
  position: relative;
  width: 100%;
  height: 4px;
  background: rgba(255,255,255,0.25);
  border-radius: 2px;
}

.seek-fill {
  position: absolute;
  height: 100%;
  width: 0%;
  background: #fff;
  border-radius: 2px;
}

#seek {
  position: absolute;
  inset: 0;
  width: 100%;
  opacity: 0;
}

.time {
  display: flex;
  justify-content: space-between;
  margin-top: 6px;
  font-size: 12px;
  font-weight: 700;
  opacity: 0.85;
}

/* CONTROLS */
.controls {
  margin-top: 36px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.icon-btn {
  width: 26px;
  height: 26px;
  opacity: 0.75;
}

.icon-btn.active {
  opacity: 1;
}

.play {
  width: 76px;
  height: 76px;
  background: #fff;
  color: #000;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  font-weight: 900;
}

/* PLAYLIST STRIP (IN BODY, NOT OVERLAY) */
.playlist-strip {
  margin-top: 24px;
  display: flex;
  flex-direction: column;          /* vertical list */
  gap: 12px;
  padding: 16px;

  height: 200px;                    /* 👈 BIGGER HEIGHT */
  overflow-y: auto;
  overflow-x: hidden;

  background: linear-gradient(
    180deg,
    rgba(120, 30, 50, 0.55),
    rgba(40, 15, 20, 0.75)
  );

  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);

  border-radius: 22px;
  box-shadow: 0 14px 40px rgba(0,0,0,.55);
}

.playlist-strip::-webkit-scrollbar {
  display: none;
}

.play-card {
  height: 64px;
  display: flex;
  align-items: center;
  gap: 14px;

  padding: 10px 14px;
  border-radius: 16px;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);

  cursor: pointer;
  transition: all .25s ease;
}

.play-card:hover {
  transform: translateX(6px);
  background: rgba(255,255,255,0.14);
}

.play-card.active {
  background: rgba(255,255,255,0.22);
}

.play-card img {
  width: 44px;
  height: 44px;
  object-fit: cover;
  border-radius: 0px;
}



.play-meta {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.play-meta .title {
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.play-meta .artist {
  font-size: 12px;
  opacity: 0.65;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
  


/* LYRICS BAR */
.lyric-bar {
  position: fixed;
  left: 16px;
  right: 16px;
  bottom: calc(16px + env(safe-area-inset-bottom, 0px));
  padding: 16px 20px;
  background: linear-gradient(
    180deg,
    rgba(58,34,28,0.98),
    rgba(36,21,18,0.98)
  );
  border-radius: 18px;
  font-size: 15px;
  font-weight: 900;
  box-shadow: 0 14px 40px rgba(0,0,0,0.7);
}
</style>
</head>

<body>

<div class="header">PLAYING FROM NFC</div>

<div class="cover-wrap">
  <div class="cover">
    <img id="coverImg">
  </div>
</div>

<div class="info">
  <div class="track" id="trackTitle"></div>
  <div class="artist" id="trackArtist"></div>

  <div class="seek-wrap">
    <div class="seek-track">
      <div class="seek-fill" id="seekFill"></div>
      <input type="range" id="seek" min="0" max="100" value="0">
    </div>
    <div class="time">
      <span id="current">0:00</span>
      <span id="duration">0:00</span>
    </div>
  </div>

  <div class="controls">
    <svg id="shuffle" class="icon-btn" viewBox="0 0 24 24" fill="white">
      <path d="M16 3h5v5h-2V6.41l-4.29 4.3-1.42-1.42 4.3-4.29H16V3zM3 6h5l3.5 3.5-1.42 1.42L7.17 8H3V6zm5 10h5v2H8v-2zm9.59-1.59L13.3 18.7l1.42 1.42 4.29-4.3V18h2v-5h-5v2h2.59z"/>
    </svg>

    <svg id="prev" class="icon-btn" viewBox="0 0 24 24" fill="white">
      <path d="M6 6h2v12H6zm3.5 6L18 6v12z"/>
    </svg>

    <div class="play" id="play">▶</div>

    <svg id="next" class="icon-btn" viewBox="0 0 24 24" fill="white">
      <path d="M16 6h2v12h-2zM6 6l8.5 6L6 18z"/>
    </svg>

    <svg id="repeat" class="icon-btn" viewBox="0 0 24 24" fill="white">
      <path d="M7 7h10v3l4-4-4-4v3H7c-2.76 0-5 2.24-5 5v2h2V10c0-1.66 1.34-3 3-3zm10 10H7v-3l-4 4 4 4v-3h10c2.76 0 5-2.24 5-5v-2h-2v2c0 1.66-1.34 3-3 3z"/>
      <text id="repeatState" x="12" y="16" text-anchor="middle"
            font-size="10" font-weight="900" fill="white"></text>
    </svg>
  </div>

  <!-- PLAYLIST STRIP -->
  <div class="playlist-strip" id="playlist"></div>
</div>

<div class="lyric-bar" id="lyrics">Loading lyrics...</div>
<audio id="audio"></audio>

<script>
/* =========================
   GLOBAL STATE
========================= */
let album = [];
let index = 0;
let lyrics = [];
let repeatMode = 0;
let shuffleOn = false;

let mediaResyncTimer = null;
let lastMediaSecond = -1;

/* =========================
   ELEMENTS
========================= */
const audio = document.getElementById("audio");
const playBtn = document.getElementById("play");
const prevBtn = document.getElementById("prev");
const nextBtn = document.getElementById("next");
const shuffleBtn = document.getElementById("shuffle");
const repeatBtn = document.getElementById("repeat");
const repeatState = document.getElementById("repeatState");
const seek = document.getElementById("seek");
const seekFill = document.getElementById("seekFill");
const lyricsBox = document.getElementById("lyrics");
const titleEl = document.getElementById("trackTitle");
const artistEl = document.getElementById("trackArtist");
const coverImg = document.getElementById("coverImg");
const current = document.getElementById("current");
const duration = document.getElementById("duration");
const playlistEl = document.getElementById("playlist");

/* =========================
   MEDIA SESSION (STABLE)
========================= */
function updateMediaSession(track) {
  if (!("mediaSession" in navigator)) return;

  navigator.mediaSession.metadata = new MediaMetadata({
    title: track.title,
    artist: track.artist,
    album: "LayaSync",
    artwork: [
      { src: track.cover, sizes: "512x512", type: "image/png" }
    ]
  });

  navigator.mediaSession.setActionHandler("play", () => audio.play());
  navigator.mediaSession.setActionHandler("pause", () => audio.pause());

  navigator.mediaSession.setActionHandler("nexttrack", () => {
    index = getNextIndex();
    loadTrack(index);
    audio.play();
  });

  navigator.mediaSession.setActionHandler("previoustrack", () => {
    index = (index - 1 + album.length) % album.length;
    loadTrack(index);
    audio.play();
  });

  navigator.mediaSession.setActionHandler("seekto", e => {
    audio.currentTime = e.seekTime;
    forceMediaPositionSync();
  });
}

function forceMediaPositionSync() {
  if (!navigator.mediaSession || !audio.duration) return;

  navigator.mediaSession.setPositionState({
    duration: audio.duration,
    playbackRate: audio.playbackRate,
    position: audio.currentTime
  });
}

/* ---- Spotify-style resync ---- */
function startMediaResync(track) {
  stopMediaResync();
  mediaResyncTimer = setInterval(() => {
    if (!audio.paused && !audio.ended) {
      updateMediaSession(track);
      forceMediaPositionSync();
    }
  }, 4000); // 4s = safe on Samsung / Chrome
}

function stopMediaResync() {
  if (mediaResyncTimer) {
    clearInterval(mediaResyncTimer);
    mediaResyncTimer = null;
  }
}

/* =========================
   LOAD SONG DATA
========================= */
fetch("https://layasync.github.io/album/playlist.json")
  .then(r => r.json())
  .then(d => {
    album = d.tracks;
    loadTrack(0);
    renderPlaylist();
  })
  .catch(() => {
    lyricsBox.textContent = "Failed to load songs";
  });

/* =========================
   PLAYER UI SYNC
========================= */
audio.onplay = () => {
  playBtn.textContent = "❚❚";
  forceMediaPositionSync();
};

audio.onpause = () => {
  playBtn.textContent = "▶";
  forceMediaPositionSync();
};

/* =========================
   LOAD TRACK
========================= */
function loadTrack(i) {
  const t = album[i];
  if (!t) return;

  audio.pause();
  audio.currentTime = 0;
  audio.src = t.audio;

  titleEl.textContent = t.title;
  artistEl.textContent = t.artist;
  coverImg.src = t.cover;

  lyrics = [];
  lyricsBox.textContent = "Loading lyrics...";

  fetch(t.lrc)
    .then(r => r.text())
    .then(text => {
      lyrics = text.split("\n").map(l => {
        const m = l.match(/\[(\d+):(\d+\.\d+)\](.*)/);
        return m ? { time:+m[1]*60 + +m[2], text:m[3].trim() } : null;
      }).filter(Boolean);
    });

  audio.onloadedmetadata = () => {
    forceMediaPositionSync();
  };

  updateMediaSession(t);
  startMediaResync(t);
  renderPlaylist();
}

/* =========================
   PLAYLIST
========================= */
function renderPlaylist() {
  playlistEl.innerHTML = "";
  album.forEach((t, i) => {
    const c = document.createElement("div");
    c.className = "play-card" + (i === index ? " active" : "");
    c.innerHTML = `
  <img src="${t.cover}">
  <div class="play-meta">
    <div class="title">${t.title}</div>
    <div class="artist">${t.artist}</div>
  </div>
`;
    c.onclick = () => {
      index = i;
      loadTrack(index);
      audio.play();
    };
    playlistEl.appendChild(c);
  });
}

/* =========================
   SHUFFLE / REPEAT
========================= */
function getNextIndex() {
  if (shuffleOn && album.length > 1) {
    let n;
    do { n = Math.floor(Math.random() * album.length); }
    while (n === index);
    return n;
  }
  return (index + 1) % album.length;
}

/* =========================
   CONTROLS
========================= */
playBtn.onclick = () => audio.paused ? audio.play() : audio.pause();

nextBtn.onclick = () => {
  index = getNextIndex();
  loadTrack(index);
  audio.play();
};

prevBtn.onclick = () => {
  index = (index - 1 + album.length) % album.length;
  loadTrack(index);
  audio.play();
};

shuffleBtn.onclick = () => {
  shuffleOn = !shuffleOn;
  shuffleBtn.classList.toggle("active", shuffleOn);
};

repeatBtn.onclick = () => {
  repeatMode = (repeatMode + 1) % 3;
  repeatState.textContent = repeatMode === 1 ? "." : repeatMode === 2 ? "1" : "";
  audio.loop = repeatMode === 2;
};

/* =========================
   END OF TRACK
========================= */
audio.onended = () => {
  stopMediaResync();

  if (repeatMode === 2) return;
  if (shuffleOn || repeatMode === 1) {
    index = getNextIndex();
    loadTrack(index);
    audio.play();
  }
};

/* =========================
   TIME UPDATE
========================= */
audio.ontimeupdate = () => {
  if (!audio.duration) return;

  const p = audio.currentTime / audio.duration * 100;
  seek.value = p;
  seekFill.style.width = p + "%";

  current.textContent = format(audio.currentTime);
  duration.textContent = format(audio.duration);

  for (let i = lyrics.length - 1; i >= 0; i--) {
    if (audio.currentTime >= lyrics[i].time) {
      lyricsBox.textContent = lyrics[i].text;
      break;
    }
  }

  const sec = Math.floor(audio.currentTime);
  if (sec !== lastMediaSecond) {
    lastMediaSecond = sec;
    forceMediaPositionSync();
  }
};

seek.oninput = () => {
  audio.currentTime = seek.value / 100 * audio.duration;
  forceMediaPositionSync();
};

function format(t) {
  return Math.floor(t / 60) + ":" +
    Math.floor(t % 60).toString().padStart(2, "0");
}

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js");
}

</script>

</body>
</html>
