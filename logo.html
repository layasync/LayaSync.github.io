<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LayaSync | Pro Digital Archive</title>
    <style>
        :root {
            --bg: #ffffff;
            --header-bg: rgba(255, 255, 255, 0.7);
            --pill: #f2f2f7;
            --accent: #007aff;
            --text: #1d1d1f;
            --radius: 14px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --header-bg: rgba(0, 0, 0, 0.7);
                --pill: #1c1c1e;
                --accent: #0a84ff;
                --text: #ffffff;
            }
        }

        * { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; transition: background 0.3s, color 0.3s; }
        body { margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; -webkit-font-smoothing: antialiased; }

        /* --- SIDEBAR --- */
        .sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: var(--header-bg); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            z-index: 3000; transition: transform 0.4s cubic-bezier(0.2, 1, 0.2, 1);
            border-right: 1px solid rgba(120,120,128,0.2); padding: 60px 20px;
        }
        .sidebar.active { transform: translateX(280px); }
        .nav-item { 
            padding: 14px; border-radius: 12px; cursor: pointer; font-weight: 600; margin-bottom: 8px;
            display: flex; align-items: center; gap: 12px; color: var(--text);
        }
        .nav-item.active { background: var(--accent); color: white; }

        /* --- HEADER --- */
        .header {
            position: sticky; top: 0; background: var(--header-bg);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            z-index: 2000; padding: 15px 20px; border-bottom: 1px solid rgba(120,120,128,0.1);
            display: flex; align-items: center; gap: 15px;
        }
        .icon-btn { 
            background: var(--pill); border: none; width: 40px; height: 40px; 
            border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: var(--text);
        }
        .search-input {
            flex: 1; background: var(--pill); border: none; padding: 12px 18px;
            border-radius: 12px; font-size: 16px; outline: none; color: var(--text);
        }

        /* --- GRID: 3 PER ROW MOBILE --- */
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 30px 20px; padding: 25px; max-width: 1400px; margin: 0 auto;
        }

        .asset-card {
            display: flex; flex-direction: column; align-items: center; 
            animation: slideUp 0.4s ease-out;
        }

        .img-box {
            width: 100%; aspect-ratio: 1/1; display: flex; align-items: center;
            justify-content: center; cursor: zoom-in; margin-bottom: 12px;
        }
        .img-box img { max-width: 90%; max-height: 90%; object-fit: contain; }

        /* --- EDITABLE PILL --- */
        .pill-wrap {
            width: 100%; background: var(--pill); border-radius: 18px;
            padding: 10px; display: flex; flex-direction: column; gap: 8px;
            border: 1px solid rgba(120,120,128,0.1);
        }
        .editable-title {
            font-size: 12px; font-weight: 700; text-align: center; width: 100%;
            border: none; background: transparent; color: var(--text);
            outline: none; cursor: text; padding: 2px; border-radius: 4px;
        }
        .editable-title:focus { background: rgba(0,122,255,0.15); }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; width: 100%; }
        .btn {
            background: var(--accent); color: white; border: none; padding: 8px 0;
            border-radius: 8px; font-size: 9px; font-weight: 800; text-transform: uppercase;
            cursor: pointer; transition: 0.1s;
        }
        .btn.secondary { background: rgba(120,120,128,0.2); color: var(--text); }
        .btn:active { transform: scale(0.95); }

        /* --- OVERLAY --- */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 2500; display: none; }
        .overlay.active { display: block; }

        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(3, 1fr); gap: 15px 10px; padding: 10px; }
            .pill-wrap { padding: 6px; border-radius: 12px; }
            .editable-title { font-size: 9px; }
            .btn { font-size: 7px; padding: 6px 0; border-radius: 5px; }
            .img-box { margin-bottom: 5px; }
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        #toast {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: var(--text); color: var(--bg); padding: 12px 25px; border-radius: 50px;
            font-size: 13px; font-weight: 600; z-index: 5000; transition: transform 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        #toast.active { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<nav class="sidebar" id="sidebar">
    <div style="font-size: 24px; font-weight: 800; margin-bottom: 30px;">Archive</div>
    <div class="nav-item active" id="tab-logos" onclick="setTab('logos')">🖼️ Logos</div>
    <div class="nav-item" id="tab-setups" onclick="setTab('setups')">📱 Nuvio Setups</div>
</nav>

<header class="header">
    <button class="icon-btn" onclick="toggleSidebar()">☰</button>
    <input type="text" id="search" class="search-input" placeholder="Search assets..." onkeyup="doSearch()">
    <button class="icon-btn" onclick="location.reload()">🔄</button>
</header>

<div id="mainGrid" class="grid"></div>

<div id="toast">Copied to Clipboard</div>

<script>
    let rawData = { logos: [], setups: [] };
    let activeTab = 'logos';

    const API = {
        logos: 'https://raw.githubusercontent.com/layasync/LayaSync.github.io/main/logo.json',
        setups: 'https://raw.githubusercontent.com/layasync/LayaSync.github.io/main/setups.json'
    };

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    async function init() {
        const cacheBuster = `?v=${Date.now()}`;
        try {
            const [l, s] = await Promise.all([
                fetch(API.logos + cacheBuster).then(r => r.json()),
                fetch(API.setups + cacheBuster).then(r => r.json())
            ]);
            rawData.logos = l;
            rawData.setups = s;
            render();
        } catch (e) { console.error("Sync Error", e); }
    }

    function render(filter = null) {
        const grid = document.getElementById('mainGrid');
        const items = filter || rawData[activeTab];
        
        grid.innerHTML = items.map((item, idx) => {
            const id = `${activeTab}-${item.url || item.image}`;
            // Load renamed title from local storage if exists
            const savedName = localStorage.getItem(id) || item.name;
            const imgUrl = activeTab === 'logos' ? item.url : item.image;
            const targetUrl = activeTab === 'logos' ? item.url : item.fileUrl;

            return `
                <div class="asset-card">
                    <div class="img-box" onclick="window.open('${imgUrl}', '_blank')">
                        <img src="${imgUrl}" loading="eager" alt="asset">
                    </div>
                    <div class="pill-wrap">
                        <input class="editable-title" 
                               value="${savedName}" 
                               onchange="renameAsset('${id}', this.value)"
                               title="Click to rename locally">
                        <div class="btn-row">
                            <button class="btn" onclick="copy('${targetUrl}')">Link</button>
                            <button class="btn secondary" onclick="downloadImg('${imgUrl}', '${savedName}')">Save</button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function setTab(t) {
        activeTab = t;
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('tab-'+t).classList.add('active');
        toggleSidebar();
        render();
    }

    function renameAsset(id, newName) {
        localStorage.setItem(id, newName);
        showToast("Renamed Locally");
    }

    function doSearch() {
        const q = document.getElementById('search').value.toLowerCase();
        const f = rawData[activeTab].filter(i => {
            const id = `${activeTab}-${i.url || i.image}`;
            const name = localStorage.getItem(id) || i.name;
            return name.toLowerCase().includes(q);
        });
        render(f);
    }

    function copy(val) {
        navigator.clipboard.writeText(val);
        showToast("Link Copied");
    }

    async function downloadImg(url, name) {
        const image = await fetch(url);
        const imageBlog = await image.blob();
        const imageURL = URL.createObjectURL(imageBlog);
        const link = document.createElement('a');
        link.href = imageURL;
        link.download = name;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        showToast("Downloading...");
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.classList.add('active');
        setTimeout(() => t.classList.remove('active'), 2000);
    }

    init();
</script>

</body>
</html>
