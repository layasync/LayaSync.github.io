<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LayaSync | Digital Assets</title>
    <style>
        :root {
            --bg: #ffffff;
            --accent: #007aff;
            --pill-bg: #f2f2f7;
            --text: #1d1d1f;
            --sidebar-bg: rgba(255, 255, 255, 0.9);
        }

        * { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* --- SIDEBAR --- */
        .sidebar {
            position: fixed;
            left: -280px; /* Hidden by default */
            top: 0;
            width: 280px;
            height: 100%;
            background: var(--sidebar-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            z-index: 2000;
            transition: transform 0.4s cubic-bezier(0.2, 1, 0.2, 1);
            border-right: 1px solid #f2f2f7;
            padding: 60px 20px;
        }
        .sidebar.open { transform: translateX(280px); }

        .sidebar-header { font-size: 22px; font-weight: 800; margin-bottom: 30px; letter-spacing: -0.5px; }
        .nav-item { 
            padding: 12px 15px; border-radius: 12px; cursor: pointer; 
            font-weight: 600; margin-bottom: 5px; transition: 0.2s;
            display: flex; align-items: center; gap: 10px;
        }
        .nav-item:hover { background: rgba(0,0,0,0.05); }
        .nav-item.active { background: var(--accent); color: white; }

        /* --- HEADER & SEARCH --- */
        .header {
            position: sticky; top: 0; background: rgba(255,255,255,0.8);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            z-index: 1000; padding: 15px 20px; border-bottom: 1px solid #f2f2f7;
            display: flex; align-items: center; gap: 15px;
        }
        .menu-btn { 
            background: #f2f2f7; border: none; padding: 10px; 
            border-radius: 10px; cursor: pointer; font-size: 20px;
        }
        .search-box {
            flex: 1; background: #f2f2f7; border: none;
            padding: 12px 15px; border-radius: 12px; font-size: 16px; outline: none;
        }

        /* --- GRID SYSTEM --- */
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 40px 20px; padding: 25px; max-width: 1200px; margin: 0 auto;
        }

        .logo-item { display: flex; flex-direction: column; align-items: center; animation: fadeIn 0.5s ease forwards; }

        .img-container {
            width: 100%; height: 160px; display: flex; align-items: center;
            justify-content: center; margin-bottom: 15px;
        }
        .img-container img { max-width: 100%; max-height: 100%; object-fit: contain; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.08)); }

        .pill-casing {
            background: var(--pill-bg); width: 100%; padding: 12px;
            border-radius: 18px; display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .title { font-size: 14px; font-weight: 700; text-align: center; width: 90%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .hard-copy-btn {
            background: var(--accent); color: white; border: none; width: 100%;
            padding: 10px; border-radius: 12px; font-size: 11px; font-weight: 800;
            text-transform: uppercase; cursor: pointer;
        }

        /* Overlay when sidebar open */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.2); z-index: 1500; display: none;
        }
        .overlay.active { display: block; }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(2, 1fr); gap: 30px 15px; padding: 15px; }
            .img-container { height: 120px; }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: #1d1d1f; color: white; padding: 12px 25px; border-radius: 50px;
            font-size: 13px; z-index: 3000; transition: transform 0.4s cubic-bezier(0.2, 1, 0.2, 1);
        }
        #toast.active { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">Collections</div>
    <div class="nav-item active" id="btn-logos" onclick="switchTab('logos')">🖼️ Logo Archive</div>
    <div class="nav-item" id="btn-setups" onclick="switchTab('setups')">📱 Nuvio Setups</div>
</div>

<header class="header">
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <input type="text" id="search" class="search-box" placeholder="Search..." onkeyup="filter()">
</header>

<div id="logoGrid" class="grid"></div>

<div id="toast">Link Copied!</div>

<script>
    let currentTab = 'logos';
    let dataStore = { logos: [], setups: [] };

    const urls = {
        logos: 'https://raw.githubusercontent.com/layasync/LayaSync.github.io/main/logo.json',
        setups: 'https://raw.githubusercontent.com/layasync/LayaSync.github.io/main/setups.json'
    };

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('active');
    }

    async function loadAllData() {
        const t = new Date().getTime();
        try {
            const [resLogos, resSetups] = await Promise.all([
                fetch(`${urls.logos}?t=${t}`).then(r => r.json()),
                fetch(`${urls.setups}?t=${t}`).then(r => r.json())
            ]);
            dataStore.logos = resLogos;
            dataStore.setups = resSetups;
            render();
        } catch (e) { console.error("Load failed", e); }
    }

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`btn-${tab}`).classList.add('active');
        toggleSidebar();
        document.getElementById('search').value = "";
        render();
    }

    function render(filteredData = null) {
        const container = document.getElementById('logoGrid');
        const items = filteredData || dataStore[currentTab];
        
        container.innerHTML = items.map(item => `
            <div class="logo-item">
                <div class="img-container">
                    <img src="${currentTab === 'logos' ? item.url : item.image}" loading="lazy">
                </div>
                <div class="pill-casing">
                    <div class="title">${item.name}</div>
                    <button class="hard-copy-btn" onclick="copyLink('${currentTab === 'logos' ? item.url : item.fileUrl}')">
                        ${currentTab === 'logos' ? 'Copy Logo Link' : 'Copy Setup JSON'}
                    </button>
                </div>
            </div>
        `).join('');
    }

    function filter() {
        const q = document.getElementById('search').value.toLowerCase();
        const filtered = dataStore[currentTab].filter(i => i.name.toLowerCase().includes(q));
        render(filtered);
    }

    function copyLink(url) {
        navigator.clipboard.writeText(url);
        const toast = document.getElementById('toast');
        toast.classList.add('active');
        setTimeout(() => toast.classList.remove('active'), 2000);
    }

    loadAllData();
</script>

</body>
</html>
