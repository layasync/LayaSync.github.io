<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LayaSync | Logo Archive</title>
    <style>
        :root {
            --bg: #ffffff;
            --accent: #007aff;
            --pill-bg: #f2f2f7;
            --text: #1d1d1f;
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        /* Search Bar Area */
        .header {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: saturate(180%) blur(20px);
            z-index: 1000;
            padding: 20px;
            display: flex;
            justify-content: center;
            border-bottom: 1px solid #f2f2f7;
        }

        .search-box {
            width: 100%;
            max-width: 500px;
            background: #f2f2f7;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
        }

        .search-box:focus { background: #e5e5ea; box-shadow: 0 0 0 4px rgba(0,122,255,0.1); }

        /* Grid System */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 30px;
            padding: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Logo Item - No Card Background */
        .logo-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            transition: transform 0.2s ease;
        }

        .logo-item:hover { transform: translateY(-5px); }

        /* Image Handling - Full view, no compromise */
        .img-container {
            width: 100%;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            cursor: pointer;
        }

        .img-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* Shows full image without cropping */
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.05));
        }

        /* Title Pill */
        .title-pill {
            background: var(--pill-bg);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            color: #555;
            max-width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Copy Button */
        .copy-btn {
            margin-top: 8px;
            font-size: 10px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            font-weight: 700;
            opacity: 0.6;
            transition: opacity 0.2s;
            border: 1px solid rgba(0,122,255,0.2);
            padding: 3px 8px;
            border-radius: 5px;
        }

        .copy-btn:hover { opacity: 1; background: rgba(0,122,255,0.05); }

        /* Smooth Loading Animation */
        .logo-item {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* MOBILE ADJUSTMENTS: 3 PER ROW */
        @media (max-width: 600px) {
            .grid {
                grid-template-columns: repeat(3, 1fr); /* Force 3 per row */
                gap: 15px;
                padding: 15px;
            }
            .img-container { height: 80px; }
            .title-pill { font-size: 11px; padding: 4px 10px; }
            .copy-btn { font-size: 8px; padding: 2px 5px; }
        }

        #loader { text-align: center; margin-top: 100px; color: #888; }
    </style>
</head>
<body>

<header class="header">
    <input type="text" id="search" class="search-box" placeholder="Search logos..." onkeyup="filter()">
</header>

<div id="loader">Fetching Assets...</div>
<div class="grid" id="logoGrid"></div>

<script>
    let logos = [];
    // Using your actual Raw GitHub Link
    const source = 'https://raw.githubusercontent.com/layasync/LayaSync.github.io/main/logo.json';

    async function load() {
        try {
            const resp = await fetch(source);
            logos = await resp.json();
            document.getElementById('loader').style.display = 'none';
            render(logos);
        } catch (err) {
            document.getElementById('loader').innerText = "Failed to load library.";
        }
    }

    function render(data) {
        const grid = document.getElementById('logoGrid');
        grid.innerHTML = data.map(item => `
            <div class="logo-item">
                <div class="img-container" onclick="copyLink('${item.url}')">
                    <img src="${item.url}" alt="${item.name}" loading="lazy">
                </div>
                <div class="title-pill">${item.name}</div>
                <div class="copy-btn" onclick="copyLink('${item.url}')">Copy Link</div>
            </div>
        `).join('');
    }

    function filter() {
        const q = document.getElementById('search').value.toLowerCase();
        const filtered = logos.filter(l => l.name.toLowerCase().includes(q));
        render(filtered);
    }

    function copyLink(url) {
        navigator.clipboard.writeText(url).then(() => {
            // Simple visual feedback
            const toast = document.createElement('div');
            toast.style.cssText = "position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#333; color:white; padding:10px 20px; border-radius:50px; font-size:12px; z-index:10000;";
            toast.innerText = "Direct Link Copied!";
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        });
    }

    load();
</script>

</body>
</html>
