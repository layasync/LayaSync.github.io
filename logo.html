<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LayaSync | Asset Store</title>
    <style>
        :root {
            --bg: #ffffff;
            --accent: #007aff;
            --pill-bg: #f2f2f7;
            --text: #1d1d1f;
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        /* macOS Search Header */
        .header {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: saturate(180%) blur(20px);
            z-index: 1000;
            padding: 20px;
            border-bottom: 1px solid #f2f2f7;
        }

        .search-box {
            width: 100%;
            max-width: 600px;
            display: block;
            margin: 0 auto;
            background: #f2f2f7;
            border: none;
            padding: 14px 20px;
            border-radius: 14px;
            font-size: 16px;
            outline: none;
        }

        /* Grid - 2 Per Row on Mobile */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 40px 20px;
            padding: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Individual Asset Layout */
        .logo-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Image Display - No Card/Casing here */
        .img-container {
            width: 100%;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        .img-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* Full logo, no compromise */
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.08));
            transition: transform 0.3s ease;
        }

        /* Wide Pill Cut Casing */
        .pill-casing {
            background: var(--pill-bg);
            width: 100%; /* Large width */
            padding: 12px;
            border-radius: 18px; /* Cut casing look */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 90%;
            text-align: center;
        }

        /* Hard Copy Button */
        .hard-copy-btn {
            background: var(--accent);
            color: white;
            border: none;
            width: 100%;
            padding: 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .hard-copy-btn:active { transform: scale(0.96); opacity: 0.9; }

        /* Mobile Adaptation: 2 PER ROW */
        @media (max-width: 600px) {
            .grid {
                grid-template-columns: repeat(2, 1fr); /* 2 Per Row */
                gap: 30px 15px;
                padding: 15px;
            }
            .img-container { height: 110px; }
            .pill-casing { padding: 10px; border-radius: 15px; }
            .title { font-size: 12px; }
            .hard-copy-btn { padding: 8px; font-size: 10px; }
        }

        #loader { text-align: center; padding: 50px; color: #ccc; font-weight: 600; }
        
        /* Toast Alert */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 500;
            transition: transform 0.4s cubic-bezier(0.2, 1, 0.2, 1);
            z-index: 2000;
        }
        #toast.active { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<header class="header">
    <input type="text" id="search" class="search-box" placeholder="Search logos..." onkeyup="filterLogos()">
</header>

<div id="loader">Syncing Library...</div>
<div class="grid" id="logoGrid"></div>

<div id="toast">Direct Link Copied!</div>

<script>
    let logos = [];
    // Link to your logo.json
    const jsonUrl = 'https://raw.githubusercontent.com/layasync/LayaSync.github.io/main/logo.json';

    async function loadData() {
        try {
            const response = await fetch(jsonUrl);
            logos = await response.json();
            document.getElementById('loader').style.display = 'none';
            render(logos);
        } catch (e) {
            document.getElementById('loader').innerText = "Failed to fetch library.";
        }
    }

    function render(items) {
        const grid = document.getElementById('logoGrid');
        grid.innerHTML = items.map(logo => `
            <div class="logo-item">
                <div class="img-container">
                    <img src="${logo.url}" alt="${logo.name}" loading="lazy">
                </div>
                <div class="pill-casing">
                    <div class="title">${logo.name}</div>
                    <button class="hard-copy-btn" onclick="copyLink('${logo.url}')">Copy Link</button>
                </div>
            </div>
        `).join('');
    }

    function filterLogos() {
        const query = document.getElementById('search').value.toLowerCase();
        const filtered = logos.filter(l => l.name.toLowerCase().includes(query));
        render(filtered);
    }

    function copyLink(url) {
        navigator.clipboard.writeText(url);
        const toast = document.getElementById('toast');
        toast.classList.add('active');
        setTimeout(() => toast.classList.remove('active'), 2000);
    }

    loadData();
</script>

</body>
</html>
