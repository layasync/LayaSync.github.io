<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LayaSync Asset Store</title>
    <style>
        :root {
            --bg: #ffffff;
            --accent: #007aff;
            --pill-bg: #f2f2f7;
            --btn-bg: #007aff;
            --text: #1d1d1f;
        }

        * { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        /* Fixed Header */
        .header {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 1000;
            padding: 15px 20px;
            border-bottom: 1px solid #efeff4;
        }

        .search-box {
            width: 100%;
            max-width: 600px;
            display: block;
            margin: 0 auto;
            background: #f2f2f7;
            border: none;
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 16px;
            outline: none;
        }

        /* The Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 40px 20px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Logo Item Container */
        .logo-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* Image Box - No Background */
        .img-container {
            width: 100%;
            aspect-ratio: 1 / 1; /* Square box to keep grid even */
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }

        .img-container img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            transition: transform 0.3s cubic-bezier(0.2, 1, 0.2, 1);
        }

        .logo-item:hover img { transform: scale(1.1); }

        /* Title Pill - Large width handling */
        .title-pill {
            background: var(--pill-bg);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: #3a3a3c;
            width: 95%;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* "Cuts" long text with ... */
            margin-bottom: 10px;
        }

        /* Hard Copy Button - Apple Style */
        .copy-btn {
            width: 90%;
            background: var(--btn-bg);
            color: white;
            border: none;
            padding: 8px 0;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .copy-btn:active { transform: scale(0.95); opacity: 0.8; }

        /* MOBILE ADJUSTMENTS: Proper 3-per-row UI */
        @media (max-width: 600px) {
            .grid {
                grid-template-columns: repeat(3, 1fr); /* 3 Per Row */
                gap: 20px 10px; /* Tighter horizontal gap for more space */
                padding: 10px;
            }

            .img-container { height: 90px; } /* Fixed height to prevent smallness */
            
            .title-pill {
                font-size: 10px;
                padding: 4px 6px;
                width: 100%;
            }

            .copy-btn {
                font-size: 9px;
                padding: 6px 0;
                border-radius: 6px;
                width: 100%;
            }
        }

        #loader { text-align: center; margin-top: 50px; font-weight: 600; color: #ccc; }
        
        /* Copy Toast Notification */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1d1d1f;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            transition: transform 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            z-index: 9999;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<header class="header">
    <input type="text" id="search" class="search-box" placeholder="Search Assets..." onkeyup="filter()">
</header>

<div id="loader">Loading Library...</div>
<div class="grid" id="logoGrid"></div>

<div id="toast">Link Copied to Clipboard</div>

<script>
    let logos = [];
    const source = 'https://raw.githubusercontent.com/layasync/LayaSync.github.io/main/logo.json';

    async function load() {
        try {
            const resp = await fetch(source);
            logos = await resp.json();
            document.getElementById('loader').style.display = 'none';
            render(logos);
        } catch (err) {
            document.getElementById('loader').innerText = "Network Error.";
        }
    }

    function render(data) {
        const grid = document.getElementById('logoGrid');
        grid.innerHTML = data.map(item => `
            <div class="logo-item">
                <div class="img-container">
                    <img src="${item.url}" alt="${item.name}" loading="lazy">
                </div>
                <div class="title-pill">${item.name}</div>
                <button class="copy-btn" onclick="copyLink('${item.url}')">Copy Link</button>
            </div>
        `).join('');
    }

    function filter() {
        const q = document.getElementById('search').value.toLowerCase();
        const filtered = logos.filter(l => l.name.toLowerCase().includes(q));
        render(filtered);
    }

    function copyLink(url) {
        navigator.clipboard.writeText(url);
        const toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }

    load();
</script>

</body>
</html>
