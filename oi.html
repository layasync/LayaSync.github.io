<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LayaSync | Digital Archive</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1c1c1e;
            --accent: #007aff;
            --pill: #f2f2f7;
            --sidebar-silver: linear-gradient(180deg, #e5e5ea 0%, #d1d1d6 100%);
            --glass: rgba(255, 255, 255, 0.85);
        }
        @media (prefers-color-scheme: dark) {
            :root { --bg: #000000; --text: #ffffff; --pill: #1c1c1e; --sidebar-silver: linear-gradient(180deg, #2c2c2e 0%, #1c1c1e 100%); --glass: rgba(0, 0, 0, 0.85); }
        }

        /* HARDWARE ACCELERATED SCROLLING */
        * { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
        html, body { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background: var(--bg); color: var(--text); 
        }

        /* SILVER SIDEBAR - MANUAL ONLY */
        .sidebar {
            width: 280px; height: 100%; background: var(--sidebar-silver);
            position: fixed; left: -280px; top: 0; z-index: 3000;
            transition: transform 0.4s cubic-bezier(0.2, 1, 0.2, 1);
            padding: 50px 15px; border-right: 1px solid rgba(0,0,0,0.1); 
            overflow-y: auto; will-change: transform;
        }
        .sidebar.active { transform: translateX(280px); }
        .sidebar-header { font-size: 24px; font-weight: 800; margin-bottom: 25px; letter-spacing: -1px; }
        
        .nav-label { font-size: 10px; font-weight: 800; color: #888; margin: 20px 0 10px 5px; text-transform: uppercase; }
        .group-item {
            padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600;
            margin-bottom: 5px; background: rgba(255,255,255,0.4); display: flex; align-items: center; font-size: 13px;
        }
        .group-item.active { background: var(--accent); color: white; }

        /* ADD GROUP UI */
        .add-group-box { display: flex; gap: 5px; margin-top: 10px; }
        .add-group-box input { flex: 1; padding: 8px; border-radius: 8px; border: none; font-size: 12px; outline: none; }
        .add-group-box button { background: var(--accent); color: white; border: none; padding: 8px 12px; border-radius: 8px; font-weight: 800; cursor: pointer; }

        /* MAIN CONTENT AREA */
        main { 
            height: 100%; overflow-y: auto; overflow-x: hidden;
            -webkit-overflow-scrolling: touch; scroll-behavior: smooth;
            padding-bottom: 80px;
        }

        /* STICKY HEADER */
        header {
            position: sticky; top: 0; z-index: 2000;
            background: var(--glass); backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid rgba(120,120,128,0.2); 
            padding: 12px 15px; display: flex; align-items: center; gap: 10px;
        }
        .search-box { flex: 1; background: var(--pill); border: none; padding: 12px 15px; border-radius: 12px; font-size: 15px; color: var(--text); outline: none; }
        .btn-icon { background: var(--pill); border: none; width: 45px; height: 45px; border-radius: 12px; cursor: pointer; font-size: 20px; color: var(--text); display: flex; align-items: center; justify-content: center; }

        /* GRID - LOGOS 3 PER ROW / SETUPS 1 PER ROW */
        .grid { 
            display: grid; width: 100%; max-width: 100%; 
            padding: 12px; gap: 15px; margin: 0 auto;
        }
        .grid.logos { grid-template-columns: repeat(3, 1fr) !important; }
        .grid.setups { grid-template-columns: 1fr !important; }

        /* ASSET CARDS (LOGOS) */
        .card { display: flex; flex-direction: column; width: 100%; }
        .img-container {
            width: 100%; aspect-ratio: 1/1; background: rgba(128,128,128,0.05); 
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            overflow: hidden; border: 3px solid transparent; cursor: pointer;
        }
        .img-container img { max-width: 85%; max-height: 85%; object-fit: contain; }
        .card.selected .img-container { border-color: var(--accent); background: rgba(0, 122, 255, 0.1); }

        /* SETUP CARDS (1 PER ROW LANDSCAPE) */
        .setup-card { width: 100%; display: flex; flex-direction: column; margin-bottom: 30px; }
        .landscape-box { width: 100%; height: 240px; border-radius: 20px; overflow: hidden; background: #111; }
        .landscape-box img { width: 100%; height: 100%; object-fit: cover; }

        /* UI CASING */
        .casing { width: 100%; background: var(--pill); padding: 14px; border-radius: 22px; margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
        .name-label { text-align: center; font-size: 12px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .action-btn { 
            background: var(--accent); color: white; border: none; padding: 12px; 
            border-radius: 12px; font-size: 10px; font-weight: 800; cursor: pointer; 
            text-align: center; text-decoration: none; text-transform: uppercase;
        }

        /* OVERLAY */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 2500; display: none; }
        .overlay.active { display: block; }
        
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1d1d1f; color: #fff; padding: 12px 25px; border-radius: 50px; font-size: 12px; font-weight: 700; transition: 0.4s cubic-bezier(0.17, 0.89, 0.32, 1.28); z-index: 9999; }
        #toast.active { transform: translateX(-50%) translateY(0); }

        @media (max-width: 600px) {
            .grid.logos { gap: 8px; padding: 8px; }
            .img-container { border-radius: 10px; }
            .landscape-box { height: 180px; }
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<nav class="sidebar" id="sidebar">
    <div class="sidebar-header">LayaSync Pro</div>
    
    <div class="nav-label">Navigation</div>
    <div class="group-item" id="nav-logos" onclick="setTab('logos')">🖼️ Logo Archive</div>
    <div class="group-item" id="nav-setups" onclick="setTab('setups')">📱 Nuvio Setups</div>

    <div id="catBox">
        <div class="nav-label">Groups</div>
        <div id="catList"></div>
        <div class="add-group-box">
            <input type="text" id="newGrpName" placeholder="Group name...">
            <button onclick="addNewGroup()">+</button>
        </div>
    </div>

    <div class="nav-label">Cloud Sync</div>
    <input type="password" id="ghToken" placeholder="GitHub Token (ghp_...)" style="width: 100%; padding: 12px; border-radius: 10px; border: none; margin-bottom: 10px; font-size: 12px; outline: none;">
    <button onclick="cloudSync()" id="syncBtn" style="width: 100%; background: var(--accent); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 800; cursor: pointer;">☁️ SYNC TO GITHUB</button>
</nav>

<main>
    <header>
        <button class="btn-icon" onclick="toggleSidebar()">☰</button>
        <input type="text" id="search" class="search-box" placeholder="Search archive..." onkeyup="renderUI()">
        <button id="multiBtn" class="btn-icon" onclick="toggleMulti()">🔘</button>
    </header>
    <div id="mainGrid" class="grid logos"></div>
</main>

<div id="toast">Copied</div>

<script>
    let logos = []; let setups = [];
    let currentTab = 'logos'; let activeCat = 'All';
    let selectedSet = new Set(); let isMulti = false;
    let customGroups = JSON.parse(localStorage.getItem('ls_custom_groups')) || [];
    const GITHUB = { user: 'layasync', repo: 'LayaSync.github.io' };

    async function init() {
        const v = Date.now();
        try {
            const [l, s] = await Promise.all([
                fetch(`https://raw.githubusercontent.com/${GITHUB.user}/${GITHUB.repo}/main/logo.json?v=${v}`).then(r => r.json()),
                fetch(`https://raw.githubusercontent.com/${GITHUB.user}/${GITHUB.repo}/main/setups.json?v=${v}`).then(r => r.json())
            ]);
            logos = l; setups = s;
            document.getElementById('ghToken').value = localStorage.getItem('ls_token') || '';
            setTab('logos');
        } catch(e) { console.error("Database initialization failed."); }
    }

    function toggleSidebar() { 
        document.getElementById('sidebar').classList.toggle('active'); 
        document.getElementById('overlay').classList.toggle('active'); 
    }

    function setTab(tab) {
        currentTab = tab; activeCat = 'All';
        document.getElementById('nav-logos').classList.toggle('active', tab === 'logos');
        document.getElementById('nav-setups').classList.toggle('active', tab === 'setups');
        document.getElementById('catBox').style.display = tab === 'logos' ? 'block' : 'none';
        document.getElementById('mainGrid').className = `grid ${tab}`;
        if(tab === 'logos') buildCats();
        renderUI();
        if(window.innerWidth < 600) toggleSidebar();
    }

    function addNewGroup() {
        const val = document.getElementById('newGrpName').value.trim();
        if(val && !customGroups.includes(val)) {
            customGroups.push(val);
            localStorage.setItem('ls_custom_groups', JSON.stringify(customGroups));
            document.getElementById('newGrpName').value = '';
            buildCats();
        }
    }

    function buildCats() {
        const list = document.getElementById('catList');
        const jsonCats = [...new Set(logos.map(i => i.group || 'Uncategorized'))];
        const allCats = [...new Set([...jsonCats, ...customGroups])];
        
        list.innerHTML = `<div class="group-item ${activeCat==='All'?'active':''}" onclick="setCat('All')">📂 All Logos</div>`;
        allCats.forEach(c => {
            if(c !== 'Uncategorized')
                list.innerHTML += `<div class="group-item ${activeCat===c?'active':''}" onclick="setCat('${c}')">🏷️ ${c}</div>`;
        });
    }

    function setCat(c) {
        if (isMulti && c !== 'All') {
            selectedSet.forEach(url => { const item = logos.find(i => i.url === url); if(item) item.group = c; });
            showToast(`Moved ${selectedSet.size} to ${c}`); toggleMulti();
        }
        activeCat = c; buildCats(); renderUI();
    }

    function toggleMulti() {
        if(currentTab !== 'logos') return;
        isMulti = !isMulti; selectedSet.clear();
        document.getElementById('multiBtn').style.background = isMulti ? 'var(--accent)' : 'var(--pill)';
        renderUI();
    }

    function renderUI() {
        const grid = document.getElementById('mainGrid');
        const query = document.getElementById('search').value.toLowerCase();
        
        if (currentTab === 'logos') {
            const filtered = logos.filter(i => (i.name.toLowerCase().includes(query) || (i.group || '').toLowerCase().includes(query)) && (activeCat === 'All' || i.group === activeCat));
            grid.innerHTML = filtered.map(i => `
                <div class="card ${selectedSet.has(i.url)?'selected':''}" onclick="handleCardClick('${i.url}')">
                    <div class="img-container"><img src="${i.url}" loading="eager"></div>
                    <div class="casing">
                        <div class="name-label">${i.name}</div>
                        <button class="action-btn" onclick="event.stopPropagation(); copyLink('${i.url}')">Copy Link</button>
                    </div>
                </div>
            `).join('');
        } else {
            const filtered = setups.filter(i => i.name.toLowerCase().includes(query));
            grid.innerHTML = filtered.map(i => `
                <div class="setup-card">
                    <div class="landscape-box"><img src="${i.screenshot}" loading="eager"></div>
                    <div class="casing">
                        <div class="name-label">${i.name}</div>
                        ${i.files ? i.files.map(f => `<a href="${f.url}" download class="action-btn" style="margin-top:5px;">⬇️ DOWNLOAD COLLECTION JSON</a>`).join('') : ''}
                    </div>
                </div>
            `).join('');
        }
    }

    function handleCardClick(url) { if(isMulti) { if(selectedSet.has(url)) selectedSet.delete(url); else selectedSet.add(url); renderUI(); } }

    async function cloudSync() {
        const token = document.getElementById('ghToken').value;
        if(!token) return alert("Enter Token");
        localStorage.setItem('ls_token', token);
        const file = currentTab === 'logos' ? 'logo.json' : 'setups.json';
        const data = currentTab === 'logos' ? logos : setups;
        const btn = document.getElementById('syncBtn');
        btn.innerText = "Syncing...";
        try {
            const url = `https://api.github.com/repos/${GITHUB.user}/${GITHUB.repo}/contents/${file}`;
            const res = await fetch(url, { headers: { Authorization: `token ${token}` } });
            const fileData = await res.json();
            const pushRes = await fetch(url, {
                method: 'PUT', headers: { Authorization: `token ${token}` },
                body: JSON.stringify({ message: `LayaSync Cloud Update: ${file}`, content: btoa(JSON.stringify(data, null, 2)), sha: fileData.sha })
            });
            if(pushRes.ok) showToast("Cloud Sync Successful!");
            else throw new Error();
        } catch (e) { alert("Cloud Sync Failed. Check token permissions."); }
        finally { btn.innerText = "☁️ SYNC TO GITHUB"; }
    }

    function copyLink(url) { navigator.clipboard.writeText(url); showToast("Direct Link Copied!"); }
    function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.classList.add('active'); setTimeout(() => t.classList.remove('active'), 2000); }

    init();
</script>
</body>
</html>
