<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LayaSync | Cloud Asset Manager</title>
    <style>
        :root {
            --bg: #ffffff; --text: #1c1c1e; --accent: #007aff; --pill: #f2f2f7;
            --sidebar-silver: linear-gradient(180deg, #e5e5ea 0%, #d1d1d6 100%);
            --glass: rgba(255, 255, 255, 0.85);
        }
        @media (prefers-color-scheme: dark) {
            :root { --bg: #000000; --text: #ffffff; --pill: #1c1c1e; --sidebar-silver: linear-gradient(180deg, #2c2c2e 0%, #1c1c1e 100%); --glass: rgba(0, 0, 0, 0.85); }
        }
        * { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
        body { margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; display: flex; height: 100vh; }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 280px; height: 100vh; background: var(--sidebar-silver);
            position: fixed; left: -280px; top: 0; z-index: 3000;
            transition: left 0.4s cubic-bezier(0.2, 1, 0.2, 1);
            padding: 40px 15px; border-right: 1px solid rgba(0,0,0,0.1); overflow-y: auto;
        }
        .sidebar.active { left: 0; }
        .sidebar-header { font-size: 22px; font-weight: 800; margin-bottom: 20px; }
        
        .nav-label { font-size: 10px; font-weight: 800; color: #888; margin: 20px 0 10px 5px; text-transform: uppercase; }
        
        .group-item {
            padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600;
            margin-bottom: 8px; background: rgba(255,255,255,0.4); display: flex; justify-content: space-between; align-items: center; font-size: 13px;
        }
        .group-item.active { background: var(--accent); color: white; }

        /* --- HEADER --- */
        header {
            position: sticky; top: 0; z-index: 2000; width: 100%;
            background: var(--glass); backdrop-filter: saturate(180%) blur(25px);
            border-bottom: 1px solid rgba(120,120,128,0.2); padding: 12px 15px;
            display: flex; align-items: center; gap: 10px;
        }
        .search-box { flex: 1; background: var(--pill); border: none; padding: 12px; border-radius: 12px; font-size: 15px; color: var(--text); outline: none; }
        .btn-icon { background: var(--pill); border: none; width: 42px; height: 42px; border-radius: 12px; cursor: pointer; font-size: 20px; color: var(--text); display: flex; align-items: center; justify-content: center; }

        /* --- GRID LOGIC --- */
        main { flex: 1; overflow-y: auto; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        .grid {
            display: grid; padding: 15px; width: 100%; max-width: 1400px; margin: 0 auto; gap: 15px;
        }
        /* 3 per row for logos */
        .grid.logos { grid-template-columns: repeat(3, 1fr) !important; }
        /* 1 per row for setups */
        .grid.setups { grid-template-columns: 1fr !important; }

        /* --- LOGO CARDS --- */
        .asset-card { display: flex; flex-direction: column; align-items: center; position: relative; }
        .img-container {
            width: 100%; height: 240px; 
            display: flex; align-items: center; justify-content: center; background: rgba(128,128,128,0.05); border-radius: 20px; margin-bottom: 10px;
            border: 3px solid transparent; cursor: pointer;
        }
        .img-container img { max-width: 85%; max-height: 85%; object-fit: contain; }
        .asset-card.selected .img-container { border-color: var(--accent); background: rgba(0, 122, 255, 0.1); }

        /* --- SETUP CARDS (LANDSCAPE) --- */
        .setup-card { width: 100%; display: flex; flex-direction: column; margin-bottom: 20px; }
        .landscape-img { 
            width: 100%; height: 220px; border-radius: 20px; overflow: hidden; 
            background: #000; display: flex; align-items: center; justify-content: center;
        }
        .landscape-img img { width: 100%; height: 100%; object-fit: cover; }

        .casing { width: 100%; background: var(--pill); padding: 12px; border-radius: 20px; display: flex; flex-direction: column; gap: 8px; }
        .name-field { width: 100%; border: none; background: transparent; text-align: center; font-size: 12px; font-weight: 800; color: var(--text); outline: none; }
        
        .btn-stack { display: flex; flex-direction: column; gap: 5px; width: 100%; }
        .copy-btn { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 12px; font-size: 10px; font-weight: 900; text-transform: uppercase; cursor: pointer; text-decoration: none; text-align: center; }

        /* --- MOBILE --- */
        @media (max-width: 600px) { 
            .img-container { height: 140px; } 
            .landscape-img { height: 180px; }
            .grid { gap: 10px; padding: 10px; } 
        }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 2500; display: none; }
        .overlay.active { display: block; }
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1d1d1f; color: white; padding: 12px 25px; border-radius: 50px; font-size: 12px; font-weight: 700; transition: 0.4s; z-index: 9999; }
        #toast.active { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<nav class="sidebar" id="sidebar">
    <div class="sidebar-header">Cloud Manager</div>
    
    <div class="nav-label">Navigation</div>
    <div class="group-item" id="tab-archive" onclick="switchTab('logos')">📂 Logo Archive</div>
    <div class="group-item" id="tab-nuvio" onclick="switchTab('setups')">📱 Nuvio Setups</div>

    <div id="logoCategoryArea">
        <div class="nav-label">Logo Categories</div>
        <div id="groupList"></div>
        <div style="margin-top: 10px; display: flex; gap: 5px;">
            <input type="text" id="newGrp" placeholder="New Group..." style="width: 80%; padding: 10px; border-radius: 10px; border: none;">
            <button onclick="addGroup()" style="background: var(--accent); color: white; border: none; border-radius: 10px; padding: 10px; font-weight: 800;">+</button>
        </div>
    </div>

    <div id="adminPanel" style="margin-top: 40px; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 20px;">
        <p class="nav-label">Admin Settings</p>
        <input type="password" id="ghToken" placeholder="GitHub Token" style="width: 100%; padding: 12px; border-radius: 10px; border: none; margin-bottom: 10px; outline: none;">
        <button onclick="saveToCloud()" id="syncBtn" style="width: 100%; background: #34c759; color: white; border: none; padding: 12px; border-radius: 12px; font-weight: 800; cursor: pointer;">☁️ SYNC TO CLOUD</button>
    </div>
</nav>

<main>
    <header>
        <button class="btn-icon" onclick="toggleSidebar()">☰</button>
        <input type="text" id="search" class="search-box" placeholder="Search..." onkeyup="syncUI()">
        <button id="multiBtn" class="btn-icon" onclick="toggleMultiSelect()">🔘</button>
    </header>
    <div id="mainGrid" class="grid logos"></div>
</main>

<div id="toast">Message</div>

<script>
    let db = [];
    let setups = [];
    let currentTab = 'logos'; // 'logos' or 'setups'
    let selectedSet = new Set();
    let isMulti = false;
    let activeG = 'All';

    const GITHUB = { user: 'layasync', repo: 'LayaSync.github.io' };

    async function init() {
        const t = Date.now();
        const [lRes, sRes] = await Promise.all([
            fetch(`https://raw.githubusercontent.com/${GITHUB.user}/${GITHUB.repo}/main/logo.json?v=${t}`).then(r => r.json()),
            fetch(`https://raw.githubusercontent.com/${GITHUB.user}/${GITHUB.repo}/main/setups.json?v=${t}`).then(r => r.json())
        ]);
        db = lRes; setups = sRes;
        document.getElementById('ghToken').value = localStorage.getItem('ls_token') || '';
        switchTab('logos');
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }

    function switchTab(tab) {
        currentTab = tab;
        activeG = 'All';
        document.getElementById('tab-archive').classList.toggle('active', tab === 'logos');
        document.getElementById('tab-nuvio').classList.toggle('active', tab === 'setups');
        document.getElementById('logoCategoryArea').style.display = tab === 'logos' ? 'block' : 'none';
        document.getElementById('mainGrid').className = `grid ${tab === 'logos' ? 'logos' : 'setups'}`;
        if(tab === 'logos') renderGroups();
        syncUI();
        if(window.innerWidth < 600) toggleSidebar();
    }

    function toggleMultiSelect() {
        if(currentTab !== 'logos') return;
        isMulti = !isMulti;
        selectedSet.clear();
        document.getElementById('multiBtn').style.background = isMulti ? 'var(--accent)' : 'var(--pill)';
        syncUI();
    }

    function renderGroups() {
        const list = document.getElementById('groupList');
        const categories = [...new Set(db.map(i => i.group || 'Uncategorized'))];
        list.innerHTML = `<div class="group-item ${activeG==='All'?'active':''}" onclick="setG('All')">📂 All Logos</div>`;
        categories.forEach(g => {
            list.innerHTML += `<div class="group-item ${activeG===g?'active':''}" onclick="setG('${g}')">
                <span>🏷️ ${g}</span>
                <button onclick="deleteG(event, '${g}')" style="color:red; background:none; border:none; font-weight:800; cursor:pointer;">✕</button>
            </div>`;
        });
    }

    function setG(g) {
        if (isMulti && g !== 'All') {
            selectedSet.forEach(url => {
                const item = db.find(i => i.url === url);
                if (item) item.group = g;
            });
            showToast(`Moved to ${g}`);
            toggleMultiSelect();
        }
        activeG = g;
        renderGroups();
        syncUI();
    }

    function addGroup() {
        const name = document.getElementById('newGrp').value.trim();
        if (name) { 
            db.push({ name: "Dummy", url: "", group: name });
            document.getElementById('newGrp').value = '';
            renderGroups();
        }
    }

    function deleteG(e, g) {
        e.stopPropagation();
        if (prompt("User:") === "123" && prompt("Pass:") === "123") {
            db = db.filter(i => i.group !== g);
            renderGroups();
            setG('All');
        }
    }

    function syncUI() {
        const grid = document.getElementById('mainGrid');
        const q = document.getElementById('search').value.toLowerCase();
        
        if (currentTab === 'logos') {
            const filtered = db.filter(i => {
                if (!i.url) return false;
                const matchesSearch = i.name.toLowerCase().includes(q) || (i.group || '').toLowerCase().includes(q);
                const matchesTab = activeG === 'All' || i.group === activeG;
                return matchesSearch && matchesTab;
            });
            grid.innerHTML = filtered.map(i => `
                <div class="asset-card ${selectedSet.has(i.url)?'selected':''}" onclick="handleCardClick('${i.url}')">
                    <div class="img-container"><img src="${i.url}" loading="eager"></div>
                    <div class="casing">
                        <input class="name-field" value="${i.name}" onchange="updateLogoName('${i.url}', this.value)" onclick="event.stopPropagation()">
                        <button class="copy-btn" onclick="event.stopPropagation(); copyLink('${i.url}')">Copy Link</button>
                    </div>
                </div>
            `).join('');
        } else {
            const filtered = setups.filter(i => i.name.toLowerCase().includes(q));
            grid.innerHTML = filtered.map(i => `
                <div class="setup-card">
                    <div class="landscape-img"><img src="${i.screenshot}" loading="eager"></div>
                    <div class="casing">
                        <input class="name-field" style="font-size:14px; margin-bottom:5px;" value="${i.name}" onchange="updateSetupName('${i.screenshot}', this.value)">
                        <div class="btn-stack">
                            ${i.files ? i.files.map(f => `<a href="${f.url}" download class="copy-btn">⬇️ ${f.label || 'Download JSON'}</a>`).join('') : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }
    }

    function handleCardClick(url) {
        if (!isMulti) return;
        if (selectedSet.has(url)) selectedSet.delete(url); else selectedSet.add(url);
        syncUI();
    }

    function updateLogoName(url, val) { const item = db.find(i => i.url === url); if (item) item.name = val; }
    function updateSetupName(src, val) { const item = setups.find(i => i.screenshot === src); if (item) item.name = val; }

    async function saveToCloud() {
        const token = document.getElementById('ghToken').value;
        if (!token) return alert("Enter GitHub Token");
        localStorage.setItem('ls_token', token);
        
        const btn = document.getElementById('syncBtn');
        btn.innerText = "Syncing...";
        const file = currentTab === 'logos' ? 'logo.json' : 'setups.json';
        const dataToSave = currentTab === 'logos' ? db.filter(i => i.url !== "") : setups;

        try {
            const url = `https://api.github.com/repos/${GITHUB.user}/${GITHUB.repo}/contents/${file}`;
            const res = await fetch(url, { headers: { Authorization: `token ${token}` } });
            const fileData = await res.json();
            const pushRes = await fetch(url, {
                method: 'PUT',
                headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: `Cloud Sync: ${file}`,
                    content: btoa(JSON.stringify(dataToSave, null, 2)),
                    sha: fileData.sha
                })
            });
            if (pushRes.ok) showToast("✅ Cloud Sync Success!");
        } catch (e) { alert("Sync Error!"); }
        finally { btn.innerText = "☁️ SYNC TO CLOUD"; }
    }

    function copyLink(url) { navigator.clipboard.writeText(url); showToast("Link Copied!"); }
    function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.classList.add('active'); setTimeout(() => t.classList.remove('active'), 2000); }

    init();
</script>
</body>
</html>
