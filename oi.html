<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LayaSync | Cloud Asset Authority</title>
    <style>
        :root {
            --bg: #ffffff; --text: #1c1c1e; --accent: #007aff; --pill: #f2f2f7;
            --sidebar-silver: linear-gradient(180deg, #e5e5ea 0%, #d1d1d6 100%);
            --glass: rgba(255, 255, 255, 0.88);
        }
        @media (prefers-color-scheme: dark) {
            :root { --bg: #000000; --text: #ffffff; --pill: #1c1c1e; --sidebar-silver: linear-gradient(180deg, #2c2c2e 0%, #1c1c1e 100%); --glass: rgba(0, 0, 0, 0.88); }
        }

        /* --- BUTTER SMOOTH ENGINE --- */
        * { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: var(--bg); color: var(--text); }

        /* --- SILVER SIDEBAR --- */
        .sidebar {
            width: 280px; height: 100%; background: var(--sidebar-silver);
            position: fixed; left: -280px; top: 0; z-index: 3000;
            transition: transform 0.4s cubic-bezier(0.2, 1, 0.2, 1);
            padding: 50px 15px; border-right: 1px solid rgba(0,0,0,0.1); 
            overflow-y: auto; will-change: transform;
        }
        .sidebar.active { transform: translateX(280px); }
        .sidebar-header { font-size: 24px; font-weight: 800; margin-bottom: 25px; letter-spacing: -1px; }
        
        .nav-label { font-size: 10px; font-weight: 800; color: #888; margin: 20px 0 10px 5px; text-transform: uppercase; }
        .group-item {
            padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600;
            margin-bottom: 5px; background: rgba(255,255,255,0.4); display: flex; align-items: center; justify-content: space-between; font-size: 13px;
            transition: 0.2s;
        }
        .group-item.active { background: var(--accent); color: white; }

        /* ADD GROUP UI */
        .add-group-box { display: flex; gap: 5px; margin-top: 10px; }
        .add-group-box input { flex: 1; padding: 10px; border-radius: 10px; border: none; font-size: 12px; outline: none; background: var(--bg); }
        .add-group-box button { background: var(--accent); color: white; border: none; padding: 10px 14px; border-radius: 10px; font-weight: 800; cursor: pointer; }

        /* --- MAIN AREA --- */
        main { 
            height: 100%; overflow-y: auto; overflow-x: hidden;
            -webkit-overflow-scrolling: touch; scroll-behavior: smooth;
            padding-bottom: 80px;
        }

        header {
            position: sticky; top: 0; z-index: 2000;
            background: var(--glass); backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid rgba(120,120,128,0.2); 
            padding: 12px 15px; display: flex; align-items: center; gap: 10px;
        }
        .search-box { flex: 1; background: var(--pill); border: none; padding: 12px 15px; border-radius: 12px; font-size: 15px; color: var(--text); outline: none; }
        .btn-icon { background: var(--pill); border: none; width: 45px; height: 45px; border-radius: 12px; cursor: pointer; font-size: 20px; color: var(--text); display: flex; align-items: center; justify-content: center; }

        /* --- GRID: LOGOS 3x3 / SETUPS 1x1 --- */
        .grid { display: grid; width: 100%; padding: 15px; gap: 15px; margin: 0 auto; }
        .grid.logos { grid-template-columns: repeat(3, 1fr) !important; }
        .grid.setups { grid-template-columns: 1fr !important; }

        /* --- PREMIUM CARDS --- */
        .card { display: flex; flex-direction: column; width: 100%; transition: 0.3s; }
        .img-container {
            width: 100%; aspect-ratio: 1/1; background: rgba(128,128,128,0.05); 
            border-radius: 18px; display: flex; align-items: center; justify-content: center;
            overflow: hidden; border: 3px solid transparent; cursor: pointer;
        }
        .img-container img { max-width: 85%; max-height: 85%; object-fit: contain; }
        .card.selected .img-container { border-color: var(--accent); background: rgba(0, 122, 255, 0.1); }

        /* LANDSCAPE SETUPS */
        .setup-card { width: 100%; display: flex; flex-direction: column; margin-bottom: 30px; }
        .landscape-box { width: 100%; height: 240px; border-radius: 24px; overflow: hidden; background: #111; }
        .landscape-box img { width: 100%; height: 100%; object-fit: cover; }

        /* PILL CASING */
        .casing { width: 100%; background: var(--pill); padding: 14px; border-radius: 22px; margin-top: 10px; display: flex; flex-direction: column; gap: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .name-label { text-align: center; font-size: 12px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border: none; background: transparent; color: var(--text); outline: none; }
        
        .action-btn { 
            background: var(--accent); color: white; border: none; padding: 12px; 
            border-radius: 12px; font-size: 10px; font-weight: 800; cursor: pointer; 
            text-align: center; text-decoration: none; text-transform: uppercase; transition: 0.1s;
        }
        .action-btn:active { transform: scale(0.96); opacity: 0.9; }

        /* OVERLAY & TOAST */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 2500; display: none; }
        .overlay.active { display: block; }
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1d1d1f; color: #fff; padding: 12px 28px; border-radius: 50px; font-size: 13px; font-weight: 700; transition: 0.4s cubic-bezier(0.17, 0.89, 0.32, 1.28); z-index: 9999; }
        #toast.active { transform: translateX(-50%) translateY(0); }

        @media (max-width: 600px) {
            .grid.logos { gap: 8px; padding: 8px; }
            .img-container { border-radius: 12px; }
            .landscape-box { height: 180px; }
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<nav class="sidebar" id="sidebar">
    <div class="sidebar-header">LayaSync Pro</div>
    
    <div class="nav-label">Navigation</div>
    <div class="group-item" id="nav-logos" onclick="setTab('logos')">🖼️ Logo Archive</div>
    <div class="group-item" id="nav-setups" onclick="setTab('setups')">📱 Nuvio Setups</div>

    <div id="catBox">
        <div class="nav-label">Groups</div>
        <div id="catList"></div>
        <div class="add-group-box">
            <input type="text" id="newGrpInput" placeholder="Group name...">
            <button onclick="addNewGroup()">+</button>
        </div>
    </div>

    <div class="nav-label">Cloud Sync Engine</div>
    <input type="password" id="ghToken" placeholder="GitHub Token (ghp_...)" style="width: 100%; padding: 14px; border-radius: 12px; border: none; margin-bottom: 10px; font-size: 12px; outline: none; background: #fff;">
    <button onclick="cloudSync()" id="syncBtn" style="width: 100%; background: #34c759; color: white; border: none; padding: 16px; border-radius: 16px; font-weight: 800; cursor: pointer;">☁️ SYNC TO GITHUB</button>
</nav>

<main>
    <header>
        <button class="btn-icon" onclick="toggleSidebar()">☰</button>
        <input type="text" id="search" class="search-box" placeholder="Search archive..." onkeyup="renderUI()">
        <button id="multiBtn" class="btn-icon" onclick="toggleMulti()">🔘</button>
    </header>
    <div id="mainGrid" class="grid logos"></div>
</main>

<div id="toast">Copied</div>

<script>
    let logos = []; let setups = [];
    let currentTab = 'logos'; let activeCat = 'All';
    let selectedSet = new Set(); let isMulti = false;
    let customGroups = JSON.parse(localStorage.getItem('ls_c_groups')) || [];
    
    const GITHUB_REPO = { user: 'layasync', repo: 'LayaSync.github.io' };

    async function init() {
        const v = Date.now();
        try {
            const [l, s] = await Promise.all([
                fetch(`https://raw.githubusercontent.com/${GITHUB_REPO.user}/${GITHUB_REPO.repo}/main/logo.json?v=${v}`).then(r => r.json()),
                fetch(`https://raw.githubusercontent.com/${GITHUB_REPO.user}/${GITHUB_REPO.repo}/main/setups.json?v=${v}`).then(r => r.json())
            ]);
            logos = l; setups = s;
            document.getElementById('ghToken').value = localStorage.getItem('ls_token') || '';
            setTab('logos');
        } catch(e) { console.error("Archive sync error."); }
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }

    function setTab(tab) {
        currentTab = tab; activeCat = 'All';
        document.getElementById('nav-logos').classList.toggle('active', tab === 'logos');
        document.getElementById('nav-setups').classList.toggle('active', tab === 'setups');
        document.getElementById('catBox').style.display = tab === 'logos' ? 'block' : 'none';
        document.getElementById('mainGrid').className = `grid ${tab}`;
        if(tab === 'logos') buildCats();
        renderUI();
        if(window.innerWidth < 600) { if(document.getElementById('sidebar').classList.contains('active')) toggleSidebar(); }
    }

    function addNewGroup() {
        const val = document.getElementById('newGrpInput').value.trim();
        if(val && !customGroups.includes(val)) {
            customGroups.push(val);
            localStorage.setItem('ls_c_groups', JSON.stringify(customGroups));
            document.getElementById('newGrpInput').value = '';
            buildCats();
        }
    }

    function buildCats() {
        const list = document.getElementById('catList');
        const jsonCats = [...new Set(logos.map(i => i.group || 'Uncategorized'))];
        const allCats = [...new Set([...jsonCats, ...customGroups])];
        list.innerHTML = `<div class="group-item ${activeCat==='All'?'active':''}" onclick="setCat('All')">📂 All Logos</div>`;
        allCats.forEach(c => {
            if(c !== 'Uncategorized' && c !== 'Dummy')
                list.innerHTML += `<div class="group-item ${activeCat===c?'active':''}" onclick="setCat('${c}')">🏷️ ${c} <span onclick="delGrp(event, '${c}')" style="color:red; margin-left:auto">✕</span></div>`;
        });
    }

    function delGrp(e, g) {
        e.stopPropagation();
        if(prompt("User:") === "123" && prompt("Pass:") === "123") {
            customGroups = customGroups.filter(i => i !== g);
            logos = logos.filter(i => i.group !== g);
            localStorage.setItem('ls_c_groups', JSON.stringify(customGroups));
            setCat('All');
        }
    }

    function setCat(c) {
        if (isMulti && c !== 'All') {
            selectedSet.forEach(url => { const item = logos.find(i => i.url === url); if(item) item.group = c; });
            showToast(`Moved to ${c}`); toggleMulti();
        }
        activeCat = c; buildCats(); renderUI();
    }

    function toggleMulti() {
        if(currentTab !== 'logos') return;
        isMulti = !isMulti; selectedSet.clear();
        document.getElementById('multiBtn').style.background = isMulti ? 'var(--accent)' : 'var(--pill)';
        renderUI();
    }

    function renderUI() {
        const grid = document.getElementById('mainGrid');
        const query = document.getElementById('search').value.toLowerCase();
        
        if (currentTab === 'logos') {
            const filtered = logos.filter(i => (i.name.toLowerCase().includes(query) || (i.group || '').toLowerCase().includes(query)) && (activeCat === 'All' || i.group === activeCat));
            grid.innerHTML = filtered.map(i => `
                <div class="card ${selectedSet.has(i.url)?'selected':''}" onclick="handleCardClick('${i.url}')">
                    <div class="img-container"><img src="${i.url}" loading="eager"></div>
                    <div class="casing">
                        <input class="name-label" value="${i.name}" onchange="updateLName('${i.url}', this.value)" onclick="event.stopPropagation()">
                        <button class="action-btn" onclick="event.stopPropagation(); copyL('${i.url}')">Copy Link</button>
                    </div>
                </div>
            `).join('');
        } else {
            const filtered = setups.filter(i => i.name.toLowerCase().includes(query));
            grid.innerHTML = filtered.map(i => `
                <div class="setup-card">
                    <div class="landscape-box"><img src="${i.screenshot}" loading="eager"></div>
                    <div class="casing">
                        <input class="name-label" style="font-size:14px; margin-bottom:5px;" value="${i.name}" onchange="updateSName('${i.screenshot}', this.value)">
                        ${i.files ? i.files.map(f => `<a href="${f.url}" download class="action-btn" style="margin-top:5px;">⬇️ DOWNLOAD JSON COLLECTION</a>`).join('') : ''}
                    </div>
                </div>
            `).join('');
        }
    }

    function handleCardClick(url) { if(isMulti) { if(selectedSet.has(url)) selectedSet.delete(url); else selectedSet.add(url); renderUI(); } }
    function updateLName(url, val) { const i = logos.find(x => x.url === url); if(i) i.name = val; }
    function updateSName(src, val) { const i = setups.find(x => x.screenshot === src); if(i) i.name = val; }

    // --- ENHANCED CLOUD SYNC ENGINE ---
    async function cloudSync() {
        const token = document.getElementById('ghToken').value;
        if(!token) return alert("Enter GitHub Token");
        localStorage.setItem('ls_token', token);
        
        const btn = document.getElementById('syncBtn');
        const filename = currentTab === 'logos' ? 'logo.json' : 'setups.json';
        const rawData = currentTab === 'logos' ? logos.filter(i => i.url !== "") : setups;

        btn.innerText = "Connecting...";
        btn.disabled = true;

        try {
            const apiUrl = `https://api.github.com/repos/${GITHUB_REPO.user}/${GITHUB_REPO.repo}/contents/${filename}`;
            
            // 1. Fetch current SHA to prevent 409 conflict
            const getRes = await fetch(apiUrl, { 
                headers: { 'Authorization': `token ${token}`, 'Cache-Control': 'no-cache' } 
            });
            const fileMeta = await getRes.json();
            
            if(!getRes.ok) throw new Error("Could not find file on GitHub.");

            // 2. Prepare UTF-8 safe Base64
            const jsonString = JSON.stringify(rawData, null, 2);
            const encodedContent = btoa(unescape(encodeURIComponent(jsonString)));

            // 3. Commit change
            const putRes = await fetch(apiUrl, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: `LayaSync Cloud Update: ${filename}`,
                    content: encodedContent,
                    sha: fileMeta.sha
                })
            });

            if(putRes.ok) showToast("✅ Cloud Updated!");
            else {
                const err = await putRes.json();
                throw new Error(err.message);
            }
        } catch (e) { 
            alert("Error: " + e.message); 
        } finally { 
            btn.innerText = "☁️ SYNC TO GITHUB"; 
            btn.disabled = false; 
        }
    }

    function copyL(url) { navigator.clipboard.writeText(url); showToast("Link Copied!"); }
    function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.classList.add('active'); setTimeout(() => t.classList.remove('active'), 2000); }

    init();
</script>
</body>
</html>
