<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LayaSync | Digital Archive Pro</title>
    <style>
        :root {
            --bg: #ffffff; --text: #1c1c1e; --accent: #007aff; --pill: #f2f2f7;
            --sidebar-silver: linear-gradient(180deg, #e5e5ea 0%, #d1d1d6 100%);
            --glass: rgba(255, 255, 255, 0.88);
        }
        @media (prefers-color-scheme: dark) {
            :root { --bg: #000000; --text: #ffffff; --pill: #1c1c1e; --sidebar-silver: linear-gradient(180deg, #2c2c2e 0%, #1c1c1e 100%); --glass: rgba(0, 0, 0, 0.88); }
        }

        /* --- HARDWARE ACCELERATED CORE --- */
        * { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
        html, body { margin: 0; padding: 0; width: 100vw; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); }

        /* --- SILVER SIDEBAR (MANUAL OPEN) --- */
        .sidebar {
            width: 280px; height: 100vh; background: var(--sidebar-silver);
            position: fixed; left: -280px; top: 0; z-index: 3000;
            transition: transform 0.4s cubic-bezier(0.2, 1, 0.2, 1);
            padding: 50px 15px; border-right: 1px solid rgba(0,0,0,0.1); 
            overflow-y: auto; will-change: transform;
        }
        .sidebar.active { transform: translateX(280px); }
        .sidebar-header { font-size: 24px; font-weight: 800; margin-bottom: 25px; letter-spacing: -1px; }

        .nav-label { font-size: 10px; font-weight: 800; color: #888; margin: 20px 0 10px 5px; text-transform: uppercase; }
        .group-item {
            padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600;
            margin-bottom: 5px; background: rgba(255,255,255,0.4); display: flex; justify-content: space-between; align-items: center; font-size: 13px;
        }
        .group-item.active { background: var(--accent); color: white; }

        /* --- FLOATING HOVER SEARCH --- */
        header {
            position: sticky; top: 15px; z-index: 2000; 
            width: calc(100% - 30px); margin: 0 auto;
            background: var(--glass); backdrop-filter: saturate(180%) blur(25px); -webkit-backdrop-filter: saturate(180%) blur(25px);
            border: 1px solid rgba(120,120,128,0.2); border-radius: 20px;
            padding: 10px 15px; display: flex; align-items: center; gap: 10px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08); will-change: transform;
        }
        .search-box { flex: 1; background: var(--pill); border: none; padding: 12px; border-radius: 12px; font-size: 15px; color: var(--text); outline: none; }
        .btn-icon { background: var(--pill); border: none; width: 44px; height: 44px; border-radius: 12px; cursor: pointer; font-size: 20px; color: var(--text); display: flex; align-items: center; justify-content: center; }

        /* --- SCROLL CONTENT --- */
        main { height: 100%; overflow-y: auto; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; padding-top: 15px; }

        /* --- THE GRID: ABSOLUTE 3-PER-ROW --- */
        .grid { display: grid; width: 100%; padding: 25px 12px; gap: 12px; margin: 0 auto; }
        .grid.logos { grid-template-columns: repeat(3, 1fr) !important; }
        .grid.setups { grid-template-columns: 1fr !important; }

        /* --- ASSET CARDS --- */
        .card { display: flex; flex-direction: column; width: 100%; animation: pop 0.3s ease-out; }
        .img-container {
            width: 100%; aspect-ratio: 1/1; 
            display: flex; align-items: center; justify-content: center; 
            background: #ffffff; border-radius: 20px; margin-bottom: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04); border: 2px solid transparent; overflow: hidden;
        }
        .img-container img { max-width: 80%; max-height: 80%; object-fit: contain; }
        .card.selected .img-container { border-color: var(--accent); background: rgba(0, 122, 255, 0.05); }

        .casing { width: 100%; background: var(--pill); padding: 8px; border-radius: 18px; display: flex; flex-direction: column; gap: 6px; }
        .name-field { width: 100%; border: none; background: transparent; text-align: center; font-size: 10px; font-weight: 800; color: var(--text); outline: none; }
        .copy-btn { background: var(--accent); color: white; border: none; padding: 8px; border-radius: 10px; font-size: 8px; font-weight: 900; text-transform: uppercase; cursor: pointer; }

        /* --- LANDSCAPE SETUPS --- */
        .setup-card { width: 100%; display: flex; flex-direction: column; margin-bottom: 25px; padding: 0 8px; }
        .landscape-box { width: 100%; height: 220px; border-radius: 24px; overflow: hidden; background: #111; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .landscape-box img { width: 100%; height: 100%; object-fit: cover; }

        /* --- UTILS --- */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 2500; display: none; }
        .overlay.active { display: block; }
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1d1d1f; color: #fff; padding: 12px 28px; border-radius: 50px; font-size: 13px; font-weight: 700; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 9999; }
        #toast.active { transform: translateX(-50%) translateY(0); }

        @keyframes pop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @media (max-width: 600px) { .landscape-box { height: 180px; } .grid { gap: 10px; padding: 20px 10px; } }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<nav class="sidebar" id="sidebar">
    <div class="sidebar-header">LayaSync Admin</div>
    <div class="nav-label">Archive Navigation</div>
    <div class="group-item active" id="nav-logos" onclick="setTab('logos')">🖼️ Logo Archive</div>
    <div class="group-item" id="nav-nuvio" onclick="setTab('setups')">📱 Nuvio Setups</div>

    <div id="catArea">
        <div class="nav-label">Categories</div>
        <div id="groupList"></div>
        <div style="margin-top: 10px; display: flex; gap: 5px; padding: 0 5px;">
            <input type="text" id="newGrp" placeholder="Add Group..." style="flex:1; padding:10px; border-radius:10px; border:none; outline:none; background:var(--bg); font-size:12px;">
            <button onclick="addGroup()" style="background:var(--accent); color:white; border:none; padding:10px 14px; border-radius:10px; font-weight:800;">+</button>
        </div>
    </div>

    <div class="nav-label">Sync Status</div>
    <input type="password" id="ghToken" placeholder="GitHub Token (ghp_...)" style="width: 100%; padding: 14px; border-radius: 12px; border: none; margin-bottom: 10px; font-size: 12px; outline: none; background:#fff;">
    <button onclick="cloudSync()" id="syncBtn" style="width: 100%; background: #34c759; color: white; border: none; padding: 16px; border-radius: 16px; font-weight: 800; cursor: pointer;">☁️ SYNC TO CLOUD</button>
</nav>

<main>
    <header>
        <button class="btn-icon" onclick="toggleSidebar()">☰</button>
        <input type="text" id="search" class="search-box" placeholder="Search assets..." onkeyup="renderUI()">
        <button id="multiBtn" class="btn-icon" onclick="toggleMultiSelect()">🔘</button>
    </header>
    <div class="grid logos" id="mainGrid"></div>
</main>

<div id="toast">Ready</div>

<script>
    let db = []; let setups = [];
    let currentTab = 'logos'; let activeG = 'All';
    let selectedSet = new Set(); let isMulti = false;
    const GITHUB_REPO = { user: 'layasync', repo: 'LayaSync.github.io' };

    async function init() {
        const v = Date.now();
        try {
            const [l, s] = await Promise.all([
                fetch(`https://raw.githubusercontent.com/${GITHUB_REPO.user}/${GITHUB_REPO.repo}/main/logo.json?v=${v}`).then(r => r.json()),
                fetch(`https://raw.githubusercontent.com/${GITHUB_REPO.user}/${GITHUB_REPO.repo}/main/setups.json?v=${v}`).then(r => r.json())
            ]);
            db = l; setups = s;
            document.getElementById('ghToken').value = localStorage.getItem('ls_token') || '';
            setTab('logos');
        } catch(e) { showToast("Sync Fail: Check Network"); }
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }

    function setTab(tab) {
        currentTab = tab; activeG = 'All';
        document.getElementById('nav-logos').classList.toggle('active', tab === 'logos');
        document.getElementById('nav-setups').classList.toggle('active', tab === 'setups');
        document.getElementById('catArea').style.display = tab === 'logos' ? 'block' : 'none';
        document.getElementById('mainGrid').className = `grid ${tab}`;
        if(tab === 'logos') buildGroups();
        renderUI();
        if(window.innerWidth < 600 && document.getElementById('sidebar').classList.contains('active')) toggleSidebar();
    }

    function buildGroups() {
        const list = document.getElementById('groupList');
        const categories = [...new Set(db.map(i => i.group || 'Uncategorized'))];
        list.innerHTML = `<div class="group-item ${activeG==='All'?'active':''}" onclick="setG('All')">📂 All Logos</div>`;
        categories.forEach(g => {
            if(g !== 'Dummy')
                list.innerHTML += `<div class="group-item ${activeG===g?'active':''}" onclick="setG('${g}')">🏷️ ${g} <span onclick="delGrp(event, '${g}')" style="color:red">✕</span></div>`;
        });
    }

    function setG(g) {
        if (isMulti && g !== 'All') {
            selectedSet.forEach(url => { const item = db.find(i => i.url === url); if (item) item.group = g; });
            showToast(`Items Moved to ${g}`); toggleMultiSelect();
        }
        activeG = g; buildGroups(); renderUI();
    }

    function addGroup() { const n = document.getElementById('newGrp').value.trim(); if (n) { db.push({ name: "Dummy", url: "", group: n }); document.getElementById('newGrp').value = ''; buildGroups(); } }

    function delGrp(e, g) { e.stopPropagation(); if (prompt("User: 123, Pass: 123") === "123123") { db = db.filter(i => i.group !== g); buildGroups(); setG('All'); } }

    function renderUI() {
        const grid = document.getElementById('mainGrid');
        const q = document.getElementById('search').value.toLowerCase();
        
        if (currentTab === 'logos') {
            const filtered = db.filter(i => i.url && (i.name.toLowerCase().includes(q) || (i.group || '').toLowerCase().includes(q)) && (activeG === 'All' || i.group === activeG));
            grid.innerHTML = filtered.map(i => `
                <div class="card ${selectedSet.has(i.url)?'selected':''}" onclick="handleCardClick('${i.url}')">
                    <div class="img-container"><img src="${i.url}" loading="eager"></div>
                    <div class="casing">
                        <input class="name-field" value="${i.name}" onchange="updateLName('${i.url}', this.value)" onclick="event.stopPropagation()">
                        <button class="copy-btn" onclick="event.stopPropagation(); copyLink('${i.url}')">Copy Link</button>
                    </div>
                </div>
            `).join('');
        } else {
            const filtered = setups.filter(i => i.name.toLowerCase().includes(q));
            grid.innerHTML = filtered.map(i => `
                <div class="setup-card">
                    <div class="landscape-box"><img src="${i.screenshot}" loading="eager"></div>
                    <div class="casing">
                        <input class="name-field" style="font-size:14px; margin-bottom:5px;" value="${i.name}" onchange="updateSName('${i.screenshot}', this.value)">
                        ${i.files ? i.files.map(f => `<a href="${f.url}" download class="copy-btn" style="margin-top:5px; padding:12px; font-size:10px;">⬇️ Download JSON Collection</a>`).join('') : ''}
                    </div>
                </div>
            `).join('');
        }
    }

    function toggleMultiSelect() { if(currentTab !== 'logos') return; isMulti = !isMulti; selectedSet.clear(); document.getElementById('multiBtn').style.background = isMulti ? 'var(--accent)' : 'var(--pill)'; renderUI(); }
    function handleCardClick(url) { if (isMulti) { if (selectedSet.has(url)) selectedSet.delete(url); else selectedSet.add(url); renderUI(); } }
    function updateLName(url, val) { const item = db.find(i => i.url === url); if (item) item.name = val; }
    function updateSName(src, val) { const item = setups.find(i => i.screenshot === src); if (item) item.name = val; }

    // --- ROCK SOLID SYNC ENGINE ---
    async function cloudSync() {
        const token = document.getElementById('ghToken').value;
        if (!token) return alert("Enter GitHub Token");
        localStorage.setItem('ls_token', token);
        const btn = document.getElementById('syncBtn');
        const file = currentTab === 'logos' ? 'logo.json' : 'setups.json';
        const rawData = currentTab === 'logos' ? db.filter(i => i.url !== "") : setups;

        btn.innerText = "Connecting..."; btn.disabled = true;

        try {
            const url = `https://api.github.com/repos/${GITHUB_REPO.user}/${GITHUB_REPO.repo}/contents/${file}`;
            
            // 1. Fetch fresh SHA to avoid 409 Conflict
            const getRes = await fetch(url, { headers: { 'Authorization': `token ${token}`, 'Cache-Control': 'no-cache' } });
            const meta = await getRes.json();
            if (!getRes.ok) throw new Error("File not found on GitHub");

            // 2. Safe Encoding
            const content = btoa(unescape(encodeURIComponent(JSON.stringify(rawData, null, 2))));

            // 3. Push
            const putRes = await fetch(url, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `LayaSync Cloud Update: ${file}`, content: content, sha: meta.sha })
            });

            if (putRes.ok) showToast("✅ Global Sync Successful!");
            else throw new Error("Sync Failed");
        } catch (e) { alert(e.message); }
        finally { btn.innerText = "☁️ SYNC TO CLOUD"; btn.disabled = false; }
    }

    function copyLink(url) { navigator.clipboard.writeText(url); showToast("Link Copied!"); }
    function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.classList.add('active'); setTimeout(() => t.classList.remove('active'), 2500); }

    init();
</script>
</body>
</html>
