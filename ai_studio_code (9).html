<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV COMMANDER PRO - STABLE CLOUD</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --sidebar: rgba(18, 18, 18, 0.9);
            --accent: #007AFF;
            --danger: #FF3B30;
            --text: #FFFFFF;
            --font-size: 10px;
        }

        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            font-family: 'Roboto', sans-serif;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 0.8px;
            outline: none;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            font-size: var(--font-size);
        }

        .app-shell { display: flex; height: 100vh; background: #000; }

        /* COLUMN 1: SOURCE SWITCHER */
        .col-sources {
            width: 70px;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 0;
            border-right: 1px solid #1a1a1a;
            z-index: 50;
        }

        .source-icon {
            width: 44px; height: 44px;
            background: #1a1a1a;
            border-radius: 12px;
            margin-bottom: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid transparent;
            font-size: 14px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .source-icon:hover { transform: scale(1.05); background: #222; }
        .source-icon.active { border-color: var(--accent); background: var(--accent); }
        .source-icon.add { background: #1a1a1a; color: var(--accent); border: 1px dashed var(--accent); }

        /* COLUMN 2: CATEGORY NAV */
        .col-nav {
            width: 260px;
            background: var(--sidebar);
            backdrop-filter: blur(40px);
            display: flex;
            flex-direction: column;
            border-right: 1px solid #1a1a1a;
        }

        .traffic-lights { padding: 18px; display: flex; gap: 8px; }
        .light { width: 12px; height: 12px; border-radius: 50%; }

        .mode-switch { display: flex; padding: 10px; gap: 6px; }
        .mode-btn {
            flex: 1; padding: 9px;
            background: #1a1a1a; border-radius: 8px;
            text-align: center; cursor: pointer;
            font-size: 8px; transition: 0.2s;
            color: rgba(255,255,255,0.4);
        }
        .mode-btn.active { background: var(--accent); color: #fff; }

        .cat-scroll { flex: 1; overflow-y: auto; padding: 10px; scrollbar-width: none; }
        .cat-item {
            padding: 11px 15px; margin-bottom: 3px;
            border-radius: 8px; cursor: pointer;
            display: flex; justify-content: space-between;
            color: rgba(255,255,255,0.5);
            font-size: 9px; transition: 0.2s;
        }
        .cat-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .cat-item.active { background: rgba(0, 122, 255, 0.15); color: var(--accent); }

        /* COLUMN 3: CONTENT GRID */
        main { flex: 1; display: flex; flex-direction: column; background: rgba(0,0,0,0.3); }
        header {
            height: 65px; padding: 0 25px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid #1a1a1a;
            background: rgba(0,0,0,0.1);
        }

        .search-bar {
            background: #121212; border: 1px solid #222;
            padding: 12px 18px; border-radius: 10px;
            width: 400px; color: #fff; font-size: 10px;
            font-weight: 900;
        }

        .grid {
            flex: 1; overflow-y: auto; padding: 25px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px; align-content: start;
        }

        .card {
            background: #111; border-radius: 12px; padding: 12px;
            text-align: center; border: 1px solid #1a1a1a;
            transition: 0.2s; cursor: pointer; position: relative;
        }
        .card:hover { border-color: var(--accent); transform: translateY(-4px); background: #161616; }
        .card img { width: 100%; aspect-ratio: 1; object-fit: contain; margin-bottom: 10px; border-radius: 6px; background: #000; }
        .card-name { font-size: 8px; height: 24px; overflow: hidden; line-height: 1.3; color: rgba(255,255,255,0.8); }

        /* MODALS */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; align-items: center; justify-content: center; z-index: 1000;
            backdrop-filter: blur(10px);
        }
        .modal {
            background: #121212; padding: 35px; border-radius: 20px;
            width: 440px; border: 1px solid #222; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        input, select {
            width: 100%; padding: 14px; margin: 10px 0;
            background: #1a1a1a; border: 1px solid #333;
            color: #fff; border-radius: 8px; font-weight: 900; font-size: 10px;
        }
        .btn {
            width: 100%; padding: 14px; border-radius: 8px;
            border: none; cursor: pointer; color: #fff; font-weight: 900; font-size: 10px;
            transition: 0.2s;
        }
        .btn-blue { background: var(--accent); }
        .btn-blue:hover { background: #0063cc; }
        .btn-red { background: var(--danger); margin-top: 8px; }

        #loading {
            position: fixed; top: 25px; right: 25px;
            background: var(--accent); padding: 12px 25px;
            border-radius: 30px; display: none; z-index: 9999;
            box-shadow: 0 5px 15px rgba(0,122,255,0.4);
        }
    </style>
</head>
<body>

    <div id="loading">SYNCING VIA PROXY...</div>

    <!-- INITIAL IMPORT MODAL -->
    <div class="modal-overlay" id="importModal" style="display: flex;">
        <div class="modal">
            <h2 style="text-align:center; margin-bottom:25px; letter-spacing: 2px;">IPTV COMMANDER PRO</h2>
            
            <select id="importType" onchange="toggleImportFields()">
                <option value="xtream">XTREAM CODES API</option>
                <option value="m3u">M3U URL / FILE</option>
            </select>
            
            <div id="xtreamFields">
                <input type="text" id="xtHost" placeholder="SERVER URL (E.G. http://provider.com:8080)">
                <input type="text" id="xtUser" placeholder="USERNAME">
                <input type="password" id="xtPass" placeholder="PASSWORD">
            </div>

            <div id="m3uFields" style="display:none;">
                <input type="text" id="m3uUrl" placeholder="PASTE M3U URL HERE">
                <div style="text-align:center; margin: 15px 0; font-size: 8px; opacity:0.4;">— OR —</div>
                <input type="file" id="m3uFile" accept=".m3u,.m3u8">
            </div>

            <button class="btn btn-blue" onclick="addPlaylist()">CONNECT SOURCE</button>
            <button class="btn btn-red" onclick="closeModal('importModal')" id="cancelBtn" style="display:none;">CANCEL</button>
        </div>
    </div>

    <!-- EDIT MODAL -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <h3 style="margin-bottom:15px;">EDIT COMPONENT</h3>
            <input type="text" id="editName" placeholder="DISPLAY NAME">
            <input type="text" id="editLogo" placeholder="LOGO URL">
            <button class="btn btn-blue" onclick="saveEdit()">SAVE CHANGES</button>
            <button class="btn btn-red" onclick="deleteItem()">REMOVE FROM LIST</button>
            <button class="btn" style="background:#222; margin-top:8px;" onclick="closeModal('editModal')">CLOSE</button>
        </div>
    </div>

    <div class="app-shell">
        <!-- SOURCES -->
        <div class="col-sources" id="sourceBar">
            <div class="source-icon add" onclick="openModal('importModal')">+</div>
        </div>

        <!-- NAVIGATION -->
        <div class="col-nav">
            <div class="traffic-lights">
                <div class="light" style="background:#FF5F56"></div>
                <div class="light" style="background:#FFBD2E"></div>
                <div class="light" style="background:#27C93F"></div>
            </div>

            <div class="mode-switch">
                <div class="mode-btn active" id="btn-live" onclick="setMode('live')">LIVE</div>
                <div class="mode-btn" id="btn-movie" onclick="setMode('movie')">VOD</div>
                <div class="mode-btn" id="btn-series" onclick="setMode('series')">SERIES</div>
            </div>

            <div class="cat-scroll" id="catList"></div>
        </div>

        <!-- MAIN -->
        <main>
            <header>
                <div id="activeInfo" style="color: var(--accent); font-size: 11px;">NO SOURCE</div>
                <input type="text" class="search-bar" id="search" placeholder="SEARCH CURRENT DIRECTORY..." oninput="handleSearch()">
                <button class="btn btn-blue" style="width:auto; padding:10px 20px;" onclick="exportM3U()">EXPORT M3U</button>
            </header>
            <div class="grid" id="mainGrid"></div>
        </main>
    </div>

    <script>
        // HARDCODED PROXY
        const PROXY = "https://layasync-proxy.layasync.workers.dev/?url=";

        let playlists = [];
        let activeIdx = -1;
        let activeMode = 'live'; 
        let activeCat = null;
        let editingId = null;

        const openModal = (id) => document.getElementById(id).style.display = 'flex';
        const closeModal = (id) => document.getElementById(id).style.display = 'none';

        function toggleImportFields() {
            const type = document.getElementById('importType').value;
            document.getElementById('xtreamFields').style.display = type === 'xtream' ? 'block' : 'none';
            document.getElementById('m3uFields').style.display = type === 'm3u' ? 'block' : 'none';
        }

        async function addPlaylist() {
            const type = document.getElementById('importType').value;
            let data = { type, name: '', live: {cats:[], items:[]}, movie: {cats:[], items:[]}, series: {cats:[], items:[]} };
            
            document.getElementById('loading').style.display = 'block';

            try {
                if(type === 'xtream') {
                    const host = document.getElementById('xtHost').value;
                    const user = document.getElementById('xtUser').value;
                    const pass = document.getElementById('xtPass').value;
                    data.creds = { host, user, pass };
                    
                    const eps = ['get_live_categories','get_live_streams','get_vod_categories','get_vod_streams','get_series_categories','get_series'];
                    const results = await Promise.all(eps.map(ep => 
                        fetch(`${PROXY}${encodeURIComponent(`${host}/player_api.php?username=${user}&password=${pass}&action=${ep}`)}`).then(res => res.json())
                    ));
                    data.live.cats = results[0]; data.live.items = results[1] || [];
                    data.movie.cats = results[2]; data.movie.items = results[3] || [];
                    data.series.cats = results[4]; data.series.items = results[5] || [];
                    data.name = new URL(host).hostname;
                } 
                else {
                    const file = document.getElementById('m3uFile').files[0];
                    const url = document.getElementById('m3uUrl').value;
                    let rawM3U = "";

                    if(file) {
                        rawM3U = await file.text();
                        data.name = file.name;
                    } else if(url) {
                        const res = await fetch(`${PROXY}${encodeURIComponent(url)}`);
                        rawM3U = await res.text();
                        data.name = new URL(url).hostname;
                    }
                    if(rawM3U) parseM3U(rawM3U, data);
                }

                playlists.push(data);
                renderSources();
                closeModal('importModal');
                document.getElementById('cancelBtn').style.display = 'block';
                switchPlaylist(playlists.length - 1);
            } catch(e) { 
                alert("LOAD ERROR: SERVER REJECTED PROXY OR CREDENTIALS INVALID."); 
                console.error(e);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function parseM3U(text, dataObj) {
            const lines = text.split('\n');
            const groupMap = new Set();
            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                if (line.startsWith('#EXTINF:')) {
                    const streamUrl = lines[i + 1]?.trim();
                    if (streamUrl && !streamUrl.startsWith('#')) {
                        const name = (line.match(/,(.*)$/)?.[1] || "CHANNEL").trim();
                        const group = (line.match(/group-title="([^"]*)"/)?.[1] || "GENERAL").trim();
                        const logo = (line.match(/tvg-logo="([^"]*)"/)?.[1] || "").trim();
                        dataObj.live.items.push({ stream_id: Math.random(), name, stream_icon: logo, category_id: group, url: streamUrl });
                        groupMap.add(group);
                        i++;
                    }
                }
            }
            groupMap.forEach(g => dataObj.live.cats.push({ category_id: g, category_name: g }));
        }

        function renderSources() {
            const bar = document.getElementById('sourceBar');
            bar.innerHTML = '<div class="source-icon add" onclick="openModal(\'importModal\')">+</div>';
            playlists.forEach((p, idx) => {
                const div = document.createElement('div');
                div.className = `source-icon ${idx === activeIdx ? 'active' : ''}`;
                div.innerText = p.name.substring(0, 2);
                div.title = p.name;
                div.onclick = () => switchPlaylist(idx);
                bar.prepend(div);
            });
        }

        function switchPlaylist(idx) {
            activeIdx = idx; activeCat = null;
            renderSources();
            document.getElementById('activeInfo').innerText = playlists[idx].name;
            renderCategories();
            loadCategory(null);
        }

        function setMode(mode) {
            activeMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + mode).classList.add('active');
            activeCat = null;
            renderCategories();
            loadCategory(null);
        }

        function renderCategories() {
            const list = document.getElementById('catList'); list.innerHTML = "";
            if(activeIdx === -1) return;
            const current = playlists[activeIdx][activeMode];
            
            const allDiv = document.createElement('div');
            allDiv.className = `cat-item ${activeCat === null ? 'active' : ''}`;
            allDiv.innerText = "ALL CONTENT";
            allDiv.onclick = () => loadCategory(null);
            list.appendChild(allDiv);

            current.cats.forEach(cat => {
                const div = document.createElement('div');
                div.className = `cat-item ${activeCat === cat.category_id ? 'active' : ''}`;
                div.innerText = cat.category_name;
                div.onclick = () => loadCategory(cat.category_id);
                list.appendChild(div);
            });
        }

        function loadCategory(catId) {
            activeCat = catId; 
            renderCategories();
            const items = playlists[activeIdx][activeMode].items;
            const filtered = catId ? items.filter(i => i.category_id == catId) : items;
            renderGrid(filtered);
        }

        // HIGH PERFORMANCE GRID ENGINE
        function renderGrid(items) {
            const grid = document.getElementById('mainGrid'); 
            grid.innerHTML = "";
            const frag = document.createDocumentFragment();
            
            // Limit visible items for snappy UI, user can search for others
            const slice = items.slice(0, 1200); 

            slice.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card'; 
                card.onclick = () => openEdit(item);
                const img = item.stream_icon || item.cover || 'https://via.placeholder.com/200?text=NO+IMAGE';
                card.innerHTML = `<img src="${img}" loading="lazy" onerror="this.src='https://via.placeholder.com/200?text=ERR'"><div class="card-name">${item.name}</div>`;
                frag.appendChild(card);
            });
            grid.appendChild(frag);
        }

        function openEdit(item) {
            editingId = item.stream_id || item.series_id || item.vod_id;
            document.getElementById('editName').value = item.name;
            document.getElementById('editLogo').value = item.stream_icon || item.cover || '';
            openModal('editModal');
        }

        function saveEdit() {
            const item = playlists[activeIdx][activeMode].items.find(i => (i.stream_id || i.series_id || i.vod_id) == editingId);
            item.name = document.getElementById('editName').value;
            if(item.stream_icon !== undefined) item.stream_icon = document.getElementById('editLogo').value;
            if(item.cover !== undefined) item.cover = document.getElementById('editLogo').value;
            closeModal('editModal'); loadCategory(activeCat);
        }

        function deleteItem() {
            playlists[activeIdx][activeMode].items = playlists[activeIdx][activeMode].items.filter(i => (i.stream_id || i.series_id || i.vod_id) != editingId);
            closeModal('editModal'); loadCategory(activeCat);
        }

        function handleSearch() {
            const q = document.getElementById('search').value.toLowerCase();
            const filtered = playlists[activeIdx][activeMode].items.filter(i => i.name.toLowerCase().includes(q));
            renderGrid(filtered);
        }

        function exportM3U() {
            let m3u = "#EXTM3U\n";
            const p = playlists[activeIdx];
            ['live', 'movie', 'series'].forEach(mode => {
                p[mode].items.forEach(i => {
                    let url = i.url || `${p.creds.host}/${mode === 'live' ? '' : 'movie/'}${p.creds.user}/${p.creds.pass}/${i.stream_id || i.series_id || i.vod_id}${mode === 'live' ? '.ts' : '.mp4'}`;
                    m3u += `#EXTINF:-1 tvg-logo="${i.stream_icon || i.cover || ''}" group-title="${i.category_id || mode}",${i.name}\n${url}\n`;
                });
            });
            const blob = new Blob([m3u], {type: 'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob); a.download = `${p.name}_Commander_Export.m3u`; a.click();
        }
    </script>
</body>
</html>
