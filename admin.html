<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LayaSync Admin</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body {
  background:#121212;
  color:#fff;
  font-family:Roboto, system-ui, sans-serif;
  padding:20px;
}
h2 { margin-bottom:10px; }
input, button {
  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:12px;
  border:none;
  font-size:15px;
}
button {
  background:#fff;
  color:#000;
  font-weight:900;
}
pre {
  background:#1e1e1e;
  padding:14px;
  border-radius:12px;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<h2>LayaSync Admin Panel</h2>

<input id="title" placeholder="Song Title">
<input id="artist" placeholder="Artist">
<input id="audio" placeholder="MP3 URL">
<input id="lrc" placeholder="LRC URL">
<input id="cover" placeholder="Cover Image URL">

<button onclick="addSong()">Add Song</button>

<pre id="output">Waiting…</pre>

<script>
let songs = [];

fetch("songs.json")
  .then(r => r.json())
  .then(d => songs = d);

function addSong() {
  songs.push({
    title: title.value.trim(),
    artist: artist.value.trim(),
    audio: audio.value.trim(),
    lrc: lrc.value.trim(),
    cover: cover.value.trim()
  });

  output.textContent = JSON.stringify(songs, null, 2);
}
</script>

</body>
</html>
